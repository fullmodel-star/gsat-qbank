n": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The roasting heat and high ______ made me feel hot and sticky, no matter what I did to cool off.", "options": {"A": "density", "B": "humidity", "C": "circulation", "D": "atmosphere"}, "answer": "B", "img": false, "expl": "句意為酷熱與高『濕度』讓人又熱又黏。humidity意為濕度，與hot and sticky(悶熱黏膩)的體感最相符,故選(B)。(A)density密度、(C)circulation循環、(D)atmosphere大氣皆不符『黏膩』的關鍵線索。"}, {"id": "G113-5", "year": 113, "no": 5, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Artwork created by truly great artists such as Picasso and Monet will no doubt ______ the test of time.", "options": {"A": "stay", "B": "take", "C": "serve", "D": "stand"}, "answer": "D", "img": false, "expl": "固定片語stand the test of time意為『經得起時間考驗』。畢卡索、莫內等大師的作品必能經得起時間考驗,故動詞選(D)stand。此為慣用搭配，其餘動詞不能構成此片語。"}, {"id": "G113-6", "year": 113, "no": 6, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "In some countries, military service is ______ for men only; women do not have to serve in the military.", "options": {"A": "forceful", "B": "realistic", "C": "compulsory", "D": "distinctive"}, "answer": "C", "img": false, "expl": "句意為在某些國家兵役僅對男性為『強制性的』,女性無須服役。compulsory意為義務的、強制的,與後半句『女性不必服役』相呼應,故選(C)。(A)forceful強而有力、(D)distinctive獨特的皆不符。"}, {"id": "G113-7", "year": 113, "no": 7, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The team complained that its leader always took the ______ for all the hard work done by the team members.", "options": {"A": "advantage", "B": "revenge", "C": "remedy", "D": "credit"}, "answer": "D", "img": false, "expl": "片語take the credit意為『把功勞攬在自己身上』。句意為隊員抱怨隊長總把大家辛勞的功勞據為己有,故選(D)credit。(A)take advantage利用、(B)revenge報復語意不合此抱怨情境。"}, {"id": "G113-8", "year": 113, "no": 8, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Located at the center of the city, the business hotel ______ not only good service but also convenient public transport.", "options": {"A": "proposes", "B": "contains", "C": "promises", "D": "confirms"}, "answer": "C", "img": false, "expl": "句意為這家商務旅館(位於市中心)不僅『承諾/保證』良好服務也保證便利交通。promise可表『提供、有望帶來』,promise not only…but also…搭配最自然,故選(C)。(B)contains指內含實體物、(D)confirms確認皆不合。"}, {"id": "G113-9", "year": 113, "no": 9, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "As blood supplies have fallen to a critically low level, many hospitals are making an ______ for the public to donate blood.", "options": {"A": "appeal", "B": "approach", "C": "operation", "D": "observation"}, "answer": "A", "img": false, "expl": "血液供應降到危急低點，醫院是「向大眾發出呼籲」請求捐血，make an appeal for 意為「呼籲、懇求」，符合語境。誘答 (B) approach（方法、接近）與 make an ___ for 的搭配及「請求捐血」的語意都不合。"}, {"id": "G113-10", "year": 113, "no": 10, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "David felt disappointed when he found out that he could not choose his study partners, but would be ______ placed in a study group.", "options": {"A": "eligibly", "B": "randomly", "C": "apparently", "D": "consequently"}, "answer": "B", "img": false, "expl": "空格前 could not choose（不能自己選擇），與 but 對比，表示會被「隨機」分配到讀書小組，randomly（隨機地）正確，也呼應 David 的失望。誘答 (A) eligibly（有資格地）與被動分組、無法自選的語意矛盾。"}, {"id": "G113-11", "year": 113, "no": 11, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P1", "stem": "...mystery shoppers 11 regular customers to purchase items, eat in restaurants, make inquiries, or return items.", "options": {"A": "call for", "B": "pose as", "C": "attend to", "D": "engage in"}, "answer": "B", "img": false, "expl": "神秘客受雇後要「假扮成」一般顧客去消費，pose as 意為「冒充、假扮」，正符合其偽裝身分暗中評估的工作性質。誘答 (A) call for（要求）、(D) engage in（從事）雖文法可通，但無「假扮」之意，不合秘密身分的關鍵設定。"}, {"id": "G113-12", "year": 113, "no": 12, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P1", "stem": "...report on the quality of products, customer service, and environment of the stores 12 they are assigned.", "options": {"A": "in that", "B": "with which", "C": "for that", "D": "to which"}, "answer": "D", "img": false, "expl": "先行詞 the stores 為地點，空格後 they are assigned to（被指派到某商店），介系詞 to 提前與關係代名詞 which 結合成 to which，形成 be assigned to 的搭配。誘答 (A) in that、(C) for that 中 that 不可接在介系詞後引導形容詞子句，故排除。"}, {"id": "G113-13", "year": 113, "no": 13, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P1", "stem": "...mystery shoppers have to follow certain standard procedures to avoid 13 .", "options": {"A": "keen competitions", "B": "financial hardship", "C": "racial conflicts", "D": "personal bias"}, "answer": "D", "img": false, "expl": "神秘客須遵守標準程序以避免「個人偏見」影響評估，personal bias（個人偏見）符合下文給檢核表以「確保一致性」的邏輯。誘答 (A) 激烈競爭、(B) 財務困難、(C) 種族衝突均與「評估客觀性」的主題無關。"}, {"id": "G113-14", "year": 113, "no": 14, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P1", "stem": "They may also pretend to be 14 customers, arguing with a salesperson without a good reason.", "options": {"A": "difficult", "B": "potential", "C": "constant", "D": "anonymous"}, "answer": "A", "img": false, "expl": "由 arguing with a salesperson without a good reason（無理由與店員爭執）可知，神秘客假扮的是「難纏、不好應付的」顧客，difficult（難搞的）正確。誘答 (B) potential（潛在的）、(D) anonymous（匿名的）都無法解釋「無理取鬧地爭吵」這個行為。"}, {"id": "G113-15", "year": 113, "no": 15, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P1", "stem": "...mystery shoppers can identify areas for 15 and thereby help enhance the quality of products and services.", "options": {"A": "distribution", "B": "expectation", "C": "improvement", "D": "management"}, "answer": "C", "img": false, "expl": "神秘客藉蒐集的資料找出「可改進」之處，進而提升產品與服務品質，areas for improvement（待改善的地方）符合前後「找出問題→提升品質」的因果。誘答 (D) management（管理）語意較空泛，improvement 才與 enhance the quality 直接呼應。"}, {"id": "G113-16", "year": 113, "no": 16, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P2", "stem": "They 16 alarm clocks because adjustable alarms had been invented by the mid-19th century.", "options": {"A": "must be using", "B": "could have used", "C": "had hardly used", "D": "were mostly using"}, "answer": "B", "img": false, "expl": "空格後 because 說明鬧鐘（可調式鬧鈴）在19世紀中已被發明，故當時工人「原本可以使用」鬧鐘，could have used 表「過去有能力做卻未（或未普遍）做」，且下句轉折說鬧鐘昂貴不可靠。誘答 (A) must be using 為對現在的推測，與過去史實時態不符。"}, {"id": "G113-17", "year": 113, "no": 17, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P2", "stem": "17 sticks or pea shooters, the human alarms would tour the streets, tap on windows...", "options": {"A": "Aimed at", "B": "Trained for", "C": "Equipped with", "D": "Exhausted by"}, "answer": "C", "img": false, "expl": "空格接 sticks or pea shooters（棍子或豆槍），指這些人為鬧鐘「配備」了這些工具去巡街敲窗，equipped with（配備有）正確，為分詞片語作狀語。誘答 (A) aimed at（瞄準）、(D) exhausted by（被…累垮）與「手持工具去叫醒人」的動作不合。"}, {"id": "G113-18", "year": 113, "no": 18, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P2", "stem": "...knockers-up became 18 throughout the United Kingdom.", "options": {"A": "familiar presences", "B": "distant memories", "C": "vague images", "D": "public eyesores"}, "answer": "A", "img": false, "expl": "下文說每天早上都能在大街小巷「看見」這些人專業地叫醒顧客，可知敲窗人成了英國各地「熟悉的身影」，familiar presences（常見的存在）正確。誘答 (B) distant memories（遙遠記憶）與當時仍普遍活躍、隨處可見的敘述矛盾。"}, {"id": "G113-19", "year": 113, "no": 19, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P2", "stem": "While the practice continued...until the 1970s, it 19 as alarm clocks became more widespread and affordable.", "options": {"A": "remained", "B": "dismissed", "C": "revised", "D": "declined"}, "answer": "D", "img": false, "expl": "由 as alarm clocks became more widespread and affordable（鬧鐘更普及且便宜）可知，敲窗人的行業隨之「衰退」，declined（減少、沒落）符合此因果。誘答 (A) remained（維持）與鬧鐘取代人力後行業消失的趨勢相反。"}, {"id": "G113-20", "year": 113, "no": 20, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "113-P2", "stem": "However, they cannot 20 the personal attention coming from the distinctive tap of a pea shooter.", "options": {"A": "forget", "B": "change", "C": "match", "D": "regret"}, "answer": "C", "img": false, "expl": "轉折 however 指出鬧鐘「無法比得上」豆槍敲窗那種親切的個人化關注，cannot match（比不上、匹敵不了）正確。誘答 (A) forget（忘記）、(D) regret（後悔）主詞為鬧鐘（無生命），語意不通。"}, {"id": "G113-21", "year": 113, "no": 21, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "...serves to connect family members to their 21 loved ones who died in the tsunami...", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "E", "img": false, "expl": "空格修飾 loved ones who died in the tsunami（在海嘯中死去的摯愛），故指「已故的」親人，departed（過世的）正確，與後文 those they have lost 呼應。其他選項如 fateful、passed on 詞性或語意不合此名詞前的形容詞位置。"}, {"id": "G113-22", "year": 113, "no": 22, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "...to say the words they never got to say on that 22 day.", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "I", "img": false, "expl": "指人們想對在「那決定命運的一天」（海嘯發生日）沒能說出口的話，fateful（決定命運的、災難性的）修飾 day 正確，呼應奪走一萬八千條人命的災難。誘答 departed 多指人已故，不用於形容 day。"}, {"id": "G113-23", "year": 113, "no": 23, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "The idea for the wind phone was first 23 by a Japanese garden designer named Itaru Sasaki...", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "J", "img": false, "expl": "此格為被動 was first ___ by，指這個構想最初由佐佐木「提出」，brought forth（提出、產生）正確。誘答 passed on（傳遞、去世）與「首創構想」的語意及被動搭配不符。"}, {"id": "G113-24", "year": 113, "no": 24, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "Feeling that he needed a private space to help him navigate through the 24 , Sasaki positioned a booth...", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "C", "img": false, "expl": "他喪失表弟後需要私人空間來走出「悲傷」，navigate through the sorrow（度過悲傷）正確，sorrow（悲傷）為名詞作介系詞受詞，呼應 grieving（哀悼）主題。誘答 hope（希望）與喪親的哀傷情境相反。"}, {"id": "G113-25", "year": 113, "no": 25, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "The booth he built 25 only an old dial phone with a disconnected phone line.", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "G", "img": false, "expl": "主詞 The booth（電話亭），空格後接 only an old dial phone（一具舊式轉盤電話），指電話亭「容納、裝設」著這具電話，housed（容納、內設）正確，為及物動詞過去式。其他選項如 bridge、mechanism 為名詞，無法作此處動詞。"}, {"id": "G113-26", "year": 113, "no": 26, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "\"Because my thoughts couldn't be 26 through a regular phone line, I wanted them to be carried on the wind.\"", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "A", "img": false, "expl": "佐佐木說因為思念「無法透過」一般電話線「傳達」，故想讓它隨風而去，be passed on（被傳遞、傳達）正確，與 carried on the wind 對比。此處需被動動詞，departed 等不合。"}, {"id": "G113-27", "year": 113, "no": 27, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "...renders the grieving process more 27 for him.", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "H", "img": false, "expl": "風之電話讓哀悼過程變得更「可承受、可控」，renders...more manageable（使…更能應付）正確，呼應撥打者藉此獲得慰藉。manageable（可處理的）為形容詞，符合 render + O + adj. 句型。"}, {"id": "G113-28", "year": 113, "no": 28, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "...the booth has become a 28 between the living and the dead.", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "B", "img": false, "expl": "電話亭成為生者與死者之間的「橋梁」，bridge（橋梁）比喻連結，between the living and the dead 正是其連結兩端。此為名詞作補語，語意上呼應全文「連接」的主題。"}, {"id": "G113-29", "year": 113, "no": 29, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "Grieving is a natural 29 for coping with loss of a loved one...", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "F", "img": false, "expl": "哀悼是面對失去摯愛的一種自然「機制」，a natural mechanism for coping（因應的自然機制）正確，mechanism（機制）搭配 for coping with loss。誘答 sorrow 為情緒本身，非「因應方式」。"}, {"id": "G113-30", "year": 113, "no": 30, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "113-P3", "stem": "For those who speak into the wind phone, 30 is always there...", "options": {"A": "passed on", "B": "bridge", "C": "sorrow", "D": "hope", "E": "departed", "F": "mechanism", "G": "housed", "H": "manageable", "I": "fateful", "J": "brought forth"}, "answer": "D", "img": false, "expl": "對著風之電話說話的人，心中總有「希望」存在，hope（希望）符合結尾正向、療癒的語氣。誘答 sorrow（悲傷）與此處給予慰藉、盼望的收尾基調相反。"}, {"id": "G113-31", "year": 113, "no": 31, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "113-P4", "stem": "31 When people have sprained a muscle or tendon, they are usually advised not to go right back to exercising...", "options": {"A": "For example, an injured runner might end up cycling and swimming instead of running.", "B": "Over time, researchers have come to realize the importance of exercising when injured.", "C": "Many suggest that most patients can continue with the sport they love.", "D": "This seems to run counter to the common practice."}, "answer": "D", "img": false, "expl": "空格後說明扭傷肌肉肌腱通常「被建議休息到不痛」，但下句 But Dr. Weinstein 反對此做法，故此格應引出「這與一般常見做法相反」，(D) This seems to run counter to the common practice 承上啟下，呼應醫生的反傳統主張。"}, {"id": "G113-32", "year": 113, "no": 32, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "113-P4", "stem": "...the specific advice can differ from specialist to specialist. 32 They nevertheless caution that a cutback may be necessary...", "options": {"A": "For example, an injured runner might end up cycling and swimming instead of running.", "B": "Over time, researchers have come to realize the importance of exercising when injured.", "C": "Many suggest that most patients can continue with the sport they love.", "D": "This seems to run counter to the common practice."}, "answer": "C", "img": false, "expl": "空格後 They nevertheless caution that a cutback may be necessary（但仍提醒需減量），可知前句應是「多數人認為病患可繼續從事所愛運動」，(C) 正確，且 nevertheless 形成「可繼續運動、但需減量」的讓步邏輯。"}, {"id": "G113-33", "year": 113, "no": 33, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "113-P4", "stem": "Still others say the safest thing to do is cross-train all the time until the pain is gone. 33 Their consensus, however...", "options": {"A": "For example, an injured runner might end up cycling and swimming instead of running.", "B": "Over time, researchers have come to realize the importance of exercising when injured.", "C": "Many suggest that most patients can continue with the sport they love.", "D": "This seems to run counter to the common practice."}, "answer": "A", "img": false, "expl": "前句提到有人主張全程交叉訓練直到不痛，(A) 舉例「受傷跑者可能改騎車、游泳而非跑步」正是 cross-train（交叉訓練）的具體例證，以 For example 銜接，例示前文概念。"}, {"id": "G113-34", "year": 113, "no": 34, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "113-P4", "stem": "34 Thus, more and more patients are now advised to keep moving despite the pain.", "options": {"A": "For example, an injured runner might end up cycling and swimming instead of running.", "B": "Over time, researchers have come to realize the importance of exercising when injured.", "C": "Many suggest that most patients can continue with the sport they love.", "D": "This seems to run counter to the common practice."}, "answer": "B", "img": false, "expl": "空格後 Thus, more and more patients are now advised to keep moving（因此愈來愈多病患被建議持續活動），需前面提供原因，(B)「研究者逐漸體認受傷時運動的重要」正好為此結論的依據，Thus 呼應因果。"}, {"id": "G113-35", "year": 113, "no": 35, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P5", "stem": "Which of the following pictures shows de Mestral's invention?", "options": {"A": "(圖片 A)", "B": "(圖片 B)", "C": "(圖片 C)", "D": "(圖片 D)"}, "answer": "B", "img": true}, {"id": "G113-36", "year": 113, "no": 36, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P5", "stem": "What does the author mean by \"a lightbulb moment\" in the first paragraph?", "options": {"A": "A blessing in disguise.", "B": "A happy ending.", "C": "An unpredictable future.", "D": "A sudden inspiration."}, "answer": "D", "img": false, "expl": "a lightbulb moment（燈泡亮起的一刻）比喻靈感突現，下文 de Mestral 立刻衝去顯微鏡觀察芒刺並構思發明，可知是「突發的靈感」，(D) A sudden inspiration 正確。誘答 (A) 因禍得福與此處靈光乍現的情境不符。"}, {"id": "G113-37", "year": 113, "no": 37, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P5", "stem": "Which of the following statements about Velcro is true?", "options": {"A": "It has been a market favorite since its first appearance.", "B": "Cotton was not durable enough to be used as its materials.", "C": "It was given a French name because it was first produced in France.", "D": "The design was intended to look as shiny and smooth as velvet."}, "answer": "B", "img": false, "expl": "第三段明言他先試棉布，但棉太軟 could not withstand repeated openings and closures（無法承受反覆開合），即棉布不夠耐用，(B) 正確。誘答 (A) 一上市即熱賣、(C) 因在法國生產得名，文中均無依據。"}, {"id": "G113-38", "year": 113, "no": 38, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P5", "stem": "Which of the following fields is NOT mentioned for Velcro uses in the passage?", "options": {"A": "Civil engineering.", "B": "Aerospace industry.", "C": "Medical technology.", "D": "Sports and recreation."}, "answer": "A", "img": false, "expl": "題問文中「未」提及的魔鬼氈應用領域。文章提到航太、醫療、運動休閒等用途，唯獨未提 (A) Civil engineering（土木工程），故選 A。此為 NOT 題，須找出文中沒出現的選項。"}, {"id": "G113-39", "year": 113, "no": 39, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P6", "stem": "What can we learn from the passage?", "options": {"A": "How national parks around the world were established.", "B": "How Yellowstone's natural features were formed.", "C": "Why Moran's family moved to the United States.", "D": "Why Moran started painting Yellowstone."}, "answer": "D", "img": false, "expl": "末句 In 1871, he was appointed to illustrate The Wonders of Yellowstone，說明 Moran 因受委託繪製黃石而開始作畫，(D) Why Moran started painting Yellowstone 正確。誘答 (B) 黃石地貌如何形成，非本文重點。"}, {"id": "G113-40", "year": 113, "no": 40, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P6", "stem": "Why does the author use \"the blackened heart\" in paragraph 2 to describe Moran's hometown?", "options": {"A": "The place was severely polluted.", "B": "The town was filled with darkened holes.", "C": "There were many evil-hearted industry owners.", "D": "The laborers mostly wore dark and dirty uniforms."}, "answer": "A", "img": false, "expl": "the blackened heart 指工業革命核心，下文以主街是「陰暗醜陋的坑洞」、河水髒污形容，可知在描述當地「嚴重污染」，(A) The place was severely polluted 正確。此為 blackened（被燻黑的）的引申，非字面指人心邪惡。"}, {"id": "G113-41", "year": 113, "no": 41, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P6", "stem": "Which of the following statements is true about the Yellowstone National Park?", "options": {"A": "Its establishment was proposed by Langford.", "B": "Americans knew little about its beauty before the 1870s.", "C": "The government project was started due to its rich natural resources.", "D": "It was the only national park established because of Moran's works."}, "answer": "B", "img": false, "expl": "首段說 Moran 的畫作把非凡景觀呈現在美國人眼前，為其被認定並設立為國家公園「鋪路」，可推知1870年代前美國人對黃石之美所知甚少，(B) 正確。誘答 (A) 由 Langford 提議設立，文中無此陳述。"}, {"id": "G113-42", "year": 113, "no": 42, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P6", "stem": "What can be inferred from the passage?", "options": {"A": "Scribner's Monthly was a magazine promoting national parks.", "B": "Moran had visited Yellowstone before he started painting its landscapes.", "C": "Color photos were not common when Moran started painting Yellowstone.", "D": "Watercolor was the most popular form of landscape painting in the 19th century."}, "answer": "C", "img": false, "expl": "文中強調 Moran 的畫作首度讓國人「看見」壯麗景觀並促成設園，可推論當時「彩色照片並不普遍」，才須仰賴繪畫呈現，(C) 正確。誘答 (B) 他作畫前已到訪黃石，與受委託繪製的時序無據。"}, {"id": "G113-43", "year": 113, "no": 43, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P7", "stem": "What is the primary goal of 100% Fish?", "options": {"A": "To advance ocean technology.", "B": "To reduce food crises worldwide.", "C": "To enhance cross-industry cooperation.", "D": "To make the most of marine resources."}, "answer": "D", "img": false, "expl": "第二段點出 100% Fish 旨在 encourage full utilization of each fish caught（鼓勵充分利用每條漁獲），即「充分運用海洋資源」，(D) To make the most of marine resources 正確。誘答 (B) 減少全球糧食危機為背景，非其首要目標。"}, {"id": "G113-44", "year": 113, "no": 44, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P7", "stem": "What does \"this pioneering procedure\" in the second paragraph refer to?", "options": {"A": "100% Fish's mission.", "B": "Oddsson's skin transplant.", "C": "A fundamental change in seafood business.", "D": "A new approach to protect the environment."}, "answer": "B", "img": false, "expl": "this pioneering procedure（這項開創性程序）指前句救活 Oddsson 的鱈魚皮移植，(B) Oddsson's skin transplant 正確。代名詞須回指最近且相符的先行概念，即前文提到的魚皮移植手術。"}, {"id": "G113-45", "year": 113, "no": 45, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P7", "stem": "Which of the following is true according to the passage?", "options": {"A": "Iceland has increased their fish catch by 30% in the last 20 years.", "B": "Petur Oddsson was an important member of the Icelandic project.", "C": "Cross-field collaboration has proved to be very fruitful for 100% Fish.", "D": "100% Fish is a big international enterprise marketing seafood products."}, "answer": "C", "img": false, "expl": "文末說鱈魚皮被製成鈣片、能量飲料等，顯示跨領域（醫療、食品等）合作對 100% Fish 成效顯著，(C) Cross-field collaboration has proved to be very fruitful 正確。誘答 (A) 20年增產三成、(D) 為大型跨國企業，文中均無依據。"}, {"id": "G113-46", "year": 113, "no": 46, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "113-P7", "stem": "Here is a sentence: \"Almost nothing of a fish is left for the trash bin.\" Which paragraph is most suitable to have it as the final sentence?", "options": {"A": "Paragraph 1.", "B": "Paragraph 2.", "C": "Paragraph 3.", "D": "Paragraph 4."}, "answer": "C", "img": false, "expl": "待插入句「幾乎沒有任何魚的部分被丟進垃圾桶」強調充分利用，最適合放在描述冰島已利用近95%鱈魚、將魚皮製成各種產品的第三段結尾，(C) Paragraph 3 正確，語意上總結該段「零浪費」的例證。"}, {"id": "G114-1", "year": 114, "no": 1, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "If you put a ______ under a leaking faucet, you will be surprised at the amount of water collected in 24 hours.", "options": {"A": "border", "B": "timer", "C": "container", "D": "marker"}, "answer": "C", "img": false, "expl": "把「容器」放在漏水龍頭下，24小時後會驚訝於積水之多，container（容器）正確，符合「盛接漏水」的語意。誘答 (B) timer（計時器）、(D) marker（麥克筆／標記）都無法用來承接水。"}, {"id": "G114-2", "year": 114, "no": 2, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The local farmers' market is popular as it offers a variety of fresh seasonal ______ to people in the community.", "options": {"A": "produce", "B": "fashion", "C": "brand", "D": "trend"}, "answer": "A", "img": false, "expl": "空格前有 fresh seasonal（新鮮當季的），且農夫市集販售的正是農產品，故選 (A) produce（農產品，此處為不可數名詞）。fashion（流行）、brand（品牌）、trend（趨勢）皆與「新鮮當季」的搭配不合。注意 produce 當名詞時重音在前，指蔬果農產。"}, {"id": "G114-3", "year": 114, "no": 3, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "As the years have passed by, many of my childhood memories are already ______; I can no longer recall clearly what happened back then.", "options": {"A": "blurring", "B": "trimming", "C": "draining", "D": "glaring"}, "answer": "A", "img": false, "expl": "分號後 I can no longer recall clearly（再也記不清楚）是關鍵線索，說明兒時記憶已變得「模糊」，故選 (A) blurring（變模糊）。trimming（修剪）、draining（流失/排乾）、glaring（刺眼）皆與「記不清楚」的語意不合。"}, {"id": "G114-4", "year": 114, "no": 4, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Racist remarks are by nature ______ and hurtful, and should be avoided on all occasions.", "options": {"A": "excessive", "B": "furious", "C": "offensive", "D": "stubborn"}, "answer": "C", "img": false, "expl": "空格與 hurtful（傷人的）並列，且主詞為 Racist remarks（種族歧視言論），應具「冒犯性」，故選 (C) offensive（冒犯的、無禮的）。excessive（過度的）、furious（狂怒的）、stubborn（固執的）皆無「傷人、令人不快」的核心語意，其中 furious 是形容人的情緒而非言論本身。"}, {"id": "G114-5", "year": 114, "no": 5, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Not satisfied with the first ______ of her essay, Mary revised it several times before turning it in to the teacher.", "options": {"A": "text", "B": "brush", "C": "draft", "D": "plot"}, "answer": "C", "img": false, "expl": "空格前 first、後有 revised it several times（修改數次）才交出，可知指文章的初「稿」，故選 (C) draft（草稿）。text（本文）、brush（刷子/筆觸）、plot（情節）皆不合「需反覆修改的版本」之意；draft 專指未定稿。"}, {"id": "G114-6", "year": 114, "no": 6, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Left ______ for years, the deserted house was filled with a thick coating of dust and a smell of old damp wood.", "options": {"A": "casual", "B": "fragile", "C": "remote", "D": "vacant"}, "answer": "D", "img": false, "expl": "描述 deserted house（廢棄的房子）積滿灰塵、有潮濕舊木味，說明房子多年「空置無人」，故選 (D) vacant（空置的）。casual（隨意的）、fragile（脆弱的）、remote（偏遠的）皆無「空無一人」之意；Left vacant for years 意為「空置多年」。"}, {"id": "G114-7", "year": 114, "no": 7, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The high school student showed ______ courage when she helped the old man escape from the fire.", "options": {"A": "gigantic", "B": "exclusive", "C": "multiple", "D": "enormous"}, "answer": "D", "img": false, "expl": "空格修飾 courage，且該女生冒火救老人，應是展現「莫大的」勇氣，故選 (D) enormous（巨大的）。gigantic（龐大的）多形容體積，exclusive（獨佔的）、multiple（多重的）皆與抽象的「勇氣」不搭；enormous courage 為慣用搭配。"}, {"id": "G114-8", "year": 114, "no": 8, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Publicly financed projects are often ______ or delayed during tough economic times due to a lack of resources.", "options": {"A": "halted", "B": "hatched", "C": "possessed", "D": "reinforced"}, "answer": "A", "img": false, "expl": "主詞為 Publicly financed projects（公共工程），與 delayed（延誤）並列，並因 lack of resources（缺乏資源），故選 (A) halted（被中止、停工）。hatched（孵化/策劃）、possessed（擁有/附身）、reinforced（強化）皆與「因缺資源而停擺」不合。"}, {"id": "G114-9", "year": 114, "no": 9, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Despite his busy schedule, the President ______ the school's graduation ceremony with his presence and a heartwarming speech.", "options": {"A": "praised", "B": "graced", "C": "addressed", "D": "credited"}, "answer": "B", "img": false, "expl": "空格後 with his presence and a heartwarming speech（以出席與溫馨演說），指總統「為畢業典禮增添光彩」，故選 (B) graced（使增色、蒞臨）。praised（稱讚）、addressed（向…發表演說/處理）、credited（歸功）雖近似，但 grace ... with one's presence 為「賞光出席」的固定用法，最貼合語意。"}, {"id": "G114-10", "year": 114, "no": 10, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The manager of the company was sued for ______ abusing his colleagues, calling them \"hopeless losers.\"", "options": {"A": "verbally", "B": "dominantly", "C": "legitimately", "D": "relevantly"}, "answer": "A", "img": false, "expl": "空格修飾 abusing（辱罵），且引號內是 calling them 'hopeless losers'（罵人的話），說明是「言語上」的辱罵，故選 (A) verbally（口頭地、言語上）。dominantly（支配地）、legitimately（合法地）、relevantly（相關地）皆與「用言語罵人」不合。"}, {"id": "G114-11", "year": 114, "no": 11, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P1", "stem": "...a social innovation that 11 rapidly around the world.", "options": {"A": "had spread", "B": "would spread", "C": "had been spreading", "D": "would have spread"}, "answer": "B", "img": false, "expl": "主句時態為過去（None of them had any idea），指他們當時「不知道自己將要創造」一項會迅速傳播的創新，需用過去看未來的 would，故選 (B) would spread。(A) had spread、(C) had been spreading 為過去完成，時序不符（傳播尚未發生）；(D) would have spread 為與過去事實相反的假設，語意不當。"}, {"id": "G114-12", "year": 114, "no": 12, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P1", "stem": "With their plan 12 by the rain, the two dozen participants squeezed into the living room.", "options": {"A": "facilitated", "B": "disrupted", "C": "disclosed", "D": "fulfilled"}, "answer": "B", "img": false, "expl": "因下大雨（it started pouring），原本花園討論的計畫「被打亂」，眾人只好擠進客廳，故選 (B) disrupted（打斷、擾亂）。With their plan disrupted by the rain 為分詞獨立結構。facilitated（促進）、disclosed（揭露）、fulfilled（實現）皆與被雨破壞計畫的語意相反或不合。"}, {"id": "G114-13", "year": 114, "no": 13, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P1", "stem": "...to switch tables so the insights and ideas might 13 and deepen.", "options": {"A": "circulate", "B": "emphasize", "C": "recover", "D": "preserve"}, "answer": "A", "img": false, "expl": "換桌的目的是讓見解與想法能「流通、交流」並深化，故選 (A) circulate（流通、傳播）。與後面的 deepen（深化）搭配，呈現想法在不同桌間流動交融之意。emphasize（強調）、recover（恢復）、preserve（保存）皆無「流動交流」之意。"}, {"id": "G114-14", "year": 114, "no": 14, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P1", "stem": "...the innovative discussion process 14 a new form of collective effort that transformed the depth, scope, and quality of their discussion.", "options": {"A": "made up for", "B": "kept track of", "C": "gave rise to", "D": "looked out for"}, "answer": "C", "img": false, "expl": "空格接受詞 a new form of collective effort（一種新的集體協作形式），指創新的討論過程「催生、產生」了它，故選 (C) gave rise to（引起、導致）。made up for（彌補）、kept track of（追蹤）、looked out for（留意/照顧）皆與「產生新形式」的因果語意不合。"}, {"id": "G114-15", "year": 114, "no": 15, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P1", "stem": "The World Café was 15 created.", "options": {"A": "still", "B": "also", "C": "further", "D": "thus"}, "answer": "D", "img": false, "expl": "前文敘述整個過程如何自然發展，此句總結「世界咖啡館就這樣誕生了」，故選 (D) thus（就這樣、因此），承接前因後果。still（仍然）、also（也）、further（更進一步）皆無「順理成章導出結果」的收束語氣。"}, {"id": "G114-16", "year": 114, "no": 16, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P2", "stem": "It can 16 suddenly, progressing from a feeling of uneasiness to a cold sweat.", "options": {"A": "crash", "B": "flush", "C": "burst", "D": "strike"}, "answer": "D", "img": false, "expl": "主詞 It 指 motion sickness（暈車/暈船），空格後 suddenly 及 progressing from...（從不適發展到冷汗），指症狀會突然「發作、來襲」，故選 (D) strike（突然侵襲、發作）。疾病 strike suddenly 為常見搭配。crash（碰撞）、flush（沖洗/臉紅）、burst（爆裂）皆不合「病症發作」之意。"}, {"id": "G114-17", "year": 114, "no": 17, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P2", "stem": "Motion sickness occurs when the signals your brain receives from your eyes, ears, and body 17 .", "options": {"A": "are not regular", "B": "can hardly move", "C": "do not match", "D": "are rarely cued"}, "answer": "C", "img": false, "expl": "後文解釋大腦收到 conflicting information（相互矛盾的訊息），故眼、耳、身體傳來的訊號「不一致、對不上」，故選 (C) do not match（不吻合）。這正是暈車成因。are not regular（不規律）、can hardly move（幾乎無法移動）、are rarely cued（少被提示）皆與「訊號互相衝突」的解釋不符。"}, {"id": "G114-18", "year": 114, "no": 18, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P2", "stem": "One part of your balance-sensing system detects that your body is moving, but the other parts 18 .", "options": {"A": "aren't", "B": "won't", "C": "don't", "D": "haven't"}, "answer": "C", "img": false, "expl": "此句對比：一部分平衡系統偵測到身體在動，但其他部分「沒有（偵測到）」，屬省略句，代動詞須與前面 detects 一致，用現在式否定 don't（= don't detect that your body is moving），故選 (C)。aren't、won't、haven't 皆與前句的一般現在式動詞 detect 時態不符。"}, {"id": "G114-19", "year": 114, "no": 19, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P2", "stem": "You can take some 19 to help avoid the discomfort.", "options": {"A": "special opportunities", "B": "preventive measures", "C": "potential risks", "D": "significant advantages"}, "answer": "B", "img": false, "expl": "空格後 to help avoid the discomfort（以幫助避免不適），且下文列出選座位、看遠方、吃藥等做法，可知是採取「預防措施」，故選 (B) preventive measures（預防措施）。take measures 為固定搭配。special opportunities（特殊機會）、potential risks（潛在風險）、significant advantages（顯著優勢）皆與「預防不適」的語意不合。"}, {"id": "G114-20", "year": 114, "no": 20, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "114-P2", "stem": "Looking out into the distance from the vehicle can help 20 .", "options": {"A": "as well", "B": "by far", "C": "at least", "D": "after all"}, "answer": "A", "img": false, "expl": "此句 Looking out into the distance...can help（望向遠方也有幫助），承接前一項建議（選震動最小的座位），再加一項方法，故用 (A) as well（也、同樣）表附加。by far（…得多）、at least（至少）、after all（畢竟）皆不合此處「再補充一個有幫助的方法」之意。"}, {"id": "G114-21", "year": 114, "no": 21, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "...this medieval cathedral is 21 for its intricate architecture, stunning stained glass windows, and, above all, its bells.", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "I", "img": false, "expl": "空格後 for（因…而聞名），且列舉其建築、彩繪玻璃與鐘，可知教堂「以…著稱」，故選 (I) noted。be noted for 為固定片語，意為「以…聞名」。此處需能與介系詞 for 搭配並表被動狀態的分詞形容詞，其他選項語意或詞性皆不合。"}, {"id": "G114-22", "year": 114, "no": 22, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "In fact, there is documented 22 to the ringing of bells even before the cathedral's construction was completed...", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "A", "img": false, "expl": "空格前 documented（有文獻記載的）、後接 to the ringing of bells，指有文獻「提及」鐘聲，故選 (A) reference。documented reference to... 意為「有文獻記載提到…」，reference to 為固定搭配。此空需名詞，且與介系詞 to 搭配，符合語意。"}, {"id": "G114-23", "year": 114, "no": 23, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "The 10 bells vary in size, each 23 a name.", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "B", "img": false, "expl": "each 23 a name 為分詞構句修飾 the 10 bells，意為「每座鐘都有一個名字」，故選 (B) bearing（帶有、具有）。bear a name 意為「取名、具名」，此處用現在分詞表主動伴隨狀態，語法與語意皆合。"}, {"id": "G114-24", "year": 114, "no": 24, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "It is the only one of the whole group that 24 the French Revolution, while the rest were melted down for weapons.", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "F", "img": false, "expl": "空格後 the French Revolution，且對比 while the rest were melted down（其餘被熔毀），可知 Emmanuel 是唯一「倖存/度過」法國大革命的鐘，故選 (F) survived。survive 可當及物動詞，意為「在…中存活下來」，符合語意。"}, {"id": "G114-25", "year": 114, "no": 25, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "...except for Emmanuel, which 25 its renowned, excellent sound.", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "D", "img": false, "expl": "except for Emmanuel, which 25 its...sound，指其他鐘都被更換，唯獨 Emmanuel「保留、維持」其優美音色，故選 (D) retained（保留）。retain its sound 意為「保有其音色」，與前文「其他都被換掉」形成對比。"}, {"id": "G114-26", "year": 114, "no": 26, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "Over centuries, the bells have become a 26 part of life in Paris, where they are known as \"the cathedral's voice.\"", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "C", "img": false, "expl": "the bells have become a 26 part of life（成為生活中…的一部分），因鐘聲數百年來為人熟知（下稱 the cathedral's voice），故選 (C) familiar（熟悉的）。a familiar part of life 意為「生活中熟悉的一部分」，符合語境。"}, {"id": "G114-27", "year": 114, "no": 27, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "They have been used to mark the hours of the day, to call the 27 to prayer...", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "E", "img": false, "expl": "to call the 27 to prayer（召喚…做禱告），教堂鐘聲是召喚「信徒、教徒」祈禱，故選 (E) faithful。the faithful 為「the + 形容詞」表一群人，意指「信徒、虔誠的教徒」，語意與宗教情境相符。"}, {"id": "G114-28", "year": 114, "no": 28, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "They have also rung in times of 28 and of mourning, announcing such events as royal weddings and coronations of kings...", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "G", "img": false, "expl": "in times of 28 and of mourning（在…與哀悼之時），且後接 royal weddings and coronations（皇室婚禮與加冕）等喜事，與 mourning（哀悼）對比，故選 (G) celebration（慶祝、慶典）。times of celebration 意為「歡慶時刻」，與哀悼形成對照。"}, {"id": "G114-29", "year": 114, "no": 29, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "However, after the devastating fire that damaged the cathedral in 2019, the bells fell 29 .", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "J", "img": false, "expl": "2019 年大火後，鐘聲 fell 29，fall silent 為固定用法，意為「歸於沉寂、不再鳴響」，故選 (J) silent。此空需與 fell 構成連綴動詞片語的形容詞，語意上鐘因火災停響，符合上下文。"}, {"id": "G114-30", "year": 114, "no": 30, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "114-P3", "stem": "The building went through a complex and time-consuming process of 30 , and the famous monument was finally reopened on December 8, 2024.", "options": {"A": "reference", "B": "bearing", "C": "familiar", "D": "retained", "E": "faithful", "F": "survived", "G": "celebration", "H": "restoration", "I": "noted", "J": "silent"}, "answer": "H", "img": false, "expl": "a complex and time-consuming process of 30（複雜耗時的…過程），且教堂於 2024 年重新開放，可知指「修復、整修」工程，故選 (H) restoration（修復）。process of restoration 意為「修復過程」，呼應火災後重建再開放的敘述。"}, {"id": "G114-31", "year": 114, "no": 31, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "114-P4", "stem": "（第一段末）...to stay close to populated business districts without spending a lot. 31", "options": {"A": "In response to rising demands, these hotels are embracing a wave of innovation.", "B": "The room's thin plastic walls easily transmit the sound of snoring made by neighboring guests.", "C": "The chambers are stacked side-by-side, two units high, with the upper rooms reached by a ladder.", "D": "Today, they provide low-budget, overnight lodging in commerce centers in large cities worldwide."}, "answer": "D", "img": false, "expl": "首段介紹膠囊旅館源於日本、供商務人士就近住宿，空格作段末總結句，(D) 承接說明「如今它們在全球大城市商業區提供低價過夜住宿」，以 Today 呼應前文的 initially，並將話題擴展到全球，語意連貫，故選 (D)。"}, {"id": "G114-32", "year": 114, "no": 32, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "114-P4", "stem": "...but are often fiberglass or plastic. 32 Each capsule is equipped with a comfortable mattress, a small light...", "options": {"A": "In response to rising demands, these hotels are embracing a wave of innovation.", "B": "The room's thin plastic walls easily transmit the sound of snoring made by neighboring guests.", "C": "The chambers are stacked side-by-side, two units high, with the upper rooms reached by a ladder.", "D": "Today, they provide low-budget, overnight lodging in commerce centers in large cities worldwide."}, "answer": "C", "img": false, "expl": "空格前描述膠囊材質（玻璃纖維或塑膠），後接每個膠囊配有床墊、燈等，(C) 描述「這些艙室並排堆疊、上下兩層，上層以梯子進出」，正好延續對膠囊實體結構的描寫，故選 (C)。其他選項未緊扣此處的結構描述。"}, {"id": "G114-33", "year": 114, "no": 33, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "114-P4", "stem": "...especially in big cities like New York, London, and Paris. 33 Instead of the traditional bare pod-sized style, new chains now feature interior design...", "options": {"A": "In response to rising demands, these hotels are embracing a wave of innovation.", "B": "The room's thin plastic walls easily transmit the sound of snoring made by neighboring guests.", "C": "The chambers are stacked side-by-side, two units high, with the upper rooms reached by a ladder.", "D": "Today, they provide low-budget, overnight lodging in commerce centers in large cities worldwide."}, "answer": "A", "img": false, "expl": "空格前說膠囊旅館已擴展至歐美大城，後句 Instead of the traditional bare pod-sized style, new chains now feature...（新連鎖不再走傳統簡陋風而加入設計），(A)「為因應日益增長的需求，這些旅館正迎接一波創新」正好承上啟下，引出下文的革新，故選 (A)。"}, {"id": "G114-34", "year": 114, "no": 34, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "114-P4", "stem": "Some hotels may not provide air conditioning in the capsules, leading to poor air flow. 34 Also, you may have to share common facilities...", "options": {"A": "In response to rising demands, these hotels are embracing a wave of innovation.", "B": "The room's thin plastic walls easily transmit the sound of snoring made by neighboring guests.", "C": "The chambers are stacked side-by-side, two units high, with the upper rooms reached by a ladder.", "D": "Today, they provide low-budget, overnight lodging in commerce centers in large cities worldwide."}, "answer": "B", "img": false, "expl": "空格前提到某些膠囊不裝冷氣、空氣不流通（缺點），後接 Also, you may have to share common facilities（還得共用設施），(B)「房間薄塑膠牆易傳來鄰客鼾聲」同屬膠囊旅館的缺點，與前後列舉的不便一致，故選 (B)。"}, {"id": "G114-35", "year": 114, "no": 35, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P5", "stem": "What is this passage mainly about?", "options": {"A": "The evolution of traffic control systems.", "B": "The inventors of traffic lights in history.", "C": "The functions of different traffic signals.", "D": "The development of modern transportation."}, "answer": "A", "img": false, "expl": "全文從 Knight 的臂式號誌講到瓦斯燈、電動號誌乃至未來車輛，敘述紅綠燈一路演變，主旨為「交通號誌系統的演進」，故選 (A)。(B) 發明者、(C) 各號誌功能、(D) 現代運輸發展皆只涉部分或偏離全文脈絡，範圍不符。"}, {"id": "G114-36", "year": 114, "no": 36, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P5", "stem": "Which of the following pictures shows Knight's proposed traffic signal?（本題為圖片選擇題，選項 A–D 為四張號誌圖）", "options": {"A": "（圖A）", "B": "（圖B）", "C": "（圖C）", "D": "（圖D）"}, "answer": "C", "img": true}, {"id": "G114-37", "year": 114, "no": 37, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P5", "stem": "Which of the following statements is true, according to the passage?", "options": {"A": "Knight was injured in the explosion of his traffic light.", "B": "Potts' traffic light was the first one to appear in the USA.", "C": "The first traffic signal originated from the idea of a traffic director.", "D": "Future vehicles may not need traffic lights to cross an intersection."}, "answer": "D", "img": false, "expl": "由文末提到未來車輛（如自駕）可能不需紅綠燈即可通過路口，可推知 (D)「未來車輛過路口或許不需紅綠燈」為真。(A) 受傷的是操作的警察而非 Knight；(B) 文中並未說 Potts 的號誌是全美第一；(C) 第一個號誌源自鐵路臂式號誌，非交通指揮員，故皆錯。"}, {"id": "G114-38", "year": 114, "no": 38, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P5", "stem": "Here is a sentence: \"This design was adopted in later traffic light designs across the world.\" Which paragraph is most suitable to have it as the final sentence?", "options": {"A": "Paragraph 1.", "B": "Paragraph 2.", "C": "Paragraph 3.", "D": "Paragraph 4."}, "answer": "C", "img": false, "expl": "待插入句「此設計被後世世界各地的紅綠燈設計採用」須接在介紹某項被廣泛沿用之設計的段落末。第三段（1900 年代美國電動號誌的三色燈設計）正是後世通用的原型，故置於第 3 段末最合適，選 (C)。"}, {"id": "G114-39", "year": 114, "no": 39, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P6", "stem": "What field of study does the research mentioned in the passage most likely belong to?", "options": {"A": "Psychology.", "B": "Education.", "C": "Philosophy.", "D": "Communication."}, "answer": "A", "img": false, "expl": "文章探討恐怖片對觀眾情緒的影響、安全恐懼、宣洩壓抑情緒等，屬人類心理與行為研究，故研究領域最可能為 (A) 心理學。(B) 教育、(C) 哲學、(D) 傳播皆非探討情緒反應與心理效應的核心領域。"}, {"id": "G114-40", "year": 114, "no": 40, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P6", "stem": "What does the author mean by \"learning vicariously\" in the second paragraph?", "options": {"A": "Making inquiries without reservation.", "B": "Gaining knowledge through observation.", "C": "Acquiring insights by face-to-face interaction.", "D": "Obtaining information from personal experience."}, "answer": "B", "img": false, "expl": "vicariously 意為「間接地、替代地」，由上文 take the perspective of the characters and rehearse the plot（代入角色、演練情節）可知觀眾是「透過觀察（他人經歷）獲得知識」，故選 (B)。對比 (D) 從親身經驗獲得，正與 vicarious（非親身）相反，為主要誘答。"}, {"id": "G114-41", "year": 114, "no": 41, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P6", "stem": "Which of the following statements about horror movies can be inferred from the passage?", "options": {"A": "Most horror movie lovers are prone to aggressive behavior.", "B": "There are far more benefits to horror movies than disadvantages.", "C": "COVID-19 was an important source of inspiration for horror movies.", "D": "Watching horror movies may have a long-term effect on personality."}, "answer": "D", "img": false, "expl": "文章雖以「安全恐懼」「替代學習」「情緒宣洩」等說明恐怖片的好處，但第二段提到在受控環境下觀影可能減少負面衝擊並使人「變得更堅強(tougher)」，暗示對觀影者的心理特質有持久影響，故(D)「可能對人格產生長期影響」可由文推知。(A)攻擊傾向、(C)把COVID-19當靈感來源、(B)好處遠多於壞處皆為文中未明言或誇大之推論，屬誘答陷阱。"}, {"id": "G114-42", "year": 114, "no": 42, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P6", "stem": "How does the author develop the ideas in this passage?", "options": {"A": "By defining and illustrating a concept.", "B": "By showing opposing views of an issue.", "C": "By presenting cause and effect of a problem.", "D": "By providing steps for settling a disagreement."}, "answer": "B", "img": false, "expl": "作者先以「有些人覺得恐怖片太可怕而不好玩」對比「許多人卻樂在其中、排隊看新片」，點出好惡兩極(variations in preferences)，接著分述恐怖片的benefits與risks，全篇以正反並陳的方式鋪陳，故選(B)呈現同一議題的對立觀點。此題易誤選(A)定義並舉例，但文章重點不在為單一概念下定義，而在對照兩面意見。"}, {"id": "G114-43", "year": 114, "no": 43, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P7", "stem": "What is the main purpose of the second paragraph in the passage?", "options": {"A": "To discuss the content of alcoholic drinks in ancient Europe.", "B": "To highlight the French impact on Russians' drinking habits.", "C": "To argue against the assumption that Russians are born drinkers.", "D": "To link Russians' vodka consumption to their adoption of Christianity."}, "answer": "C", "img": false, "expl": "第二段開頭即以However轉折反駁「俄國人天生嗜酒」的說法，舉出古俄羅斯飲酒並不普遍、伏特加也非俄國發明等史實，目的在推翻「俄國人是天生酒鬼」這一成見，故選(C)。(D)把伏特加消費與接受基督教連結、(B)強調法國影響皆為段中細節而非主旨，屬以偏概全的誘答。"}, {"id": "G114-44", "year": 114, "no": 44, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P7", "stem": "Which of the following is true about vodka production?", "options": {"A": "Vodka production in Russia started in the 15th century.", "B": "The first vodka made from wheat was imported from France.", "C": "Germany was the biggest vodka producer in medieval Europe.", "D": "Russian people were encouraged to make their own vodka in the 19th century."}, "answer": "A", "img": false, "expl": "第二段明言「The first Russian-made vodka appeared in the 15th century」，故(A)俄國伏特加生產始於15世紀為真。(B)伏特加原是14世紀末自法國傳入的葡萄酒精、非以小麥製成也非成品進口；(C)文中德國人是「歐洲最會喝的人」而非最大伏特加產地；(D)文中無19世紀鼓勵自釀之敘述，皆與原文不符。"}, {"id": "G114-45", "year": 114, "no": 45, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P7", "stem": "What does \"This\" in the fourth paragraph refer to?", "options": {"A": "The alcohol.", "B": "The government.", "C": "The illegal production.", "D": "The state monopoly."}, "answer": "D", "img": false, "expl": "第四段開頭提到俄國政府(the Russian state)在酒業扮演重要角色，隨後語意指向國家對酒類的專賣控制，因此代名詞This指的是前述的「國家專賣(state monopoly)」，選(D)。易誤選(B)the government，但This承接的是政府「壟斷經營」這件事，而非政府本身。"}, {"id": "G114-46", "year": 114, "no": 46, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "114-P7", "stem": "How does the author conclude the passage in the last paragraph?", "options": {"A": "By providing further facts.", "B": "By summarizing the main ideas.", "C": "By raising a new problem.", "D": "By making a future prediction."}, "answer": "A", "img": false, "expl": "末段延續前文，補充更多與俄國飲酒相關的史實資訊來收尾，並未做總結、提出新問題或預測未來，故選(A)提供進一步事實。(B)summarizing易誤選，但作者是新增細節而非歸納前述重點。"}, {"id": "G115-1", "year": 115, "no": 1, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The mayor has such a ______ schedule that it takes weeks to arrange an interview with her.", "options": {"A": "hasty", "B": "tight", "C": "diligent", "D": "routine"}, "answer": "B", "img": false, "expl": "空格修飾schedule且下文說「要花好幾週才能安排採訪」，表示行程排得很滿，故選(B)tight(緊湊的、排滿的)。(A)hasty倉促、(C)diligent勤勉、(D)routine例行的皆無法解釋「難以約到採訪」的因果。"}, {"id": "G115-2", "year": 115, "no": 2, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Jane started as an ______ art designer, but now she has a professional studio of her own.", "options": {"A": "official", "B": "instant", "C": "amateur", "D": "elementary"}, "answer": "C", "img": false, "expl": "由對比句「but now she has a professional studio(如今擁有專業工作室)」可知起初她是非專業的，故選(C)amateur(業餘的)，與professional形成對照。(D)elementary指基礎的，語意不合此職涯轉變的對比。"}, {"id": "G115-3", "year": 115, "no": 3, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The teaching ______ at the famous high school soon attracted more than a dozen well-qualified applicants.", "options": {"A": "career", "B": "vacancy", "C": "expectation", "D": "inspiration"}, "answer": "B", "img": false, "expl": "下文「吸引了十多位條件優秀的applicants(應徵者)」暗示學校有職缺待補，故選(B)vacancy(空缺、職缺)。(A)career生涯、(C)expectation期望、(D)inspiration靈感皆無法解釋為何會招來應徵者。"}, {"id": "G115-4", "year": 115, "no": 4, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Designed by a young engineer, the new product has created far more profit than ______ expected.", "options": {"A": "initially", "B": "genuinely", "C": "alternatively", "D": "fundamentally"}, "answer": "A", "img": false, "expl": "空格與expected搭配，句意為「利潤遠比『當初』預期的多」，故選(A)initially(起初、當初)，與now隱含的時間對比相符。(B)genuinely真誠地、(C)alternatively另外地、(D)fundamentally根本上皆不合語境。"}, {"id": "G115-5", "year": 115, "no": 5, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "It has been confirmed that a balanced ______ of fruit and vegetables is a key element to good health.", "options": {"A": "dimension", "B": "integration", "C": "provision", "D": "consumption"}, "answer": "D", "img": false, "expl": "空格指「均衡攝取蔬果」，consumption of fruit and vegetables即指食物的攝取量，故選(D)consumption(攝取、食用)。(B)integration整合、(C)provision供給雖與蔬果沾邊，但與「有益健康的關鍵」搭配上不如「攝取」貼切。"}, {"id": "G115-6", "year": 115, "no": 6, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "As a shy boy afraid of making public appearances, Timmy ______ the thought of speaking before large audiences.", "options": {"A": "dreads", "B": "stresses", "C": "wanders", "D": "escapes"}, "answer": "A", "img": false, "expl": "由「怕公開露面的害羞男孩」可推知他很『害怕』在眾人面前說話，故選(A)dreads(懼怕、畏懼)，後接名詞thought合乎搭配。(D)escapes意為逃離，且dread the thought of為固定搭配，語意最順。"}, {"id": "G115-7", "year": 115, "no": 7, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "To the newly-crowned winner of the piano competition, music is his life's ______, which he has devoted himself to whole-heartedly.", "options": {"A": "resource", "B": "impact", "C": "passion", "D": "emphasis"}, "answer": "C", "img": false, "expl": "空格與「他全心投入(devoted himself to)」呼應，音樂是他畢生的『熱愛』，故選(C)passion(熱情、熱愛)。(A)resource資源、(B)impact衝擊、(D)emphasis強調皆無法表達傾心投入的情感。"}, {"id": "G115-8", "year": 115, "no": 8, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The drunk driver who shouted at passers-by and ______ them with glass bottles was quickly arrested by the police.", "options": {"A": "shattered", "B": "assaulted", "C": "overturned", "D": "condemned"}, "answer": "B", "img": false, "expl": "酒駕者對路人叫囂並「用玻璃瓶」對他們做出攻擊行為而被捕，故選(B)assaulted(攻擊、襲擊)。(A)shattered是打碎(瓶子本身)、(C)overturned翻覆、(D)condemned譴責皆不能與「用瓶子攻擊人」的動作相符。"}, {"id": "G115-9", "year": 115, "no": 9, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "There were so many people at the bus station that I had to ______ my way through the crowd to board the bus in time.", "options": {"A": "crash", "B": "tumble", "C": "elbow", "D": "struggle"}, "answer": "C", "img": false, "expl": "人潮擁擠，我必須『擠』過人群才能及時上車，elbow one's way through為固定用法，指用手肘擠出一條路，故選(C)elbow。(D)struggle雖有掙扎之意，但後接one's way through the crowd時，elbow更精準表達推擠穿越。"}, {"id": "G115-10", "year": 115, "no": 10, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Deadly shootings on US campuses have raised ______ concerns about how to prevent such tragic incidents from happening again.", "options": {"A": "swift", "B": "brutal", "C": "harsh", "D": "grave"}, "answer": "D", "img": false, "expl": "空格修飾concerns，校園槍擊引發『嚴重、重大』的憂慮，故選(D)grave(嚴重的、重大的)。(A)swift迅速、(B)brutal殘暴、(C)harsh嚴厲皆不與concerns(憂慮)自然搭配；grave concerns為常見搭配。"}, {"id": "G115-11", "year": 115, "no": 11, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P1", "stem": "White rhinoceroses, __11__, do the same thing—only their choice of meeting place is a giant pile of poop.", "options": {"A": "what is more", "B": "it turns out", "C": "in other words", "D": "all in all"}, "answer": "B", "img": false, "expl": "前句說人類總聚在一起分享消息，本句以白犀牛做類比，空格為插入語，意為「事實證明」白犀牛也做同樣的事，故選(B)it turns out(結果、事實證明)。(C)in other words是換句話說、(A)what is more此外，皆不符「引出研究發現」的語氣。"}, {"id": "G115-12", "year": 115, "no": 12, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P1", "stem": "A new study indicates that rhinos have a smelly way to __12__.", "options": {"A": "demonstrate", "B": "immigrate", "C": "communicate", "D": "manipulate"}, "answer": "C", "img": false, "expl": "下文說犀牛在糞便中留訊息「就像人類在社群媒體留言」，可知牠們是用氣味來『溝通』，故選(C)communicate(溝通)。(A)demonstrate示範、(B)immigrate移民、(D)manipulate操縱皆與「傳遞訊息」無關。"}, {"id": "G115-13", "year": 115, "no": 13, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P1", "stem": "different rhinos leave different chemicals in their poop, which provide important __13__ about the age, sex, general health, and reproductive conditions", "options": {"A": "doubts", "B": "icons", "C": "matches", "D": "clues"}, "answer": "D", "img": false, "expl": "糞便中的化學物質提供關於年齡、性別、健康與繁殖狀況的重要『線索』，故選(D)clues(線索)。(A)doubts疑問、(B)icons圖示、(C)matches相配之物皆不符「透露個體資訊」的語意。"}, {"id": "G115-14", "year": 115, "no": 14, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P1", "stem": "When all members in a group know what's going on with each other, it is __14__ that they will fight.", "options": {"A": "hardly surprising", "B": "more acceptable", "C": "truly important", "D": "less likely"}, "answer": "D", "img": false, "expl": "當群體成員彼此了解近況時，發生打鬥的可能性就『較低』，符合前文所述維持和平和諧，故選(D)less likely(較不可能)。(A)hardly surprising不足為奇，語意與「維持和諧」相反，為主要誘答。"}, {"id": "G115-15", "year": 115, "no": 15, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P1", "stem": "They find that dominant males are particularly __15__ the \"fake poop\" that carries chemicals from females ready to mate.", "options": {"A": "responsive to", "B": "annoyed at", "C": "considerate of", "D": "tolerant with"}, "answer": "A", "img": false, "expl": "後文說優勢公犀牛對帶有可交配母犀費洛蒙的假糞「嗅聞更久、更常回到原地」，顯示牠們對此『有反應、感興趣』，故選(A)responsive to(對…有反應)。(B)annoyed at惱怒與其積極行為矛盾。"}, {"id": "G115-16", "year": 115, "no": 16, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P2", "stem": "Teahouses thus sprang up to __16__ the weary travelers, offering them a cup of tea to help them regain energy.", "options": {"A": "accommodate", "B": "compensate", "C": "anticipate", "D": "reinforce"}, "answer": "A", "img": false, "expl": "茶館興起是為了『接待、款待』疲憊的旅人並提供茶水恢復體力，故選(A)accommodate(接待、容納)。(B)compensate補償、(C)anticipate預期、(D)reinforce強化皆不符「服務旅客」的語意。"}, {"id": "G115-17", "year": 115, "no": 17, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P2", "stem": "But the culinary art of dim sum __17__, for it was considered inappropriate to pair tea with food.", "options": {"A": "would hardly develop", "B": "had yet to develop", "C": "was fast developing", "D": "had almost developed"}, "answer": "B", "img": false, "expl": "空格後for子句說明「當時認為茶不宜配食物」，故點心的烹飪藝術此時『尚未發展』；由後文「Centuries later才開始供應點心」可知此處須用『had yet to develop(尚未發展)』，選(B)，時態與語意皆吻合。"}, {"id": "G115-18", "year": 115, "no": 18, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P2", "stem": "Dim sum is more than just an example of Chinese cuisine. It is __18__ an enjoyable dining experience that can span hours.", "options": {"A": "passed on to", "B": "brought up as", "C": "thought to have", "D": "meant to be"}, "answer": "D", "img": false, "expl": "前句說點心不只是中式料理的一例，本句進一步定義它『被視為、旨在成為』一種可延續數小時的用餐體驗，故選(D)meant to be(旨在、被認為是)，語意連貫。(C)thought to have文法與後面名詞不搭。"}, {"id": "G115-19", "year": 115, "no": 19, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P2", "stem": "The small portions were designed to merely \"touch the heart,\" as the name literally means, and __19__ were first enjoyed as snacks.", "options": {"A": "if so", "B": "as such", "C": "by then", "D": "in that"}, "answer": "B", "img": false, "expl": "空格承接前文「小份量原是為了『touch the heart』」，並說明它們『因此、就這樣』最初被當點心享用，故選(B)as such(因此、就其本質而言)。(C)by then到那時、(D)in that因為，皆與此因果承接不合。"}, {"id": "G115-20", "year": 115, "no": 20, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "115-P2", "stem": "It is customary for big groups to enjoy simple dishes together as __20__.", "options": {"A": "a widely known delicacy", "B": "an intimate romantic dinner", "C": "a joyful social activity", "D": "an amazing local cuisine"}, "answer": "C", "img": false, "expl": "由前文「大份團體一起享用簡單菜餚」及全篇強調點心是社交用餐體驗，可知這是一種『愉快的社交活動』，故選(C)a joyful social activity。(B)親密浪漫晚餐與「big groups」矛盾，為明顯誘答。"}, {"id": "G115-21", "year": 115, "no": 21, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "Taking a nap in the middle of the day is by no means __21__.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "E", "img": false, "expl": "空格前有否定詞「by no means(絕非)」，下文又說午睡能讓大腦身體充電、令人精神煥發，故此處應填『沒有生產力的』，配合否定即「絕非沒有效益」，選(E)unproductive。全句採雙重語意肯定午睡的價值。"}, {"id": "G115-22", "year": 115, "no": 22, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "Research has shown that napping is linked with brain size and __22__; specifically, it can boost our cognition and memory.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "G", "img": false, "expl": "空格與brain size並列，且後文說午睡能提升認知與記憶，可知午睡與大腦的『功能』有關，故選(G)function(功能)，與size形成「大小與功能」的搭配。此格需名詞，符合並列結構。"}, {"id": "G115-23", "year": 115, "no": 23, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "our brain starts shrinking, which gradually slows cognition and increases dementia __23__ in later life.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "F", "img": false, "expl": "空格與dementia構成名詞片語，指大腦萎縮會提高日後罹患失智症的『風險』，故選(F)risk(風險)。dementia risk(失智風險)為常見搭配，符合increases…in later life的語意。"}, {"id": "G115-24", "year": 115, "no": 24, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "This suggests that napping may significantly __24__ age-related brain shrinkage, and thus lower the possibility of developing dementia.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "D", "img": false, "expl": "此句說午睡可顯著『延緩』與年齡相關的大腦萎縮，從而降低失智可能，故選(D)delay(延緩)。空格為及物動詞，delay brain shrinkage語意與後文「降低發病可能」的因果一致。"}, {"id": "G115-25", "year": 115, "no": 25, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "For students cramming for college exams, napping will help __25__ acquired knowledge and learned skills.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "A", "img": false, "expl": "考前臨時抱佛腳的學生，午睡有助於『保留』已習得的知識與技能，故選(A)retain(保留、記住)，與enhance memory的脈絡相符。空格後接受詞knowledge and skills，需及物動詞。"}, {"id": "G115-26", "year": 115, "no": 26, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "Some studies recommend napping for 20 to 40 minutes, while others __26__ shorter naps, such as 15 to 20 minutes.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "J", "img": false, "expl": "本句對比「有些研究建議20到40分鐘，其他研究則『指向、主張』更短的午睡」，故選(J)point to(指向、指出)，表示另一派研究的傾向。while帶出兩派不同建議的對比。"}, {"id": "G115-27", "year": 115, "no": 27, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "The best nap length, however, may __27__ a person's physical condition and fatigue level.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "B", "img": false, "expl": "空格後接受詞「一個人的身體狀況與疲勞程度」，句意為最佳午睡長度可能『取決於』這些因素，故選(B)depend on(取決於)，為固定片語且語意最順。"}, {"id": "G115-28", "year": 115, "no": 28, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "For some people, even a five-minute nap can bring about surprisingly __28__ benefits.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "I", "img": false, "expl": "空格修飾benefits，與前文「even a five-minute nap(即使只睡五分鐘)」形成反差，強調短睡也能帶來出乎意料『顯著的』效益，故選(I)dramatic(顯著的、戲劇性的)。"}, {"id": "G115-29", "year": 115, "no": 29, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "So, find yourself a quiet place with __29__ light or with blackout curtains.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "H", "img": false, "expl": "空格修飾light，與「or with blackout curtains(或用遮光窗簾)」並列，皆為營造昏暗助眠環境，故填『微弱的、最少的』光線，選(H)minimal(最少的)。minimal light即光線極少，與遮光窗簾語意呼應。"}, {"id": "G115-30", "year": 115, "no": 30, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "115-P3", "stem": "You can also add some soothing nature sounds to create a relaxing __30__, which can make your naps more effective.", "options": {"A": "retain", "B": "depend on", "C": "atmosphere", "D": "delay", "E": "unproductive", "F": "risk", "G": "function", "H": "minimal", "I": "dramatic", "J": "point to"}, "answer": "C", "img": false, "expl": "空格為名詞，指加入舒緩的自然聲響以營造放鬆的『氛圍』，使午睡更有效，故選(C)atmosphere(氣氛、環境)。relaxing atmosphere為常見搭配。"}, {"id": "G115-31", "year": 115, "no": 31, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "115-P4", "stem": "But does this hold true across time and cultures? __31__ In the West, for example, portraits of men and women before the 1700s typically depicted them with a serious, unsmiling expression.", "options": {"A": "Another crucial factor is a society's immigration diversity.", "B": "Various factors have thus contributed to the phenomenon of smiling.", "C": "For most of recorded human history, the open smile has been deeply unfashionable.", "D": "A genuine smile indicates contentment, while a forced smile suggests underlying distress.", "E": "In fact, there is a well-known Russian proverb that goes, \"Smiling with no reason is a sign of stupidity.\""}, "answer": "C", "img": false, "expl": "空格前作者問「這在不同時代與文化都成立嗎？」，空格後以西方1700年代前肖像多為嚴肅不笑為例，可知空格須是「歷史上多數時期，露齒微笑其實很不流行」的總述句，故選(C)，與後面舉例形成總說—例證的連貫。"}, {"id": "G115-32", "year": 115, "no": 32, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "115-P4", "stem": "in certain cultures the same person can be judged as less intelligent when smiling. __32__", "options": {"A": "Another crucial factor is a society's immigration diversity.", "B": "Various factors have thus contributed to the phenomenon of smiling.", "C": "For most of recorded human history, the open smile has been deeply unfashionable.", "D": "A genuine smile indicates contentment, while a forced smile suggests underlying distress.", "E": "In fact, there is a well-known Russian proverb that goes, \"Smiling with no reason is a sign of stupidity.\""}, "answer": "E", "img": false, "expl": "前句提到某些文化中微笑者反被視為較不聰明，空格後接續文化差異的討論，此處以俄羅斯諺語「無故微笑是愚蠢的表現」作為具體佐證，恰好呼應「微笑被視為不聰明」，故選(E)。In fact帶出強化前句論點的例證。"}, {"id": "G115-33", "year": 115, "no": 33, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "115-P4", "stem": "These are often places where the needs and rights of the individual take precedence over those of the group. __33__ Newcomers from different parts of the world are found to smile more.", "options": {"A": "Another crucial factor is a society's immigration diversity.", "B": "Various factors have thus contributed to the phenomenon of smiling.", "C": "For most of recorded human history, the open smile has been deeply unfashionable.", "D": "A genuine smile indicates contentment, while a forced smile suggests underlying distress.", "E": "In fact, there is a well-known Russian proverb that goes, \"Smiling with no reason is a sign of stupidity.\""}, "answer": "A", "img": false, "expl": "空格前談到「個人的需求與權利凌駕於群體之上」，空格後緊接「來自世界各地的新移民笑得更多」，主題轉向移民多樣性。故選 (A)「另一個關鍵因素是社會的移民多樣性」，以 Another crucial factor 承先啟後，並帶出後句新移民的例子，前後語意完全銜接。誘答 (B) 是總結性語句，應置於全文末尾，放此處會使後文的移民例子失去所屬論點。"}, {"id": "G115-34", "year": 115, "no": 34, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "115-P4", "stem": "For them, smiling is a straightforward way to indicate that one is reliable and trustworthy. __34__ As many psychologists now point out, this simple gesture is in fact far more complicated than it may appear.", "options": {"A": "Another crucial factor is a society's immigration diversity.", "B": "Various factors have thus contributed to the phenomenon of smiling.", "C": "For most of recorded human history, the open smile has been deeply unfashionable.", "D": "A genuine smile indicates contentment, while a forced smile suggests underlying distress.", "E": "In fact, there is a well-known Russian proverb that goes, \"Smiling with no reason is a sign of stupidity.\""}, "answer": "B", "img": false, "expl": "空格前說明微笑被視為可靠、值得信任的直接方式，空格後說「許多心理學家指出，這個簡單動作其實比表面複雜得多」。此處為全文收束，須用總結句，故選 (B)「因此，種種因素共同促成了微笑這個現象」，thus 呼應前文所列的歷史、文化、移民等多項因素，並自然導向結尾對微笑複雜性的評論。"}, {"id": "G115-35", "year": 115, "no": 35, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P5", "stem": "What is this passage mainly about?", "options": {"A": "A renowned Antarctic explorer.", "B": "The extreme weather in Antarctica.", "C": "A challenging voyage to Antarctica.", "D": "The amazing discovery of a sunken ship."}, "answer": "C", "img": false, "expl": "全文以尋獲 Endurance 號沉船為引，主體詳述 Shackleton 1914 年率隊前往南極、船隻受困浮冰、被迫棄船求生的艱險歷程，故主旨為 (C)「一趟前往南極的艱難航程」。誘答 (D) 沉船發現僅是開頭引子，並非全文重心；(A)(B) 皆只涵蓋局部細節，範圍太窄。"}, {"id": "G115-36", "year": 115, "no": 36, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P5", "stem": "Which of the following idioms is closest in meaning to \"exacerbated the situation\" in the third paragraph?", "options": {"A": "Broke the ice.", "B": "Cost an arm and a leg.", "C": "Missed the boat.", "D": "Added fuel to the fire."}, "answer": "D", "img": false, "expl": "exacerbated the situation 意為「使情況惡化」，指冰壓破裂船板後海水灌入、雪上加霜。四個慣用語中，(D) added fuel to the fire（火上加油）正對應「使情勢更糟」之意。誘答 (A) broke the ice 是「打破僵局／緩和氣氛」，語意相反；(B) 花大錢、(C) 錯失良機皆與情境無關。"}, {"id": "G115-37", "year": 115, "no": 37, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P5", "stem": "According to the passage, which of the following is true about Shackleton and his Antarctic expedition?", "options": {"A": "His journey lasted more than two years.", "B": "He was the first man to cross over the Antarctic.", "C": "His team camped out on Elephant Island for five months.", "D": "He sent five crew members on a lifeboat to get help from a whaling station."}, "answer": "A", "img": false, "expl": "由文中日期可推算：1914 年 8 月 4 日啟航，船隻受困九個月、1915 年 10 月棄船，之後尚有海冰漂流與求援，整趟遠征歷時超過兩年，故 (A) 正確。(B) 錯，Shackleton 並未成功橫越南極（此為原定目標卻未達成）；(C)(D) 的地點、人數等細節與文意不符。"}, {"id": "G115-38", "year": 115, "no": 38, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P5", "stem": "Which of the following shows the correct route of the Endurance after leaving South Georgia? (地圖選項，示意路線圖)", "options": {"A": "地圖 (A)", "B": "地圖 (B)", "C": "地圖 (C)", "D": "地圖 (D)"}, "answer": "C", "img": true}, {"id": "G115-39", "year": 115, "no": 39, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P6", "stem": "Which question can the passage answer?", "options": {"A": "Where was the first spiral staircase constructed?", "B": "Who was the first designer of the spiral staircase?", "C": "What is the world's most famous spiral staircase?", "D": "Why is the spiral staircase popular in modern times?"}, "answer": "D", "img": false, "expl": "末段闡述螺旋梯在現代受歡迎的原因（如省空間、具美感等），故文章能回答 (D)「螺旋梯為何在現代廣受歡迎」。誘答 (A) 最早建於何處、(B) 最初設計者、(C) 世上最著名者，文中皆未明確指出，無法由文章回答。"}, {"id": "G115-40", "year": 115, "no": 40, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P6", "stem": "What does \"them\" in the third paragraph refer to?", "options": {"A": "Stairs.", "B": "Confines.", "C": "Attackers.", "D": "Defenders."}, "answer": "A", "img": false, "expl": "第三段提到樓梯狹窄，攻擊者必須一次一人登梯，無法發動集體攻勢；them 指的正是這些窄梯 (A) Stairs。判斷關鍵在於代名詞須回指前面出現的複數名詞 staircases/stairs，且句意為「這些樓梯很窄」，故非指攻擊者或防禦者。"}, {"id": "G115-41", "year": 115, "no": 41, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P6", "stem": "According to the passage, which is a correct time sequence of the materials used in making spiral staircases?", "options": {"A": "stone → iron → steel → glass", "B": "stone → wood → iron → steel", "C": "iron → marble → wood → glass", "D": "marble → wood → stone → concrete"}, "answer": "A", "img": false, "expl": "依文章時間順序，早期螺旋梯以石材與大理石雕成（stone），中世紀後改用木材，接著出現鐵製、鋼製，近代再發展出玻璃材質，故正確順序為 (A) stone → iron → steel → glass。其餘選項材料先後與文中敘述不符。"}, {"id": "G115-42", "year": 115, "no": 42, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P6", "stem": "Which of the following statements can be inferred about spiral staircases in the Medieval Ages?", "options": {"A": "The staircase was too narrow to allow any quick retreat.", "B": "The clockwise design favored right-handed castle defenders.", "C": "The uneven steps made it easier to ascend than descend the stairs.", "D": "The staircase was dark enough for defenders to hide from attackers."}, "answer": "B", "img": false, "expl": "第三段說明樓梯設計為順時針上升，使向上進攻者的右手（持劍手）緊貼中央窄柱，無法有效揮劍，而居高防守者則佔優勢，故可推知 (B)「順時針設計有利於慣用右手的城堡防守者」。誘答 (A)(C)(D) 之退路、階高不均、昏暗藏身等，文中皆未提及，屬過度推論。"}, {"id": "G115-43", "year": 115, "no": 43, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P7", "stem": "What is the passage mainly about?", "options": {"A": "Why east is referred to as the \"Orient.\"", "B": "How maps differ from GPS in function.", "C": "How map orientation evolved over time.", "D": "Why maps were important during the age of exploration."}, "answer": "C", "img": false, "expl": "全文從「為何北方在地圖上方」發問，接續說明古印度朝東、埃及與阿拉伯朝南、後世改為北方在上，闡述地圖方位觀念隨時代演變，故主旨為 (C)「地圖方位如何隨時間演變」。誘答 (A) 東方稱 Orient 僅為文中一個細節，範圍太小。"}, {"id": "G115-44", "year": 115, "no": 44, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P7", "stem": "What does \"this\" refer to in the second paragraph?", "options": {"A": "The word dakshina.", "B": "Physical evidence.", "C": "Ancient India.", "D": "East-orientation of maps."}, "answer": "D", "img": false, "expl": "第二段說古印度地圖多朝東（east-orientation），接著補充「雖無實物證據支持 this」，this 回指前句提到的「地圖朝東定向」這件事，故選 (D)。判斷關鍵為 this 指代前文所述的論點，而非後出現的 dakshina 一詞或 India 本身。"}, {"id": "G115-45", "year": 115, "no": 45, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P7", "stem": "Which of the following is closest in meaning to \"a blip\" in the last paragraph?", "options": {"A": "A temporary state.", "B": "An urgent need.", "C": "A critical decision.", "D": "An advanced system."}, "answer": "A", "img": false, "expl": "a blip 原指螢幕上一閃即逝的光點，引申為「短暫、稍縱即逝的狀態」，末段藉此形容以北方為上只是地圖史上短暫的一個階段，故選 (A) A temporary state。誘答 (B)(C)(D) 之緊急需求、重大決定、先進系統皆與「短暫」之核心語意無關。"}, {"id": "G115-46", "year": 115, "no": 46, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "115-P7", "stem": "Which of the following statements is true?", "options": {"A": "Sailors took the North Star as their final destination.", "B": "The GPS system has a fixed direction for orientation.", "C": "South was placed at the top of maps in the pre-Biblical era.", "D": "Old Islamic maps put south at the top for religious purposes."}, "answer": "D", "img": false, "expl": "文中說最早的穆斯林住在麥加以北，採南方在上的地圖可讓信徒仰望聖城麥加，屬宗教因素，故 (D) 正確。(C) 錯，前聖經時代是「東方」在上而非南方；(A) 北極星是導航參照而非最終目的地；(B) 與文意不符。"}], "listening": []};

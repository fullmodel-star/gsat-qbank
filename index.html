pare 騰出／饒過、(D) oppose 反對皆與「淘氣捉弄」不符。"}, {"id": "G110-2", "year": 110, "no": 2, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Elderly shoppers in this store are advised to take the elevator rather than the _____, which may move too fast for them to keep their balance.", "options": {"A": "airway", "B": "operator", "C": "escalator", "D": "instrument"}, "answer": "C", "img": false, "expl": "句意「建議年長顧客搭電梯而非___，因為它移動太快、恐怕站不穩」。移動快、需保持平衡的是 (C) escalator（電扶梯）。(A) airway 航道、(B) operator 操作員、(D) instrument 儀器皆與此情境無關；關鍵在與 elevator（升降電梯）相對且需 keep balance 的是電扶梯。"}, {"id": "G110-3", "year": 110, "no": 3, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Upon hearing its master's call, the dog wagged its tail, and followed her out of the room _____.", "options": {"A": "obediently", "B": "apparently", "C": "logically", "D": "thoroughly"}, "answer": "A", "img": false, "expl": "本題考副詞修飾動詞 followed，須符合狗聽到主人呼喚後乖乖跟隨的情境。(A) obediently「順從地、乖乖地」正符合狗搖尾巴、聽命跟出房間的畫面。誘答 (B) apparently「顯然地」語意不合，無法描述跟隨的方式。"}, {"id": "G110-4", "year": 110, "no": 4, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Since many of our house plants are from humid jungle environments, they need _____ air to keep them green and healthy.", "options": {"A": "moist", "B": "stale", "C": "crisp", "D": "fertile"}, "answer": "A", "img": false, "expl": "本題考形容詞修飾 air，須配合前句「來自潮濕叢林環境的室內植物」。(A) moist「潮濕的」呼應 humid jungle，植物需要濕潤空氣才能保持翠綠健康。誘答 (B) stale「不新鮮的、悶的」與植物健康需求相反。"}, {"id": "G110-5", "year": 110, "no": 5, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The skydiver managed to land safely after jumping out of the aircraft, even though her _____ failed to open in midair.", "options": {"A": "glimpse", "B": "latitude", "C": "segment", "D": "parachute"}, "answer": "D", "img": false, "expl": "本題考名詞，情境為跳傘者跳出飛機後仍安全著陸「儘管…在空中未能打開」。(D) parachute「降落傘」正符合跳傘與 open in midair 的情境。誘答 (A) glimpse「一瞥」與跳傘無關。"}, {"id": "G110-6", "year": 110, "no": 6, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The invention of the steam engine, which was used to power heavy machines, brought about a _____ change in society.", "options": {"A": "persuasive", "B": "harmonious", "C": "conventional", "D": "revolutionary"}, "answer": "D", "img": false, "expl": "本題考形容詞修飾 change，蒸汽機驅動重型機器，為社會帶來的改變。(D) revolutionary「革命性的、劇烈的」最能形容工業革命帶來的重大變革。誘答 (C) conventional「傳統的」語意相反，無法搭配「帶來改變」。"}, {"id": "G110-7", "year": 110, "no": 7, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "To encourage classroom _____, the teacher divided the class into groups and asked them to solve a problem together with their partners.", "options": {"A": "operation", "B": "interaction", "C": "adjustment", "D": "explanation"}, "answer": "B", "img": false, "expl": "本題考名詞，老師把班級分組、要學生一起合作解題，目的是鼓勵課堂上的什麼。(B) interaction「互動」正呼應分組合作、與同伴共同解題的情境。誘答 (A) operation「操作、運作」不符合同學間交流的語意。"}, {"id": "G110-8", "year": 110, "no": 8, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Lisa _____ onto the ground and injured her ankle while she was playing basketball yesterday.", "options": {"A": "buried", "B": "punched", "C": "scattered", "D": "tumbled"}, "answer": "D", "img": false, "expl": "本題考動詞過去式，情境為打籃球時跌倒受傷腳踝。(D) tumbled「跌倒、摔落」搭配 onto the ground 並導致 injured her ankle，語意最通順。誘答 (B) punched「用拳打」不符合跌倒受傷的因果。"}, {"id": "G110-9", "year": 110, "no": 9, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Hundreds of residents received free testing _____ from the city government to find out if their water contained any harmful chemicals.", "options": {"A": "kits", "B": "trials", "C": "zones", "D": "proofs"}, "answer": "A", "img": false, "expl": "本題考名詞，居民收到市府提供的免費檢測「工具組」以檢驗水中是否含有害化學物質。(A) kits「工具組、套件」正是 testing kit（檢測套組）的固定搭配。誘答 (B) trials「試驗、審判」不符合「收到免費物品做檢測」的語意。"}, {"id": "G110-10", "year": 110, "no": 10, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The 2011 Nobel Peace Prize was awarded _____ to three women for the efforts they made in fighting for women's rights.", "options": {"A": "actively", "B": "earnestly", "C": "jointly", "D": "naturally"}, "answer": "C", "img": false, "expl": "本題考副詞，2011 諾貝爾和平獎「共同」頒給三位女性。(C) jointly「共同地、聯合地」正說明獎項由三人一起分享。誘答 (A) actively「積極地」無法描述獎項頒發的方式。"}, {"id": "G110-11", "year": 110, "no": 11, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The company is _____ and making great profits under the wise leadership of the chief executive officer.", "options": {"A": "applauding", "B": "flourishing", "C": "circulating", "D": "exceeding"}, "answer": "B", "img": false, "expl": "本題考動詞現在分詞，公司在執行長明智領導下正獲得高利潤，可推知公司「蓬勃發展」。(B) flourishing「興盛、繁榮」與 making great profits 語意連貫。誘答 (D) exceeding「超過」為及物動詞，後須接受詞，且語意不完整。"}, {"id": "G110-12", "year": 110, "no": 12, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "It is absolutely _____ to waste your money on an expensive car when you cannot even get a driver's license.", "options": {"A": "absurd", "B": "cautious", "C": "vigorous", "D": "obstinate"}, "answer": "A", "img": false, "expl": "本題考形容詞，情境為「連駕照都拿不到卻花大錢買貴車」是很荒謬的事。(A) absurd「荒謬的、可笑的」最能表達這種不合理。誘答 (B) cautious「謹慎的」與浪費錢的批判語氣不符。"}, {"id": "G110-13", "year": 110, "no": 13, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The problem of illegal drug use is very complex and cannot be traced to merely one _____ reason.", "options": {"A": "singular", "B": "countable", "C": "favorable", "D": "defensive"}, "answer": "A", "img": false, "expl": "本題考形容詞修飾 reason，前句說毒品問題非常複雜，「不能僅歸因於單一原因」。(A) singular「單一的」與 merely one 呼應，強調原因不只一個。誘答 (B) countable「可數的」語意不合。"}, {"id": "G110-14", "year": 110, "no": 14, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The non-profit organization has _____ $1 million over five years to finance the construction of the medical center.", "options": {"A": "equipped", "B": "resolved", "C": "committed", "D": "associated"}, "answer": "C", "img": false, "expl": "本題考動詞，非營利組織「投入」一百萬美元、分五年資助醫療中心興建。(C) committed「投入、承諾撥出（資金）」與金錢、時間搭配，語意最貼切。誘答 (A) equipped「配備」不與金額搭配。"}, {"id": "G110-15", "year": 110, "no": 15, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "One week after the typhoon, some bridges were finally opened and bus service _____ in the country's most severely damaged areas.", "options": {"A": "departed", "B": "resumed", "C": "transported", "D": "corresponded"}, "answer": "B", "img": false, "expl": "本題考動詞過去式，颱風後橋樑終於開通，公車服務在重災區「恢復」運行。(B) resumed「恢復、重新開始」呼應災後復原的情境。誘答 (A) departed「出發、離開」不符「服務恢復」之意。"}, {"id": "G110-16", "year": 110, "no": 16, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P1", "stem": "...a visit to a major European city just would not be the same 16 encountering them: bathing in fountains...", "options": {"A": "as", "B": "for", "C": "though", "D": "without"}, "answer": "D", "img": false, "expl": "本題考介系詞片語。空格後接動名詞 encountering，且句意為「造訪歐洲大城若『沒有』遇見鴿子就不一樣了」。(D) without「沒有」符合語意且可接動名詞。誘答 (A) as 與 (C) though 均無法構成「would not be the same without V-ing」的固定結構。"}, {"id": "G110-17", "year": 110, "no": 17, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P1", "stem": "...the birds are now threatening to 17 the city's historic center, pooping on monuments...", "options": {"A": "set up", "B": "hang on", "C": "take over", "D": "break down"}, "answer": "C", "img": false, "expl": "本題考片語動詞，鴿子在歷史中心到處排泄，威脅要「占據、占領」該區。(C) take over「接管、占據」呼應鴿子大量入侵市中心。誘答 (A) set up「設立」語意相反。"}, {"id": "G110-18", "year": 110, "no": 18, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P1", "stem": "The city council originally proposed 18 the pigeon population by gathering the birds and shooting them.", "options": {"A": "counting", "B": "reducing", "C": "displaying", "D": "maintaining"}, "answer": "B", "img": false, "expl": "本題考動名詞，市議會原本提議用聚集並射殺的方式來處理鴿群，目的是「減少」鴿子數量。(B) reducing「減少」呼應後文捕殺與後段的避孕措施皆為控制數量。誘答 (D) maintaining「維持」語意相反。"}, {"id": "G110-19", "year": 110, "no": 19, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P1", "stem": "...the government was finally persuaded to consider another 19 effective method: giving the pigeons birth control.", "options": {"A": "nearly", "B": "shortly", "C": "precisely", "D": "similarly"}, "answer": "D", "img": false, "expl": "本題考副詞修飾 effective，政府被說服考慮「同樣」有效的另一種方法（避孕）。(D) similarly「同樣地」呼應 another…method，表示與前法一樣有效。誘答 (C) precisely「精確地」不符前後對照語意。"}, {"id": "G110-20", "year": 110, "no": 20, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P1", "stem": "...the pills were placed in 40 bird feeders 20 throughout the city.", "options": {"A": "installing", "B": "installed", "C": "to install", "D": "having installed"}, "answer": "B", "img": false, "expl": "本題考分詞。空格修飾前面的名詞 bird feeders，餵食器「被安置」於全市各處，屬被動關係，故用過去分詞。(B) installed「被安裝的」為過去分詞作後位修飾。誘答 (A) installing 為主動，語意不合。"}, {"id": "G110-21", "year": 110, "no": 21, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P2", "stem": "...the odds of being hit by lightning are 1 in 3,000, 21 the probability of being struck seven different times.", "options": {"A": "if it isn't", "B": "as you can see", "C": "not to mention", "D": "with regard to"}, "answer": "C", "img": false, "expl": "本題考轉折片語。前句說被雷擊機率已是三千分之一，「更別說」被擊中七次的機率了。(C) not to mention「更不用說」用來加強語氣、引出更罕見情況。誘答 (D) with regard to「關於」無法表達遞進強調。"}, {"id": "G110-22", "year": 110, "no": 22, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P2", "stem": "...Sullivan was struck by lightning seven times—and 22 each shock!", "options": {"A": "piloted", "B": "rejected", "C": "survived", "D": "tracked"}, "answer": "C", "img": false, "expl": "本題考動詞過去式，Sullivan 被雷擊七次「而且每次都存活下來」。(C) survived「倖存、活下來」與 each shock 及後文他多次遭雷擊卻仍在世相符。誘答 (B) rejected「拒絕」語意不通。"}, {"id": "G110-23", "year": 110, "no": 23, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P2", "stem": "But after strike four, Sullivan became 23 death and took precautions during lightning strikes.", "options": {"A": "fearful of", "B": "critical of", "C": "doubtful about", "D": "positive about"}, "answer": "A", "img": false, "expl": "本題考形容詞片語，第四次被擊後 Sullivan 開始在雷擊時採取防範措施，可推知他變得「害怕」死亡。(A) fearful of「害怕」呼應 took precautions（採取預防）。誘答 (D) positive about「樂觀」與採取防範的動機矛盾。"}, {"id": "G110-24", "year": 110, "no": 24, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P2", "stem": "...Sullivan, while surveying a campground, felt that a cloud was 24 him, and tried all he could to run...", "options": {"A": "coming after", "B": "getting over", "C": "holding on to", "D": "watching out for"}, "answer": "A", "img": false, "expl": "本題考片語動詞，Sullivan 覺得一朵雲正「追著」他、他拚命想跑卻仍被擊中。(A) coming after「追趕、追逐」呼應前文雲『追』(chased) 他的敘述。誘答 (D) watching out for「當心」不符雲主動逼近的語意。"}, {"id": "G110-25", "year": 110, "no": 25, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P2", "stem": "\"If he was, the first bolt 25 enough.\"", "options": {"A": "was", "B": "had been", "C": "would be", "D": "would have been"}, "answer": "D", "img": false, "expl": "本題考與過去事實相反的假設語氣。前句 If he was（God after me）為對過去的虛擬，主要子句須用「would have + p.p.」。(D) would have been 表示「第一道雷本該就足夠了（但事實並非如此）」。誘答 (C) would be 用於與現在相反，時態不符。"}, {"id": "G110-26", "year": 110, "no": 26, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P3", "stem": "But some mountain ranges of South America, Africa, and Indonesia are also 26 glaciers and ice sheets.", "options": {"A": "home to", "B": "covers of", "C": "roofs over", "D": "room for"}, "answer": "A", "img": false, "expl": "本題考片語，某些熱帶山脈也「擁有」冰河與冰原。(A) home to「是…的所在地、孕育著」為固定用法，主詞為地點時表示該地存在某物。誘答 (C) roofs over 並非慣用搭配，語意不通。"}, {"id": "G110-27", "year": 110, "no": 27, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P3", "stem": "...rising temperatures are posing an 27 threat to the last tropical glaciers in Indonesia's Papua region.", "options": {"A": "occasional", "B": "elaborate", "C": "immediate", "D": "offensive"}, "answer": "C", "img": false, "expl": "本題考形容詞修飾 threat，氣溫上升對僅存的熱帶冰河構成「立即的」威脅。(C) immediate「立即的、迫切的」呼應後文冰河快速消融、十年內恐消失。誘答 (A) occasional「偶爾的」與危機的急迫性相反。"}, {"id": "G110-28", "year": 110, "no": 28, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P3", "stem": "28 already shrunk by 85% to a mere 0.5 square kilometers, Papua's glaciers will completely disappear within a decade...", "options": {"A": "Have", "B": "Had", "C": "Having", "D": "Having been"}, "answer": "C", "img": false, "expl": "本題考分詞構句。空格引導的分詞片語主詞為 Papua's glaciers，冰河「已經」縮減，與主要動詞同主詞且為主動、完成，故用 Having + p.p.。(C) Having（shrunk）為完成式分詞構句。誘答 (D) Having been 為被動，但 shrink 此處為不及物主動，不合。"}, {"id": "G110-29", "year": 110, "no": 29, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P3", "stem": "The disappearance of the glaciers will also leave a significant 29 impact. For many indigenous Papuans, the ice sheets represent a sacred symbol.", "options": {"A": "cultural", "B": "moral", "C": "political", "D": "environmental"}, "answer": "A", "img": false, "expl": "本題考形容詞修飾 impact，後句說冰原對原住民是神聖象徵，故此影響屬「文化」層面。(A) cultural「文化的」呼應 sacred symbol（神聖象徵）。誘答 (D) environmental「環境的」雖與冰河相關，但後文明確談的是宗教文化意義。"}, {"id": "G110-30", "year": 110, "no": 30, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P3", "stem": "...Papua's glaciers are only the \"first to go\" if greenhouse gases are 30 and temperatures continue rising.", "options": {"A": "kept balanced", "B": "made released", "C": "seen dismissed", "D": "left unchecked"}, "answer": "D", "img": false, "expl": "本題考被動片語，若溫室氣體「放任不管」且氣溫持續上升。(D) left unchecked「被放任、未受抑制」符合警告語氣及 continue rising 的因果。誘答 (A) kept balanced「維持平衡」語意相反。"}, {"id": "G110-31", "year": 110, "no": 31, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "Research shows that 31 amounts of exercise—even just 15 minutes a day—helps ease depression...", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "J", "img": false, "expl": "本題文意選填。空格修飾 amounts of exercise，後接「即使一天只要15分鐘」，可知是「適量、少量」的運動。(J) modest「適度的、不多的」呼應 even just 15 minutes。誘答 (E) demanding 為「費力的」語意相反。"}, {"id": "G110-32", "year": 110, "no": 32, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "...you don't have to be a fitness 32 to do it.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "G", "img": false, "expl": "本題文意選填，句意為做運動使人快樂，「你不必是健身『狂熱者』才能做」。(G) fanatic「狂熱者、迷」符合 a fitness fanatic（健身狂）的搭配。名詞位置搭配冠詞 a 也符合。"}, {"id": "G110-33", "year": 110, "no": 33, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "What you need to do is to make \"start slow and have fun\" a motto to 33 .", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "F", "img": false, "expl": "本題文意選填，句意為把「慢慢開始、享受樂趣」當作要「遵循」的座右銘。(F) abide by「遵守、遵循」為片語動詞，可接 motto 作先行詞的不定詞修飾（a motto to abide by）。語意上座右銘是用來奉行的。"}, {"id": "G110-34", "year": 110, "no": 34, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "In fact, 34 health studies prove that exercise doesn't have to hurt to be effective.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "H", "img": false, "expl": "本題文意選填，空格修飾 health studies，句意為「最新的」健康研究證明運動不必痛苦才有效。(H) current「當前的、最新的」呼應前句 old-fashioned 的對比，強調新近觀點。"}, {"id": "G110-35", "year": 110, "no": 35, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "You might 35 that if working out doesn't give you pain, it isn't working.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "D", "img": false, "expl": "本題文意選填，句意為「你可能會『主張／認為』運動若不痛就沒效果」。(D) argue「主張、認為」接 that 子句，符合陳述一種常見觀念的語意。此為動詞位置，配合助動詞 might。"}, {"id": "G110-36", "year": 110, "no": 36, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "According to fitness trainers, physically 36 exercises may make you breathe heavily and your muscles may ache temporarily...", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "E", "img": false, "expl": "本題文意選填，空格與 physically 搭配修飾 exercises，句意為「體力上『吃力的』運動會讓你喘、肌肉暫時痠痛」。(E) demanding「費力的、要求高的」呼應 breathe heavily、muscles ache。誘答 (J) modest 語意相反。"}, {"id": "G110-37", "year": 110, "no": 37, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "In fact, if it is, it may 37 an injury or muscle strain.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "C", "img": false, "expl": "本題文意選填，句意為若運動真的很痛，它可能「顯示、意味著」受傷或肌肉拉傷。(C) point to「指向、顯示、暗示」為片語動詞，接 an injury，表示疼痛是傷害的徵兆。"}, {"id": "G110-38", "year": 110, "no": 38, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "...get results without the 38 or discomfort some people associate with exercise.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "B", "img": false, "expl": "本題文意選填，句意為許多運動能有成效卻沒有某些人聯想到的「痠痛」或不適。(B) soreness「痠痛」與 discomfort（不適）並列，且呼應前文 muscles ache。名詞位置搭配 the。"}, {"id": "G110-39", "year": 110, "no": 39, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "...even short periods of low-impact exercise serve as a powerful 39 to improve your health.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "A", "img": false, "expl": "本題文意選填，句意為即使短時間的低衝擊運動也是改善健康的有力「方法、工具」。(A) means「方法、手段」搭配 a powerful means to improve，語意通順。means 作「方法」解時單複數同形，可接不定詞。"}, {"id": "G110-40", "year": 110, "no": 40, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "So, no matter how busy you are, try to 40 for exercise every day, like a 15-minute walk with your dog.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "I", "img": false, "expl": "本題文意選填，句意為無論多忙都要每天「抽出時間」運動，例如遛狗15分鐘。(I) make time「挪出時間、抽空」為固定片語，呼應開頭 fit exercise into your busy schedule 的主旨。"}, {"id": "G110-41", "year": 110, "no": 41, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P5", "stem": "What is the purpose of this passage?", "options": {"A": "To argue for the benefits of nopales.", "B": "To introduce a new source of energy.", "C": "To predict the future agriculture policy of Mexico.", "D": "To change people's ideas about energy consumption."}, "answer": "B", "img": false, "expl": "全文主旨在介紹仙人掌（nopal）除了食用外的「新用途」——把過去被丟棄的外殼轉化為再生能源（biogas）。第一段末句「a new use...producing renewable energy」即點題，故選(B)介紹一種新能源。誘答(A)只講nopales的好處，屬於文章背景而非主旨，範圍太窄。"}, {"id": "G110-42", "year": 110, "no": 42, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P5", "stem": "Which of the following is NOT mentioned as a function of the prickly pear?", "options": {"A": "For treating illnesses.", "B": "For personal hygiene.", "C": "For food and beverage.", "D": "For gardening and landscaping."}, "answer": "D", "img": false, "expl": "本題問文中「未提及」的功能。文中提到modern-day Mexicans eat it、drink it（食物與飲料，對應C）、use it in medicines（治病，對應A）、shampoos（個人衛生，對應B）。唯獨(D)園藝造景（gardening and landscaping）全文未提，故為正解。"}, {"id": "G110-43", "year": 110, "no": 43, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P5", "stem": "Which of the following statements about the prickly pear cactus is true?", "options": {"A": "Its soft inner part is often discarded.", "B": "It was not discovered until the modern era.", "C": "It turns into 200,000 tons of waste in Mexico each year.", "D": "It appears in a prominent place on Mexico's national flag."}, "answer": "D", "img": false, "expl": "第一段首句說仙人掌occupies a prime spot on Mexico's national flag（位於國旗顯眼位置），對應(D)。(A)錯在被丟棄的是thick outer husk外殼而非soft inner part；(B)ancient Aztecs早已視為神聖，非現代才發現；(C)200,000噸是年產量而非廢料量，混淆數據。"}, {"id": "G110-44", "year": 110, "no": 44, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P5", "stem": "What advantage does the prickly pear cactus have over other biofuel crops?", "options": {"A": "It generates more energy.", "B": "It will not influence food prices.", "C": "It may replace feed for livestock.", "D": "It can increase global food production."}, "answer": "B", "img": false, "expl": "第三段（及末段延伸）強調用來發電的是原本廢棄的husk外殼，不佔用可食部分，因此不像玉米等生質作物會與糧食爭地、推高食物價格，故選(B)不影響糧價。此題考的是仙人掌相較其他生質燃料作物的優勢，其餘選項文中無據。"}, {"id": "G110-45", "year": 110, "no": 45, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P6", "stem": "How is the information in the passage organized?", "options": {"A": "In order of time.", "B": "By cause and effect.", "C": "In order of importance.", "D": "By definition and illustration."}, "answer": "A", "img": false, "expl": "本篇談護照（travel document）的演變：從西元前450年、中世紀伊斯蘭、中世紀歐洲、到亨利五世等，依「時間先後」鋪陳，故選(A)。誘答(B)因果、(D)定義舉例皆非本篇主要組織方式。"}, {"id": "G110-46", "year": 110, "no": 46, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P6", "stem": "Which of the following statements is true about the earliest travel document?", "options": {"A": "It was issued by the king of Judah.", "B": "It was given to an official of Persia.", "C": "It appeared more than three thousand years ago.", "D": "It served to invite people to travel beyond the river."}, "answer": "B", "img": false, "expl": "第一段說Nehemiah是serving King Artaxerxes of ancient Persia的官員，國王給他一封信作通行證，故最早的旅行文件是給(B)波斯的一位官員。(A)發信的是波斯王而非猶大王；(C)約西元前450年，約2500年前而非三千多年；(D)是請求安全通行而非邀人旅行。"}, {"id": "G110-47", "year": 110, "no": 47, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P6", "stem": "When did the term \"passport\" start being used?", "options": {"A": "In about 450 B.C.", "B": "During World War I.", "C": "In the 16th century.", "D": "During King Henry V's reign."}, "answer": "C", "img": false, "expl": "本題須依後段（passage未完但依史實與文脈）判斷。文中亨利五世被認為與早期護照有關，而「passport」一詞正式使用約在16世紀，故選(C)。(A)西元前450年只是最早類似文件出現的時間，非該詞開始使用之時，屬時間點混淆的誘答。"}, {"id": "G110-48", "year": 110, "no": 48, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P6", "stem": "Which of the following is NOT mentioned in the passage as a form of passport?", "options": {"A": "A letter.", "B": "A receipt.", "C": "A proof of identity.", "D": "A list of seaports."}, "answer": "D", "img": false, "expl": "本題問「未提及」作為護照形式者。文中提到a letter（信，Nehemiah案例，對應A）、the bara'a即a receipt for taxes（收據，對應B）、以及顯示身分受保護的證明（對應C）。而(D)「一份海港清單」文中提及的是列出可進入的城鎮，且海港多不需文件，故未被列為護照形式，為正解。"}, {"id": "G110-49", "year": 110, "no": 49, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P7", "stem": "Which of the following is the closest illustration of Benjamin Franklin's invention?（本題選項為圖片）", "options": {"A": "（圖片選項 A）", "B": "（圖片選項 B）", "C": "（圖片選項 C）", "D": "（圖片選項 D）"}, "answer": "D", "img": true}, {"id": "G110-50", "year": 110, "no": 50, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P7", "stem": "Which of the following statements is true about how the glass armonica works?", "options": {"A": "Water has to be poured into the glass hemispheres.", "B": "Colored paint makes it sound better and last longer.", "C": "An iron rod is used to strike the thicker glass hemispheres.", "D": "The performer's fingers have to be slightly wet when playing it."}, "answer": "D", "img": false, "expl": "第二段末句Franklin moistened his fingers and held them against the rims（把手指沾濕後按在玻璃邊緣）即演奏原理，故選(D)手指須微濕。(A)不需注水；(B)上色只是標示音符（identify the notes），非改善音質；(C)是Franklin而非鐵棒去敲擊，且鐵棒是用來串接旋轉玻璃碗的。"}, {"id": "G110-51", "year": 110, "no": 51, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P7", "stem": "According to the passage, why did the glass armonica lose its popularity?", "options": {"A": "The skill of playing the glass armonica was very hard to master.", "B": "Famous musicians like Beethoven had problems composing for it.", "C": "Concert halls became too big for its music to be heard by the audience.", "D": "Reviewers in that time indicated that it was clumsy and not fashionable."}, "answer": "C", "img": false, "expl": "依後段內容，玻璃琴音量較小，隨著演奏場地（concert halls）越蓋越大，其樂音無法讓聽眾聽見而漸失人氣，故選(C)。此題考失去人氣的原因，(A)難學、(D)被評為笨重過時等雖似合理，但非文中所述的主因。"}, {"id": "G110-52", "year": 110, "no": 52, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P7", "stem": "What does the highlighted \"they\" in the second paragraph refer to?", "options": {"A": "Iron rods.", "B": "Hemispheres.", "C": "Colored notes.", "D": "Musical pitches."}, "answer": "B", "img": false, "expl": "第二段句子so that they could nest together from largest to smallest（由大到小疊套在一起）。能依大小相疊的是玻璃半球（hemispheres），故they指(B)。前文剛提到Franklin用鐵棒穿過每個半球頂端的孔，使其可相疊，指涉對象即半球。"}, {"id": "G110-53", "year": 110, "no": 53, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P8", "stem": "What is the passage mainly about?", "options": {"A": "The new addition to Morgan's Wonderland.", "B": "The establishment and features of a special theme park.", "C": "The advanced technological devices in Morgan's Wonderland.", "D": "The needs of people who suffer from physical and mental disabilities."}, "answer": "B", "img": false, "expl": "全文介紹Morgan's Wonderland這座專為身障兒童打造的特殊主題樂園之緣起（Hartman因女兒而創建）與各項特色（免費入場、輪椅友善、各式遊樂設施、GPS手環等），故主旨為(B)一座特殊主題樂園的建立與特色。(A)(C)(D)皆只涉單一面向，範圍過窄。"}, {"id": "G110-54", "year": 110, "no": 54, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P8", "stem": "What does \"ultra-accessible\" in the second paragraph imply?", "options": {"A": "It's easy for all visitors to use the facilities.", "B": "Admission is free for people young and old.", "C": "Wheelchairs are provided for every featured attraction.", "D": "Morgan's Wonderland is situated in a convenient location."}, "answer": "A", "img": false, "expl": "ultra-accessible字面為「極度無障礙」，第三段說明樂園完全輪椅友善、設施皆改裝以容納所有人，故其涵義為(A)所有訪客都能輕鬆使用設施。(B)免費入場、(D)地點方便皆非accessible一詞所指，屬望文生義的誘答。"}, {"id": "G110-55", "year": 110, "no": 55, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P8", "stem": "Which of the following is NOT mentioned as a fun activity in the park?", "options": {"A": "Fishing.", "B": "Driving.", "C": "Hiking.", "D": "Picnicking."}, "answer": "C", "img": false, "expl": "本題問「未提及」的遊樂活動。第三段列出fishing lake（釣魚，對應A）、Off-Road Adventure駕駛（對應B）、picnic areas（野餐，對應D）。唯獨(C)健行（hiking）全文未提，故為正解。"}, {"id": "G110-56", "year": 110, "no": 56, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "110-P8", "stem": "Which of the following statements is true about Morgan's Wonderland?", "options": {"A": "Waterproof chairs enable visitors to roam all over the park.", "B": "Morgan's Inspiration Island includes 25 acres of attractions.", "C": "The success of the park is exactly what Morgan intended to achieve.", "D": "GPS bands allow visitors to enjoy the convenience of the electronic devices."}, "answer": "D", "img": false, "expl": "第三段提到每位遊客可配戴GPS Adventure Band以互相定位追蹤，屬電子裝置帶來的便利，故選(D)。(A)文中未提防水椅供遊遍全園；(B)25英畝指的是主樂園而非Inspiration Island；(C)樂園的成功並非女兒Morgan所能規劃達成（她有嚴重認知障礙），敘述不合文意。"}, {"id": "G111-1", "year": 111, "no": 1, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "When Jeffery doesn't feel like cooking, he often orders pizza online and has it ______ to his house.", "options": {"A": "advanced", "B": "delivered", "C": "offered", "D": "stretched"}, "answer": "B", "img": false, "expl": "句意：Jeffery不想煮飯時，常網路訂披薩並「外送」到家。have it delivered為have+受詞+過去分詞的使役結構，表示披薩「被送」，故選(B)delivered（遞送）。(A)advanced推進、(C)offered提供、(D)stretched伸展皆不合送餐語意。"}, {"id": "G111-2", "year": 111, "no": 2, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Jane is the best ______ I have ever had. I cannot imagine running my office without her help.", "options": {"A": "assistant", "B": "influence", "C": "contribution", "D": "politician"}, "answer": "A", "img": false, "expl": "句意：Jane是我遇過最好的「助理」，沒有她的幫忙我無法經營辦公室。由後句「幫忙經營辦公室」可知需一個協助者，故選(A)assistant（助理）。(B)influence影響、(C)contribution貢獻、(D)politician政治人物皆與職務協助語意不符。"}, {"id": "G111-3", "year": 111, "no": 3, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The temple celebrated Mazu Festival by hosting ten days of lion dances, Taiwanese operas, and traditional hand ______ shows.", "options": {"A": "chat", "B": "quiz", "C": "puppet", "D": "variety"}, "answer": "C", "img": false, "expl": "句意：廟方以舞獅、歌仔戲和傳統手「偶」戲慶祝媽祖祭。hand puppet為「布袋戲／手偶」的固定搭配，故選(C)puppet。與lion dances、Taiwanese operas並列的傳統表演藝術，唯puppet shows成立。"}, {"id": "G111-4", "year": 111, "no": 4, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The new vaccine was banned by the Food and Drug Administration due to its ______ fatal side effects.", "options": {"A": "potentially", "B": "delicately", "C": "ambiguously", "D": "optionally"}, "answer": "A", "img": false, "expl": "句意：新疫苗因其「可能」致命的副作用而遭禁。空格為修飾fatal的副詞，potentially fatal（潛在致命的）語意最貼切，故選(A)。(B)精緻地、(C)含糊地、(D)可選擇地皆無法合理修飾「致命副作用」。"}, {"id": "G111-5", "year": 111, "no": 5, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "______ the photos with dates and keywords help you sort them easily in your file.", "options": {"A": "Tagging", "B": "Flocking", "C": "Rolling", "D": "Snapping"}, "answer": "A", "img": false, "expl": "句意：為照片「加上」日期和關鍵字標籤有助於歸檔整理。Tagging the photos with...為動名詞當主詞，tag意為「加標籤」，與後文sort、file呼應，故選(A)Tagging。(B)群聚、(C)滾動、(D)快照皆不合「標註整理」語意。"}, {"id": "G111-6", "year": 111, "no": 6, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "An ______ person is usually pleasant and easy to get along with, but don't expect that he or she will always say \"yes\" to everything.", "options": {"A": "enormous", "B": "intimate", "C": "agreeable", "D": "ultimate"}, "answer": "C", "img": false, "expl": "句意：「隨和的」人通常討喜好相處，但別期望他事事都說yes。由pleasant and easy to get along with可推知形容個性親切好相處，agreeable即「隨和、令人愉快的」，故選(C)。(A)巨大、(B)親密、(D)最終的皆不合。"}, {"id": "G111-7", "year": 111, "no": 7, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Hidden deep in a small alley among various tiny shops, the entrance of the Michelin star restaurant is barely ______ to passersby.", "options": {"A": "identical", "B": "visible", "C": "available", "D": "remarkable"}, "answer": "B", "img": false, "expl": "句意：米其林餐廳入口藏在小巷深處，對路人幾乎「看不見」。由hidden deep、barely（幾乎不）可知入口難以被看到，visible（看得見的）最貼切，故選(B)。(A)相同、(C)可取得、(D)出色皆不合視覺可見語意。"}, {"id": "G111-8", "year": 111, "no": 8, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The original budget for my round-island trip was NT$5,000, but the ______ cost is likely to be 50 percent higher.", "options": {"A": "moderate", "B": "absolute", "C": "promising", "D": "eventual"}, "answer": "D", "img": false, "expl": "句意：環島旅行原始預算五千元，但「最終」花費可能高出五成。original（原始）與空格形成對比，指最後實際費用，eventual（最終的）最合，故選(D)。(A)適中、(B)絕對、(C)有前途的皆無法與original對照。"}, {"id": "G111-9", "year": 111, "no": 9, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "After watching a TV program on natural history, Adam decided to go on a ______ for dinosaur fossils in South Dakota.", "options": {"A": "trial", "B": "route", "C": "strike", "D": "quest"}, "answer": "D", "img": false, "expl": "句意：看完自然史節目後，Adam決定去南達科他州「尋找」恐龍化石。go on a quest for意為「踏上尋找…之旅」，故選(D)quest（尋求）。(A)trial試驗、(B)route路線、(C)strike罷工皆不與for搭配表尋找。"}, {"id": "G111-10", "year": 111, "no": 10, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "With pink cherry blossoms blooming everywhere, the valley ______ like a young bride under the bright spring sunshine.", "options": {"A": "bounces", "B": "blushes", "C": "polishes", "D": "transfers"}, "answer": "B", "img": false, "expl": "句意：粉紅櫻花處處綻放，山谷在春陽下像新娘般「泛紅／羞紅」。以blush（臉紅、泛紅）擬人化，呼應pink cherry blossoms與young bride的意象，故選(B)。(A)彈跳、(C)擦亮、(D)轉移皆無法呼應「新娘泛紅」的譬喻。"}, {"id": "G111-11", "year": 111, "no": 11, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P1", "stem": "The concept was 11 by Richard Booth, who opened the first second-hand bookshop in Hay-on-Wye, UK in 1961.", "options": {"A": "initiated", "B": "represented", "C": "acknowledged", "D": "manipulated"}, "answer": "A", "img": false, "expl": "句意：這概念由Richard Booth所「開創」。空格為被動語態的過去分詞，指概念被開創發起，initiate（發起、創始）最合，故選(A)。(B)代表、(C)承認、(D)操縱皆不合「首創概念」語意，且與後文「開設第一家二手書店」呼應。"}, {"id": "G111-12", "year": 111, "no": 12, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P1", "stem": "Since the 1970s, book towns like Hay-on-Wye 12 up all over the world.", "options": {"A": "spring", "B": "sprang", "C": "had sprung", "D": "have been springing"}, "answer": "D", "img": false, "expl": "考點為時態。句首Since the 1970s（自1970年代以來）須搭配「現在完成（進行）式」，表示從過去持續至今書鎮不斷冒出，故選(D)have been springing。(B)過去式、(C)過去完成式皆不能與Since+過去時間點+持續至今連用。"}, {"id": "G111-13", "year": 111, "no": 13, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P1", "stem": "Although all book towns have a great number of bookshops, that's where the similarities 13 .", "options": {"A": "form", "B": "count", "C": "end", "D": "matter"}, "answer": "C", "img": false, "expl": "句意：雖然書鎮都有大量書店，但相似處「到此為止」。that's where the similarities end為固定表達，意為「相似之處僅止於此」，下文接著描述各鎮的獨特差異，故選(C)end。(B)count、(D)matter雖為常見動詞，但不構成此慣用語意。"}, {"id": "G111-14", "year": 111, "no": 14, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P1", "stem": "Clunes, in Australia, holds a monthly book talk that hosts authors to discuss their latest 14 .", "options": {"A": "trends", "B": "releases", "C": "agendas", "D": "announcements"}, "answer": "B", "img": false, "expl": "句意：Clunes每月辦書談，邀作者討論他們最新的「作品／新書」。latest releases指最新出版品，與hosts authors（邀作者）呼應，故選(B)releases。(A)趨勢、(C)議程、(D)公告皆非作者所要討論的著作。"}, {"id": "G111-15", "year": 111, "no": 15, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P1", "stem": "As digital reading is changing our traditional way of reading, book towns like Hay-on-Wye are particularly important to 15 .", "options": {"A": "get their worldwide fame", "B": "conform to the new mode", "C": "make their visitors satisfied", "D": "keep the printed word alive"}, "answer": "D", "img": false, "expl": "句意：在數位閱讀改變閱讀方式之際，像Hay-on-Wye這類書鎮對「延續紙本文字」格外重要。後文強調書的觸感、氣味、保存實體書之重要，故選(D)keep the printed word alive（讓印刷文字存續）。(B)順應新模式與文旨相反。"}, {"id": "G111-16", "year": 111, "no": 16, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P2", "stem": "The round windows are indeed pleasant to the eye, but they actually were designed for reasons 16 aesthetics.", "options": {"A": "contrary to", "B": "except for", "C": "more of", "D": "other than"}, "answer": "D", "img": false, "expl": "句意：圓窗雖賞心悅目，但其設計是基於美觀「以外」的原因。other than aesthetics意為「美觀之外」，與下文安全考量呼應，故選(D)。(A)與…相反、(B)除了（表排除）、(C)more of皆不能正確表達「不只是為了美觀」的轉折。"}, {"id": "G111-17", "year": 111, "no": 17, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P2", "stem": "In the early days of aviation, plane windows 17 square in shape.", "options": {"A": "used to be", "B": "were to be", "C": "would have been", "D": "must have been"}, "answer": "A", "img": false, "expl": "考點為過去習慣。句意：航空初期，飛機窗戶「以前是」方形。used to be表過去的狀態（現已改變），與後文改為圓窗形成對比，故選(A)。(B)were to be註定、(C)本會、(D)想必當時皆不合「過去長期如此」的語意。"}, {"id": "G111-18", "year": 111, "no": 18, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P2", "stem": "The problem is 18 when airplanes fly at higher altitudes, where the difference between the inside and outside pressure increases.", "options": {"A": "disguised", "B": "understood", "C": "confronted", "D": "intensified"}, "answer": "D", "img": false, "expl": "句意：飛機在高空飛行、內外壓差增大時，問題會「加劇」。由increases、causing added stress可知壓力使問題變嚴重，intensify（加劇）最合，故選(D)。(A)被掩飾、(B)被理解、(C)被面對皆與「問題惡化」語意不符。"}, {"id": "G111-19", "year": 111, "no": 19, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P2", "stem": "When subjected to repeated pressurization high in the sky, the four corners on a square window may 19 .", "options": {"A": "cause conflict", "B": "rebuild strength", "C": "spell disaster", "D": "endure shock"}, "answer": "C", "img": false, "expl": "句意：方窗四角承受反覆增壓時，可能「釀成災難」。spell disaster為固定片語，意為「招致災禍」，呼應前文三架飛機解體，故選(C)。(A)引起衝突、(B)重建強度、(D)承受衝擊皆不合方窗弱點導致失事的脈絡。"}, {"id": "G111-20", "year": 111, "no": 20, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "111-P2", "stem": "Circular shapes are also stronger and resist deformation, and therefore can 20 extreme differences in pressure inside and outside of an aircraft.", "options": {"A": "tolerate", "B": "improve", "C": "justify", "D": "obtain"}, "answer": "A", "img": false, "expl": "句意：圓形較堅固、抗變形，因此能「承受」機艙內外的極端壓差。tolerate（耐受、承受）與resist deformation呼應，故選(A)。(B)改善、(C)證明合理、(D)獲得皆不合「承受壓差」語意。"}, {"id": "G111-21", "year": 111, "no": 21, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "the person is paid to do daring actions that are deemed too 21 for the regular actor to perform", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "C", "img": false, "expl": "文意選填。句意：特技演員做的是被認為對一般演員而言太「危險」的動作。由後文jumping from heights、crashing cars等危險動作可知，too risky（太冒險的）最合，故選(C)risky。空格後接for the regular actor，需形容詞，risky符合。"}, {"id": "G111-22", "year": 111, "no": 22, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "Stunt work emerged out of 22 over time.", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "I", "img": false, "expl": "句意：特技工作是隨時間「出於必要」而生。emerge out of necessity意為「因需要而產生」，呼應下文演員受傷後才發展出專門特技人員，故選(I)necessity（必要）。介系詞out of後接名詞，necessity符合語法與語意。"}, {"id": "G111-23", "year": 111, "no": 23, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "There were, however, no 23 crew members to perform impressive stunts at that time.", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "F", "img": false, "expl": "句意：當時並沒有「專業的」劇組人員來表演特技。空格修飾crew members需形容詞，professional（專業的）與下文「未受訓練、邊拍邊學」形成對比，故選(F)。指早期缺乏受過訓練的專業特技人員。"}, {"id": "G111-24", "year": 111, "no": 24, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "These people were not trained to perform stunts, so they often 24 things for the first time during the actual shooting.", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "H", "img": false, "expl": "空格前說這些人未受特技訓練，空格後有 things for the first time during the actual shooting（在正式拍攝時第一次做這些事），故填 (H) tried out（嘗試、試做）最合語意：他們常在正式開拍時才第一次試做這些動作。tried out sth 為「試做／試驗某事」。誘答 (E) witnessed（目睹）語意不符，因主詞是自己去做而非旁觀。"}, {"id": "G111-25", "year": 111, "no": 25, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "They had to learn from their own mistakes, which 25 some their lives, and almost all suffered light or severe injuries.", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "D", "img": false, "expl": "空格所在 which 引導的關係子句以 some their lives 為受詞，配合後文 almost all suffered injuries（幾乎都受了傷），可知犯錯讓某些人「付出」了性命，故選 (D) cost。cost sb sth 為「使某人付出（生命／代價）」的固定用法。誘答 (E) witnessed 無法與 lives 構成「奪走性命」的語意。"}, {"id": "G111-26", "year": 111, "no": 26, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "audiences developed a taste for serial action movies, which 26 the use of dedicated stunt people to perform in dangerous scenes.", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "G", "img": false, "expl": "空格主詞為 serial action movies（連續動作片受歡迎），受詞為 the use of dedicated stunt people，語意應為「這種電影需要／促成專職特技人員的使用」，故選 (G) called for（需要、要求）。call for 意為「需要、有必要」。誘答 (A) possible 為形容詞，無法作及物動詞帶受詞，詞性不符。"}, {"id": "G111-27", "year": 111, "no": 27, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "many cowboys with masterful skills on horseback found a new 27 as a stunt person.", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "J", "img": false, "expl": "空格前有冠詞 a new，且後接 as a stunt person，需要名詞表「新的職業／出路」，故選 (J) career（職業、生涯）：許多騎術高超的牛仔找到了特技演員這條新職業之路。誘答 (I) necessity（必需品）語意不合，無法搭配 as a stunt person。"}, {"id": "G111-28", "year": 111, "no": 28, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "The 1960s and '70s 28 the development of most modern stunt technology, like air rams and bullet squibs.", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "E", "img": false, "expl": "主詞為時間 The 1960s and '70s，受詞為 the development of stunt technology，此處用擬人手法表「這段時期見證了現代特技技術的發展」，故選 (E) witnessed（見證）。witness 除「目睹」外常用於「（某時期／某地）見證某事發生」。誘答 (G) called for 語意上時代本身不會「要求」技術發展，較不貼切。"}, {"id": "G111-29", "year": 111, "no": 29, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "CGI is widely used in filmmaking, and it is now 29 to create very lifelike scenes without using real stunt people.", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "A", "img": false, "expl": "空格前為 it is now ___，且後接不定詞 to create...，構成 it is + 形容詞 + to V 句型，需形容詞，故選 (A) possible：如今用 CGI 不必真人特技就能製造逼真場景是「可能的」。誘答 (D) cost 為名詞／動詞，無法置於 be 動詞後接不定詞當形容詞用。"}, {"id": "G111-30", "year": 111, "no": 30, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "111-P3", "stem": "there will always be a demand for the realism and thrilling 30 of an actual stunt.", "options": {"A": "possible", "B": "sensation", "C": "risky", "D": "cost", "E": "witnessed", "F": "professional", "G": "called for", "H": "tried out", "I": "necessity", "J": "career"}, "answer": "B", "img": false, "expl": "空格前有形容詞 thrilling 修飾，且與 realism 並列作 demand for 的受詞，需名詞表「（真實特技帶來的）刺激感」，故選 (B) sensation（感官刺激、轟動）。誘答 (I) necessity 語意不符，thrilling necessity（刺激的必需品）不合邏輯。"}, {"id": "G111-31", "year": 111, "no": 31, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "111-P4", "stem": "Obon, or the Bon Festival, is a Japanese holiday that honors the spirits of the dead. 31 The festival usually lasts for four to five days in August.", "options": {"A": "Some people also visit the cemetery to clean up the family graves and pray for their ancestors.", "B": "Such festive activities are usually held in parks, temples, and other public places around Japan.", "C": "Obon concludes with another bonfire, okuribi, lighting up the sky to see the ancestors' spirits off.", "D": "Originating from the Chinese Ghost Festival, this annual event has evolved into a time of family reunion."}, "answer": "D", "img": false, "expl": "空格前句介紹 Obon 是紀念亡者的日本節日，空格後接節日長度。(D) 說明此節「源自中國中元節，已演變為家庭團聚的節日」，承接主題並自然帶出後文 travel back to hometowns（返鄉團聚），故選 (D)。其中 Originating... 呼應節日由來，evolved into a time of family reunion 呼應下文團聚，邏輯最連貫。"}, {"id": "G111-32", "year": 111, "no": 32, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "111-P4", "stem": "people make a small bonfire in front of their house to guide spirits upon their return back home. 32 Food offerings are presented at house altars and temples.", "options": {"A": "Some people also visit the cemetery to clean up the family graves and pray for their ancestors.", "B": "Such festive activities are usually held in parks, temples, and other public places around Japan.", "C": "Obon concludes with another bonfire, okuribi, lighting up the sky to see the ancestors' spirits off.", "D": "Originating from the Chinese Ghost Festival, this annual event has evolved into a time of family reunion."}, "answer": "A", "img": false, "expl": "空格前描述迎火 mukaebi 引導祖靈返家，空格後接在家中佛壇與寺廟供奉食物。(A)「有些人也會前往墓地清理家族墳墓、祭拜祖先」同屬迎接祖靈的祭祀行為，以 also 承接前面的祭祖活動，語意連貫，故選 (A)。"}, {"id": "G111-33", "year": 111, "no": 33, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "111-P4", "stem": "33 Paper lanterns and offerings are sent floating down rivers to accompany the ancestors back to their resting place.", "options": {"A": "Some people also visit the cemetery to clean up the family graves and pray for their ancestors.", "B": "Such festive activities are usually held in parks, temples, and other public places around Japan.", "C": "Obon concludes with another bonfire, okuribi, lighting up the sky to see the ancestors' spirits off.", "D": "Originating from the Chinese Ghost Festival, this annual event has evolved into a time of family reunion."}, "answer": "C", "img": false, "expl": "空格為第三段開頭，後文提到放水燈、河上漂流送祖靈回歸安息之地，屬節日「結尾」的送靈儀式。(C)「Obon 以另一場送火 okuribi 作結，照亮夜空送別祖靈」正是收尾階段，與後文送靈主題一致，故選 (C)。關鍵在 concludes 與 see the spirits off 呼應送別。"}, {"id": "G111-34", "year": 111, "no": 34, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "111-P4", "stem": "Participants, often dressed in light cotton kimonos, are encouraged to dance to the music around the stage. 34 Originally dedicated to the deceased, the dances have now become a symbol of the summer festival.", "options": {"A": "Some people also visit the cemetery to clean up the family graves and pray for their ancestors.", "B": "Such festive activities are usually held in parks, temples, and other public places around Japan.", "C": "Obon concludes with another bonfire, okuribi, lighting up the sky to see the ancestors' spirits off.", "D": "Originating from the Chinese Ghost Festival, this annual event has evolved into a time of family reunion."}, "answer": "B", "img": false, "expl": "空格前談盆踊舞 bon-odori（參加者穿浴衣繞舞台跳舞），空格後說舞蹈原本獻給亡者、如今成為夏日祭象徵。(B)「這類節慶活動通常在公園、寺廟等公共場所舉行」中的 Such festive activities 正好回指前面的舞蹈活動，並補充舉辦地點，故選 (B)。關鍵是指示詞 Such 回指前文的慶祝活動。"}, {"id": "G111-35", "year": 111, "no": 35, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P5", "stem": "Which of the following pictures best represents the image of a typical Maasai warrior?", "options": {"A": "（圖A）", "B": "（圖B）", "C": "（圖C）", "D": "（圖D）"}, "answer": "B", "img": true}, {"id": "G111-36", "year": 111, "no": 36, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P5", "stem": "What can we learn from the passage about the Maasai people?", "options": {"A": "They have been urged by governments to leave behind their traditions.", "B": "They resist foreign influence because they were enslaved in the past.", "C": "A boy has to kill a lion by himself before becoming an adult.", "D": "A Maasai woman is usually good at beadwork and farming."}, "answer": "A", "img": false, "expl": "第二段提到馬賽人 resisted the urging of the Kenyan and Tanzanian governments to adopt a more modern lifestyle（抵抗政府要他們改採現代生活方式的敦促），對應 (A)「他們曾被政府敦促放棄傳統」，故選 (A)。誘答 (B) 因果錯置，文中抵抗奴役與外來影響並非「因為曾被奴役」；(C) 文中說「單獨殺獅」是成為戰士（warrior）而非成年的條件。"}, {"id": "G111-37", "year": 111, "no": 37, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P5", "stem": "Which of the following is true about Maasai clothing and beadwork?", "options": {"A": "Striped and patterned cloth is preferred by young adults.", "B": "Young men cannot wear black until they become warriors.", "C": "Colorful glass jewelry became popular after the 19th century.", "D": "The color of the shúkà represented one's importance in the tribe."}, "answer": "C", "img": false, "expl": "依文意，馬賽人的彩色玻璃珠飾在 19 世紀與歐洲人接觸、玻璃珠傳入後才盛行，對應 (C)「彩色玻璃飾品在 19 世紀後才流行」，故選 (C)。誘答 (B) 文中黑衣是割禮後所穿，與是否成為戰士無關；(A)(D) 皆與原文對條紋布、shúkà 顏色的敘述不符。"}, {"id": "G111-38", "year": 111, "no": 38, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P5", "stem": "Why does the author quote Blixen's comment at the end of the third paragraph?", "options": {"A": "To explain how Maasai warriors hunt for deer in the wild.", "B": "To exemplify the types of weapons used by Maasai warriors.", "C": "To emphasize that weapons are an inseparable part of a Maasai warrior's outfit.", "D": "To show the similarities between the behavior of a Maasai warrior and that of a male deer."}, "answer": "C", "img": false, "expl": "作者在第三段末引用布利克森的評論，是為了強調馬賽武器（如長矛盾牌）與其服飾一樣是不可分割的一部分，故選 (C)「強調武器是馬賽戰士裝束不可分割的一部分」。此引言用來收束並凸顯武器與整體造型的連結，其餘選項 (A)(B)(D) 均非引言的修辭目的。"}, {"id": "G111-39", "year": 111, "no": 39, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P6", "stem": "Which of the following aspects about hard hats is NOT discussed in the passage?", "options": {"A": "Their functions.", "B": "Their appearances.", "C": "Their materials.", "D": "Their limitations."}, "answer": "D", "img": false, "expl": "文中談到安全帽的功能（護頭防落物）、外觀（黑漆、造型）、材質（帆布皮革→鋁→玻璃纖維→熱塑塑膠），唯獨未討論其「限制／缺點」，故選 (D) Their limitations（限制）。此為 NOT 題，需找文章未提及者。"}, {"id": "G111-40", "year": 111, "no": 40, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P6", "stem": "In what order did the following protective hats appear? a. fiberglass hats b. hats with see-through shields c. hats with canvas and leather d. hats with tar over them", "options": {"A": "dcab", "B": "cdba", "C": "cbad", "D": "dcba"}, "answer": "A", "img": false, "expl": "依文意時序：先是 (d) 塗煤焦油的帽子（戰前），再是 (c) 帆布皮革的硬煮帽（1919），接著 (a) 玻璃纖維帽（材質演進 aluminum→fiberglass），最後 (b) 附透明護目鏡的新式帽（近期新款），故順序為 d-c-a-b，選 (A) dcab。關鍵在文末 evolving 的材質順序與 Recently 的新款。"}, {"id": "G111-41", "year": 111, "no": 41, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P6", "stem": "According to the passage, which of the following statements is true about the hard hat?", "options": {"A": "Global sales have doubled every ten years.", "B": "The inspiration came from the inventor's wartime experience.", "C": "It was standard equipment for construction workers in the 1920s.", "D": "Different colors are used in different industries to signal the roles of people on site."}, "answer": "B", "img": false, "expl": "第二段指出發明人 Bullard 曾參與一戰、目睹金屬頭盔救命之力（witnessed the life-saving power of the metal helmet in the War）後才決定製造安全帽，對應 (B)「靈感來自發明人的戰時經歷」，故選 (B)。誘答 (C) 文中安全帽是在胡佛水壩(1931)等工程才被強制配戴，1920 年代尚非標準配備。"}, {"id": "G111-42", "year": 111, "no": 42, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P6", "stem": "Which of the following words are used in the passage to refer to the hard hat? a. tool b. code c. device d. helmet e. accessory f. headgear", "options": {"A": "a, b, d, e", "B": "a, c, d, f", "C": "c, d, e, f", "D": "a, d, e, f"}, "answer": "B", "img": false, "expl": "文中稱呼安全帽的字詞包括 tool（safety tool）、device（head protection device）、helmet、headgear，即 a、c、d、f，故選 (B) a, c, d, f。文中並未以 code（規範）或 accessory（配件）指稱安全帽，可據此刪去含 b、e 的選項。"}, {"id": "G111-43", "year": 111, "no": 43, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P7", "stem": "What can we learn about zebrafish from the passage?", "options": {"A": "How they should be studied in labs.", "B": "Where they derive their regenerative ability.", "C": "Why they share humans' genetic code.", "D": "What they may offer in medical advancements."}, "answer": "D", "img": false, "expl": "全文重點在斑馬魚的自癒／再生能力，並指出科學家盼藉此讓人類再生器官、對醫學有貢獻（may one day allow humans to regenerate organs），對應 (D)「牠們在醫學進展上可能帶來什麼」，故選 (D)。誘答 (B) 文章談的是研究其再生機制的用途，而非說明再生能力「源自何處」。"}, {"id": "G111-44", "year": 111, "no": 44, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P7", "stem": "Which of the following statements is true regarding GABA in zebrafish?", "options": {"A": "Increasing GABA level facilitates neuron activities.", "B": "There is a high level of GABA in the brain of zebrafish.", "C": "Lowering GABA levels in the brain can stimulate retina regrowth.", "D": "GABA contains chemical elements that trigger the growth of neurons."}, "answer": "C", "img": false, "expl": "依第三、四段，研究發現降低斑馬魚腦中 GABA 的濃度可刺激視網膜再生，對應 (C)「降低腦中 GABA 濃度能刺激視網膜再生」，故選 (C)。誘答 (A) 恰好相反，GABA 提高反而抑制神經活動與再生，方向錯誤。"}, {"id": "G111-45", "year": 111, "no": 45, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P7", "stem": "Which of the following is closest in meaning to \"replicated\" in the third paragraph?", "options": {"A": "Reproduced.", "B": "Reassembled.", "C": "Recycled.", "D": "Restored."}, "answer": "A", "img": false, "expl": "replicated 意為「複製、重現」，指若此再生過程能在人體「重現」。四個選項中 (A) Reproduced（再現、複製）最接近，故選 (A)。誘答 (D) Restored（恢復）語意是「使復原」，與「複製重現某過程」不同。"}, {"id": "G111-46", "year": 111, "no": 46, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "111-P7", "stem": "According to the passage, which of the following is an opinion, but NOT a fact?", "options": {"A": "Humans and zebrafish have 70 percent of genes in common.", "B": "Zebrafish can quickly recover vision after damage to the retina.", "C": "Scientists are testing if the GABA theory works on mice as it does on zebrafish.", "D": "Understanding regeneration in zebrafish may allow humans to regrow their organs."}, "answer": "D", "img": false, "expl": "(A)(B)(C) 皆為文中可查證的事實陳述（基因比例、視力恢復、正在小鼠上測試）；(D)「了解斑馬魚再生或許能讓人類再生器官」含推測性字眼 may，屬科學家的期望與看法而非既成事實，故選 (D) 為意見。判別關鍵在 may 等推測語氣。"}, {"id": "G112-1", "year": 112, "no": 1, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The bus driver often complains about chewing gum found under passenger seats because it is ___ and very hard to remove.", "options": {"A": "sticky", "B": "greasy", "C": "clumsy", "D": "mighty"}, "answer": "A", "img": false, "expl": "空格描述口香糖黏在座椅下且很難清除，需形容詞表「黏的」，故選 (A) sticky（黏的）：因為它很黏又難清除。誘答 (B) greasy（油膩的）雖也不討喜，但與 hard to remove 的黏著特性不如 sticky 貼切，口香糖的關鍵性質是「黏」。"}, {"id": "G112-2", "year": 112, "no": 2, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Jesse is a talented model. He can easily adopt an elegant ___ for a camera shoot.", "options": {"A": "clap", "B": "toss", "C": "pose", "D": "snap"}, "answer": "C", "img": false, "expl": "Jesse 是模特兒，能為拍照輕鬆擺出優雅的「姿勢」，故選 (C) pose（姿勢、擺姿勢）。for a camera shoot 提示是拍照擺姿。誘答 (A) clap（拍手）、(B) toss（拋擲）、(D) snap（啪一聲／快照）皆與「擺出優雅姿態」不符。"}, {"id": "G112-3", "year": 112, "no": 3, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "In order to draw her family tree, Mary tried to trace her ___ back to their arrival in North America.", "options": {"A": "siblings", "B": "commuters", "C": "ancestors", "D": "instructors"}, "answer": "C", "img": false, "expl": "為畫家族樹並追溯到抵達北美，Mary 追溯的應是「祖先」，故選 (C) ancestors（祖先）。family tree、trace...back 都指向血緣先人。誘答 (A) siblings（兄弟姊妹）為同輩，無法「一路追溯到抵達北美」的世代脈絡。"}, {"id": "G112-4", "year": 112, "no": 4, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Upon the super typhoon warning, Nancy rushed to the supermarket—only to find the shelves almost ___ and the stock nearly gone.", "options": {"A": "blank", "B": "bare", "C": "hollow", "D": "queer"}, "answer": "B", "img": false, "expl": "超級颱風警報下大家搶購，貨架幾乎「空空如也」、存貨將盡，故選 (B) bare（空的、光禿的）。shelves bare 指架上被掃空。誘答 (A) blank 多指「空白（無字跡）」，(C) hollow 指「中空」，皆不用來形容貨架被買空。"}, {"id": "G112-5", "year": 112, "no": 5, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Even though Jack said \"Sorry!\" to me in person, I did not feel any ___ in his apology.", "options": {"A": "liability", "B": "generosity", "C": "integrity", "D": "sincerity"}, "answer": "D", "img": false, "expl": "雖然 Jack 當面道歉，但「我」感受不到他道歉中的「誠意」，故選 (D) sincerity（誠意、真誠）。轉折 Even though 暗示道歉流於形式。誘答 (C) integrity（正直）雖為正面品德，但與「道歉是否真心」不對應。"}, {"id": "G112-6", "year": 112, "no": 6, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "My grandfather has astonishing powers of ___. He can still vividly describe his first day at school as a child.", "options": {"A": "resolve", "B": "fraction", "C": "privilege", "D": "recall"}, "answer": "D", "img": false, "expl": "祖父仍能生動描述兒時上學第一天，展現驚人的「記憶力」，故選 (D) recall（記憶力、回想）。powers of recall 即記憶／回想能力，與後句 vividly describe 呼應。誘答 (A) resolve（決心）與能清楚回憶往事無關。"}, {"id": "G112-7", "year": 112, "no": 7, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Recent research has found lots of evidence to ___ the drug company's claims about its \"miracle\" tablets for curing cancer.", "options": {"A": "provoke", "B": "counter", "C": "expose", "D": "convert"}, "answer": "B", "img": false, "expl": "近期研究找到大量證據去「反駁」藥廠對其抗癌神奇藥錠的宣稱，故選 (B) counter（反駁、駁斥）。語境暗示證據與誇大宣稱相對立。誘答 (C) expose（揭露）雖語意接近，但 counter the claims（反駁其主張）與 evidence 搭配更貼切，expose 通常接「醜聞／真相」。"}, {"id": "G112-8", "year": 112, "no": 8, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Corrupt officials and misguided policies have ___ the country's economy and burdened its people with enormous foreign debts.", "options": {"A": "crippled", "B": "accelerated", "C": "rendered", "D": "ventured"}, "answer": "A", "img": false, "expl": "貪官與失策讓國家經濟「重創」並使人民背負巨額外債，故選 (A) crippled（使癱瘓、重創）。與 burdened with debts 的負面語境一致。誘答 (B) accelerated（加速）語意相反，會使經濟變好或加快，不合「使背負外債」的負面結果。"}, {"id": "G112-9", "year": 112, "no": 9, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "As a record number of fans showed up for the baseball final, the highways around the stadium were ___ with traffic all day.", "options": {"A": "choked", "B": "disturbed", "C": "enclosed", "D": "injected"}, "answer": "A", "img": false, "expl": "破紀錄球迷湧入，球場周邊高速公路整天「被車潮堵塞」，故選 (A) choked（堵塞、阻塞）。be choked with traffic 為「被車流堵得水泄不通」的慣用搭配。誘答 (C) enclosed（圍住）不表交通壅塞，語意不符。"}, {"id": "G112-10", "year": 112, "no": 10, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Studies show that the ___ unbiased media are in fact often deeply influenced by political ideology.", "options": {"A": "undoubtedly", "B": "roughly", "C": "understandably", "D": "supposedly"}, "answer": "D", "img": false, "expl": "空格修飾 unbiased media，與後文 in fact often deeply influenced by political ideology（實則深受政治意識形態影響）形成對比，需表「號稱、據稱」，故選 (D) supposedly（據稱、理應）：那些「號稱」中立的媒體其實常受影響。誘答 (A) undoubtedly（無疑地）語氣過於肯定，與後文的反轉矛盾。"}, {"id": "G112-11", "year": 112, "no": 11, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P1", "stem": "each branch growing just perfectly so it almost, ___, touches the neighboring tree.", "options": {"A": "in no time", "B": "by all means", "C": "but not quite", "D": "and pretty much"}, "answer": "C", "img": false, "expl": "空格插在 it almost ___ touches 之間，前有 almost（幾乎）作鋪陳，語意需「幾乎碰到、但又不完全碰到」，故選 (C) but not quite（但又不盡然）。此片語常與 almost 連用表「差一點卻沒真的做到」。誘答 (A) in no time（很快）語意不合，與「幾乎相觸」無關。"}, {"id": "G112-12", "year": 112, "no": 12, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P1", "stem": "Scientists have been discussing crown shyness since the 1920s, proposing ___ explanations for the phenomenon.", "options": {"A": "universal", "B": "productive", "C": "conventional", "D": "multiple"}, "answer": "D", "img": false, "expl": "後文列舉多種對樹冠羞避的解釋（有些研究者…其他科學家…），可知科學家提出「多種」解釋，故選 (D) multiple（多個的）。誘答 (C) conventional（傳統的）與後文呈現的分歧、多元觀點不符。"}, {"id": "G112-13", "year": 112, "no": 13, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P1", "stem": "Other scientists suggest that plants, like animals, ___ resources—nutrients, water, space, and light.", "options": {"A": "get over", "B": "compete for", "C": "give way to", "D": "make up for"}, "answer": "B", "img": false, "expl": "後接受詞 resources（養分、水、空間、光），並說在濃密樹冠區有 intense struggle for these resources（激烈爭奪），故填 (B) compete for（競爭、爭奪）：植物像動物一樣「爭奪」資源。誘答 (C) give way to（讓步）語意相反，與 struggle（爭奪）矛盾。"}, {"id": "G112-14", "year": 112, "no": 14, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P1", "stem": "Gaps in the treetops resulting from crown shyness may allow trees to increase their ___ light and enhance photosynthesis.", "options": {"A": "reliance on", "B": "exposure to", "C": "sensitivity to", "D": "reflection on"}, "answer": "B", "img": false, "expl": "樹冠間的縫隙讓樹木能增加「對光的接觸／曝露」以增強光合作用，故選 (B) exposure to（暴露於、接觸）：increase their exposure to light 即「增加受光量」。誘答 (A) reliance on（依賴）語意不合，縫隙是增加受光而非增加依賴。"}, {"id": "G112-15", "year": 112, "no": 15, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P1", "stem": "___ decades of investigation, there is no consensus on exactly what causes the beautiful and mysterious phenomenon of crown shyness.", "options": {"A": "For", "B": "Besides", "C": "Despite", "D": "Concerning"}, "answer": "C", "img": false, "expl": "空格後 decades of investigation, there is no consensus（歷經數十年研究仍無定論），前後為讓步轉折，需表「儘管」，故選 (C) Despite（儘管）。Despite 為介系詞可接名詞片語。誘答 (A) For 或 (D) Concerning 皆無法表達「雖然研究多年卻仍無共識」的讓步語氣。"}, {"id": "G112-16", "year": 112, "no": 16, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P2", "stem": "scientists tried to overcome the force of gravity so that a rocket could shoot ___ Earth's pull in order to land humans on the moon.", "options": {"A": "back to", "B": "free of", "C": "long before", "D": "straight on"}, "answer": "B", "img": false, "expl": "空格意在讓火箭「掙脫」地球引力以登月，故選 (B) free of（擺脫、不受…束縛）：shoot free of Earth's pull 即「衝出地球引力」。與前文 overcome the force of gravity 呼應。誘答 (A) back to（回到）語意相反，登月是要脫離而非回到地球引力。"}, {"id": "G112-17", "year": 112, "no": 17, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P2", "stem": "Today, they are more interested in how reduced gravity affects the astronauts' ___ condition.", "options": {"A": "physical", "B": "perceptual", "C": "mental", "D": "external"}, "answer": "A", "img": false, "expl": "本文對比「早期」科學家想克服重力，「今日」則關注重力減少如何影響太空人。第二段起整段討論體液位移、臉部浮腫、太空暈眩等身體症狀，故第17格指的是太空人的『生理(physical)』狀況。(C)mental是心理層面、(D)external是外部，皆與下文的體液與生理反應不符。"}, {"id": "G112-18", "year": 112, "no": 18, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P2", "stem": "with the absence of gravity in the outer space, our body fluids ___, shifting toward the upper body and the head.", "options": {"A": "redistribute", "B": "redistributed", "C": "redistributing", "D": "being redistributed"}, "answer": "A", "img": false, "expl": "本句主詞為our body fluids，空格為此句的主要動詞，須用主動、與主詞複數一致的原形動詞redistribute(重新分布)。後面的shifting toward…是分詞片語補述動作。(B)過去式與前文現在式時態不合，(C)(D)為分詞/被動皆非完整主要動詞，會使句子缺乏動詞。"}, {"id": "G112-19", "year": 112, "no": 19, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P2", "stem": "This \"Charlie Brown effect\" will be more ___ when the astronauts go on their Mars missions.", "options": {"A": "contagious", "B": "unusual", "C": "severe", "D": "aggressive"}, "answer": "C", "img": false, "expl": "此格形容Charlie Brown效應(臉部浮腫)在為期約三年的火星任務中會變得更如何。下句further提到常伴隨暈眩、頭痛、噁心且是最大健康風險，可知效應更『嚴重(severe)』。(A)contagious有傳染性、(D)aggressive具攻擊性皆不合體液位移的醫學情境。"}, {"id": "G112-20", "year": 112, "no": 20, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "112-P2", "stem": "Moreover, the effect is often ___ space motion sickness, headaches, and nausea.", "options": {"A": "varied with", "B": "brought about", "C": "transferred from", "D": "accompanied by"}, "answer": "D", "img": false, "expl": "空格後接space motion sickness等症狀，語意為此效應常『伴隨』這些症狀出現，故選be accompanied by(伴隨)。(B)brought about意為造成，雖語意近似但accompanied by強調同時併發，且與前文Moreover並列症狀的鋪陳最相符；(A)(C)搭配與語意皆不通。"}, {"id": "G112-21", "year": 112, "no": 21, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "is water always the healthiest drink we can ___? Well, it depends on who and where we are.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "J", "img": false, "expl": "全篇談喝水，動詞片語reach for意為『伸手去拿、選用』某飲品，與後文『取決於我們是誰、在哪』討論該不該選水為飲料相呼應。故we can reach for(我們能取用的)最合句意。此格為動詞，須排除名詞absorption、status等選項。"}, {"id": "G112-22", "year": 112, "no": 22, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "a physically ___ person with an outdoor job under the sun will need to drink more fluid.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "B", "img": false, "expl": "空格修飾person，並與後面在冷氣房久坐的desk-bound person形成對比。戶外日曬工作者是『活動量大的(active)』，故需喝更多水。physically active為固定搭配(身體活躍/勞動量大)，語意與對比結構皆吻合。"}, {"id": "G112-23", "year": 112, "no": 23, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "To ___ things out, the body will get rid of water by producing urine.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "G", "img": false, "expl": "前句說只補水會使體內水過多、鹽不足；此格說身體排尿以『使…平衡』。even things out為片語，意為『使事物均衡』，此處指讓水鹽比例回歸平衡，故選(G)even。其後身體排尿正是平衡水分的手段。"}, {"id": "G112-24", "year": 112, "no": 24, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "For this reason, milk can actually be more ___ than drinking water.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "F", "img": false, "expl": "承上文只喝水會失衡，故牛奶其實比水更『有效(effective)』補水。下句解釋牛奶含鹽與乳糖能促進水分吸收，正說明其有效性。more…than比較結構需形容詞，(B)active、(C)alert語意不合。"}, {"id": "G112-25", "year": 112, "no": 25, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "a sugar which the human body needs in small amounts to help stimulate water ___.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "A", "img": false, "expl": "空格前為water，需名詞構成複合名詞water absorption(水分吸收)。句意為乳糖能幫助刺激水分吸收，與下文椰子水促進補水的功能相呼應。故選(A)absorption，其餘選項詞性或語意皆不符。"}, {"id": "G112-26", "year": 112, "no": 26, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "Coconut water is also more functional than water at restoring and maintaining a normal fluid ___ after exercise.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "H", "img": false, "expl": "空格前為fluid，構成fluid status(體液狀態/水分平衡狀態)。句意為椰子水在運動後能恢復並維持正常的體液狀態，故選(H)status。maintain a normal fluid status為合理搭配，其餘選項無法構成通順名詞片語。"}, {"id": "G112-27", "year": 112, "no": 27, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "water remains a very good ___ for keeping hydrated—if you know how to drink it.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "E", "img": false, "expl": "空格前a very good，須名詞。呼應首段以reach for帶出『飲品選擇』的主題，此處總結水仍是保持水分的很好『選擇(option)』。a good option為固定搭配，故選(E)。"}, {"id": "G112-28", "year": 112, "no": 28, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "there must already have been significant changes in your body for it to eventually ___ your consciousness.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "C", "img": false, "expl": "句意為身體須先有顯著變化，才能最終『警示(alert)』你的意識(讓你感到口渴)。alert當動詞意為『使警覺、提醒』，alert your consciousness指讓意識察覺到缺水，故選(C)。"}, {"id": "G112-29", "year": 112, "no": 29, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "drinking a lot of liquid in one go can cause more water to ___ the body quickly and come out as urine.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "I", "img": false, "expl": "空格為動詞，主詞是water，語意為一次大量喝水會使更多水快速『通過』身體並以尿液排出。pass through(通過、穿過)最合句意，故選(I)。"}, {"id": "G112-30", "year": 112, "no": 30, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "112-P3", "stem": "To ___ this, you need to drink water throughout the day to maintain your hydration levels.", "options": {"A": "absorption", "B": "active", "C": "alert", "D": "combat", "E": "option", "F": "effective", "G": "even", "H": "status", "I": "pass through", "J": "reach for"}, "answer": "D", "img": false, "expl": "空格後接this(指前述大量灌水反被排掉的問題)，need to…以維持水分，語意為『對抗、解決』此問題。combat當動詞意為『對抗、克服』，combat this指對抗此現象，故選(D)。"}, {"id": "G112-31", "year": 112, "no": 31, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "112-P4", "stem": "___ In the early 1990s, however, scientists noticed that synesthetic colors do not change over time.", "options": {"A": "This consistency serves as a proof that synesthesia is real.", "B": "Meanwhile, environmental influences seem to shape a person's synesthesia.", "C": "People with synesthesia used to be accused of making their experiences up.", "D": "Some studies even show that people may all be synesthetic to some degree."}, "answer": "C", "img": false, "expl": "此格為段首，後接however轉折說1990年代初科學家才注意到聯覺顏色不隨時間改變(即客觀證據)。故前一句應描述『過去聯覺常被質疑為捏造』，才與however形成『先被懷疑、後獲證實』的對比，選(C)。"}, {"id": "G112-32", "year": 112, "no": 32, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "112-P4", "stem": "synesthetic people would persistently give the same answer even if tested months or years apart. ___ The most compelling support, however, comes from brain scans.", "options": {"A": "This consistency serves as a proof that synesthesia is real.", "B": "Meanwhile, environmental influences seem to shape a person's synesthesia.", "C": "People with synesthesia used to be accused of making their experiences up.", "D": "Some studies even show that people may all be synesthetic to some degree."}, "answer": "A", "img": false, "expl": "前文說聯覺者相隔數月數年受測仍給相同答案；此格後接however提到腦部掃描是最有力佐證。空格須承接前面的『一致性』並點明其意義，(A)『這種一致性證明聯覺是真實的』正好總結上句並引出更多證據，選(A)。"}, {"id": "G112-33", "year": 112, "no": 33, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "112-P4", "stem": "But an actual synesthesia gene has not been identified yet. ___ For example, the flavors people with taste-word synesthesia experience are usually childhood flavors.", "options": {"A": "This consistency serves as a proof that synesthesia is real.", "B": "Meanwhile, environmental influences seem to shape a person's synesthesia.", "C": "People with synesthesia used to be accused of making their experiences up.", "D": "Some studies even show that people may all be synesthetic to some degree."}, "answer": "B", "img": false, "expl": "前句說尚未找到聯覺基因；此格後以For example舉『味覺-字詞聯覺者所體驗多為童年味道』為例。此例說明後天環境經驗形塑聯覺，故選(B)『環境影響似乎會塑造個人的聯覺』，與後文例證邏輯連貫。"}, {"id": "G112-34", "year": 112, "no": 34, "section": "題組", "type": "篇章結構", "skill": "篇章結構", "pkey": "112-P4", "stem": "synesthesia is now found to affect about one to four percent of the population. ___ As is often observed, most of us tend to associate lower notes with darker colors.", "options": {"A": "This consistency serves as a proof that synesthesia is real.", "B": "Meanwhile, environmental influences seem to shape a person's synesthesia.", "C": "People with synesthesia used to be accused of making their experiences up.", "D": "Some studies even show that people may all be synesthetic to some degree."}, "answer": "D", "img": false, "expl": "前文提到聯覺影響約1至4%人口；此格後說『多數人傾向把低音與較暗顏色連結』，暗示人人多少都有聯覺傾向。故選(D)『有些研究甚至顯示人們可能都在某種程度上具有聯覺』，與後面舉的普遍現象一致。"}, {"id": "G112-35", "year": 112, "no": 35, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P5", "stem": "What question does the passage answer?", "options": {"A": "How was the word \"hula-hooping\" derived?", "B": "Why did Wham-O start making hula hoops?", "C": "Where did Hawaiian hula dancing come from?", "D": "What was the favorite toy of ancient Egyptian kids?"}, "answer": "A", "img": false, "expl": "第二段末說明hula(呼拉)一詞源於1700年代英國水手在夏威夷目睹hula舞，因動作相似而與hoop結合成hula hooping。這正回答(A)『hula-hooping一詞如何衍生而來』，故選(A)。"}, {"id": "G112-36", "year": 112, "no": 36, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P5", "stem": "Which of the following statements is true about use of the hoop in history?", "options": {"A": "The British used it for medical purposes.", "B": "Native Americans used it to train animals.", "C": "Ancient Greeks used it as a tool for workout.", "D": "Hawaiian dancers used it to represent the circle of life."}, "answer": "C", "img": false, "expl": "第一段末提到古希臘的呼拉圈常以金屬製成，不只是兒童玩具，也作為『運動器材(exercise devices)』。故(C)『古希臘人把它當作健身工具』正確。(A)英國是引發受傷而非醫療用途，屬誤導。"}, {"id": "G112-37", "year": 112, "no": 37, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P5", "stem": "Which of the following is NOT mentioned as a way of enjoying hula hoop fun?", "options": {"A": "Striking.", "B": "Twirling.", "C": "Spinning.", "D": "Kicking."}, "answer": "D", "img": false, "expl": "文中提到的玩法有threw(丟)、jumped、slung(甩繞身上)、struck with sticks(用棍敲擊即Striking)、twirled/spun(旋轉)。唯獨未提及Kicking(踢),故選(D)。"}, {"id": "G112-38", "year": 112, "no": 38, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P5", "stem": "According to the passage, what materials have been used for making hoops?", "options": {"A": "reed, grapevine, bamboo, plastic", "B": "reed, grapevine, plastic, metal", "C": "reed, bamboo, plastic, animal skin", "D": "grapevine, plastic, metal, animal skin"}, "answer": "B", "img": false, "expl": "文中提到的材質有：埃及乾葡萄藤(grapevine)、希臘金屬(metal)、以及現代塑膠(plastic);另段落也提到reed(蘆葦)。四者組合為reed, grapevine, plastic, metal，故選(B)。竹子bamboo與動物皮未提及。"}, {"id": "G112-39", "year": 112, "no": 39, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P6", "stem": "Why do farmers in Assam dig trenches in tea gardens?", "options": {"A": "To protect tea trees.", "B": "To trap elephants.", "C": "To expand tea farms.", "D": "To mark boundaries of tea gardens."}, "answer": "A", "img": false, "expl": "第二段說明Assam地勢平坦，農民必須挖排水溝以防積水傷害茶樹(shrubs)。故挖溝目的是『保護茶樹(protect tea trees)』，選(A)。溝渠對大象是陷阱屬非預期後果，而非挖溝目的。"}, {"id": "G112-40", "year": 112, "no": 40, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P6", "stem": "Why are baby elephants easily injured in the Assam tea gardens according to the passage?", "options": {"A": "They cannot find a safe shelter when climbing out of the trenches.", "B": "They cannot locate the landmarks while trying to navigate forests.", "C": "They are trapped by the sharp branches of the tea trees.", "D": "They have difficulties moving around the uneven fields."}, "answer": "D", "img": false, "expl": "文中說小象not used to negotiating rough ground(不習慣在崎嶇地面行走)，故容易跌入溝渠受傷。這對應(D)『牠們在不平的地面上行動有困難』。(B)導航森林指的是成象利用茶園作地標，非小象受傷主因。"}, {"id": "G112-41", "year": 112, "no": 41, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P6", "stem": "Which of the following statements about elephants and the tea gardens is true according to the passage?", "options": {"A": "The elephants use the trenches to roam around the tea gardens.", "B": "The fast growth of the tea gardens destroys the elephants' food source.", "C": "Elephants are unwilling to leave their injured members behind in the tea gardens.", "D": "Pregnant elephants avoid delivering babies in the tea gardens for fear of being disturbed."}, "answer": "C", "img": false, "expl": "末段提到elephants are known to resist leaving their sick or dying behind，象群會在受困小象的溝邊徘徊數小時不願離去。故(C)『大象不願把受傷的同伴留在茶園』正確，直接對應文中訊息。"}, {"id": "G112-42", "year": 112, "no": 42, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P6", "stem": "What does \"it\" in the last paragraph refer to?", "options": {"A": "To certify elephant-friendly trenches and organizations.", "B": "To reward tea growers for protecting the environment.", "C": "To encourage consumers to choose high-quality brands.", "D": "To create a win-win situation for elephants and tea farms."}, "answer": "D", "img": false, "expl": "末段語境在談如何兼顧大象保育與茶農生計的解決方案，it指的是該倡議/做法的目的，即(D)『為大象與茶園創造雙贏局面』。其餘選項為片面手段，非it所指的整體目標。"}, {"id": "G112-43", "year": 112, "no": 43, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P7", "stem": "Which of the following is true about the earliest traders in Zanzibar?", "options": {"A": "The earliest traders arrived around 900 AD.", "B": "Most of the earliest merchants came from Africa.", "C": "Asian merchants arrived centuries before the African settlers.", "D": "Traders from Persia settled down permanently around 1000 AD."}, "answer": "C", "img": false, "expl": "第二段說『來自亞洲的商人早在首批非洲大陸永久移民(約1000AD)抵達的900年前就已造訪這些島嶼』。可推知亞洲商人比非洲定居者早了數百年抵達，故選(C)。(A)(B)(D)與時間、來源敘述不符。"}, {"id": "G112-44", "year": 112, "no": 44, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P7", "stem": "According to the passage, where is Zanzibar most likely located on the following map?", "options": {"A": "A", "B": "B", "C": "C", "D": "D"}, "answer": "B", "img": false, "expl": "文首說尚吉巴位於坦尚尼亞外海、印度洋上，並在阿拉伯與非洲間的貿易路線上。依此地理位置(東非坦尚尼亞外海印度洋),對照地圖應選位於該處的(B)。"}, {"id": "G112-45", "year": 112, "no": 45, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P7", "stem": "Which of the following can be inferred from the passage about Zanzibar?", "options": {"A": "For centuries, Zanzibar has been a heaven for beach lovers.", "B": "Cloves, vanilla, and cinnamon are common spices in Zanzibar.", "C": "Besides spices, Zanzibar is well known for a great variety of jewelry.", "D": "Vasco da Gama was Zanzibar's first foreign ruler during the Age of Exploration."}, "answer": "B", "img": false, "expl": "全篇以香料貿易(spice trade)為尚吉巴致富關鍵，尚吉巴為著名香料產地，故可推論丁香(cloves)、香草(vanilla)、肉桂(cinnamon)等是當地常見香料，選(B)。(D)Vasco da Gama為首位外來統治者屬文中未支持的過度推論。"}, {"id": "G112-46", "year": 112, "no": 46, "section": "題組", "type": "閱讀測驗", "skill": "閱讀測驗", "pkey": "112-P7", "stem": "Which set of words is used in the passage to refer to Zanzibar?", "options": {"A": "islands, settlements, posts, crossroads", "B": "islands, posts, jewels, destination", "C": "archipelago, islands, jewels, destination", "D": "archipelago, settlements, paths, islands"}, "answer": "C", "img": false, "expl": "文中用來指稱尚吉巴的詞包括archipelago(群島)、islands(島嶼)、jewels(喻其珍貴)、destination(旅遊勝地)。四者皆出現於文中指涉尚吉巴，故選(C)。settlements、posts、crossroads等指貿易站或路線而非尚吉巴本身。"}, {"id": "G113-1", "year": 113, "no": 1, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "People who desire a ______ figure should exercise regularly and maintain healthy eating habits.", "options": {"A": "spicy", "B": "slender", "C": "slight", "D": "slippery"}, "answer": "B", "img": false, "expl": "句意為想要『苗條』身材的人應規律運動並維持健康飲食。slender意為苗條、纖細，最合figure(身材)的搭配，故選(B)。(A)spicy辛辣、(C)slight輕微、(D)slippery滑的皆與身材語意不符。"}, {"id": "G113-2", "year": 113, "no": 2, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Watching the sun ______ from a sea of clouds is a must-do activity for all visitors to Ali Mountain.", "options": {"A": "emerging", "B": "flashing", "C": "rushing", "D": "floating"}, "answer": "A", "img": false, "expl": "句意為看太陽從雲海中『升起、露出』是遊阿里山必做之事。emerge意為浮現、露出，emerging from a sea of clouds(從雲海中浮現)最貼切,故選(A)。(D)floating漂浮不符太陽升起的動作。"}, {"id": "G113-3", "year": 113, "no": 3, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Do you know what time the next bus is ______? I've been waiting here for more than 30 minutes.", "options": {"A": "apt", "B": "due", "C": "bound", "D": "docked"}, "answer": "B", "img": false, "expl": "句意為問下一班公車幾點『會到』,已等超過30分鐘。be due意為『預定(到達/發生)』,the bus is due指公車預定抵達時刻,故選(B)。(C)bound須接for/to才表開往某地，此處語意不合。"}, {"id": "G113-4", "year": 113, "no": 4, "sectio

<style>
:root{

<script>
const QB = {"meta": {"title": "大學學測 英文 官方題庫", "source": "大學入學考試中心 官方公開試題（110–115）", "years": [115, 114, 113, 112, 111, 110], "audioYears": [], "readingTotal": 286, "readingUsable": 281}, "passages": {"110-P1": {"id": "P1", "year": 110, "genre": "綜合測驗", "topic": "巴塞隆納鴿子避孕", "text": "Street pigeons are a common sight in many European cities. In fact, a visit to a major European city just would not be the same 16 encountering them: bathing in fountains, perching on historic buildings, and flocking in public squares. In Barcelona, however, the birds are now threatening to 17 the city's historic center, pooping on monuments, buildings, and even tourists.\n\nThe city council originally proposed 18 the pigeon population by gathering the birds and shooting them. But that idea led to strong protests from numerous animal rights groups. After heated debates and discussions, the government was finally persuaded to consider another 19 effective method: giving the pigeons birth control.\n\nIn 2016, the city council decided to put its 85,000 pigeon population on a birth control pill to block the formation of eggs in birds. Starting from April 2017, the pills were placed in 40 bird feeders 20 throughout the city. It was predicted that there would be a decrease of 20 percent in the pigeon population in the first year and between 70 and 80 percent in four or five years."}, "110-P2": {"id": "P2", "year": 110, "genre": "綜合測驗", "topic": "被雷擊七次的護林員", "text": "Being hit by lightning is a rare event. Over the course of an 80-year life span, the odds of being hit by lightning are 1 in 3,000, 21 the probability of being struck seven different times. Roy Sullivan, a park ranger in the United States, was struck by lightning more recorded times than any other human being. Over his 36-year career, Sullivan was struck by lightning seven times—and 22 each shock!\n\nStrikes one, two, and three were pure bad luck, he thought. But after strike four, Sullivan became 23 death and took precautions during lightning strikes. Strike five occurred in 1973 when Sullivan was on patrol. A storm cloud \"chased\" him until he was struck. The same thing happened again in 1976. Sullivan, while surveying a campground, felt that a cloud was 24 him, and tried all he could to run—but it got him anyway. Finally, on 25 June 1977, a seventh and final bolt struck Sullivan as he was fishing in a pond. \"I don't believe God is after me,\" he theorized. \"If he was, the first bolt 25 enough. Best I can figure is that I have some chemical, some mineral, in my body that draws lightning. I just wish I knew.\""}, "110-P3": {"id": "P3", "year": 110, "genre": "綜合測驗", "topic": "印尼熱帶冰川消融", "text": "Glaciers are usually associated with colder climates. But some mountain ranges of South America, Africa, and Indonesia are also 26 glaciers and ice sheets. These tropical glaciers serve as a major source of water supply to one-sixth of the world's population.\n\nA newly published study, however, revealed that rising temperatures are posing an 27 threat to the last tropical glaciers in Indonesia's Papua region. The ice sheets, which once spanned 20 square kilometers, are thinning over five times as quickly compared to a few years ago. 28 already shrunk by 85% to a mere 0.5 square kilometers, Papua's glaciers will completely disappear within a decade, researchers have predicted.\n\nThe disappearance of the glaciers will also leave a significant 29 impact. For many indigenous Papuans, the ice sheets represent a sacred symbol. \"The mountains and valleys are the arms and legs of their god and the glaciers are the head,\" explained the head researcher.\n\nThe study warned that Papua's glaciers are only the \"first to go\" if greenhouse gases are 30 and temperatures continue rising. And this is certainly a serious warning about the depressing fate of other glaciers around the world."}, "110-P4": {"id": "P4", "year": 110, "genre": "文意選填", "topic": "少量運動有益身心", "text": "If you cannot find ways to fit exercise into your busy daily schedule, don't worry! Exercise doesn't always have to be laborious. Research shows that 31 amounts of exercise—even just 15 minutes a day—helps ease depression, enhance self-image, relieve stress, and much more. That's right. Doing exercise makes you happy, and you don't have to be a fitness 32 to do it. What you need to do is to make \"start slow and have fun\" a motto to 33 . Then you'll be well on your way to using physical activity as a tool to make you feel better every day.\n\nThe \"no pain, no gain\" view of exercise is now considered old-fashioned. In fact, 34 health studies prove that exercise doesn't have to hurt to be effective. You might 35 that if working out doesn't give you pain, it isn't working. According to fitness trainers, physically 36 exercises may make you breathe heavily and your muscles may ache temporarily, but exercise should not be painful. In fact, if it is, it may 37 an injury or muscle strain. Many great forms of exercise—like walking, swimming, or gentle stretching—get results without the 38 or discomfort some people associate with exercise.\n\nFor the sake of your health, it is time to make regular exercise a part of your life. Keep in mind that even short periods of low-impact exercise serve as a powerful 39 to improve your health. So, no matter how busy you are, try to 40 for exercise every day, like a 15-minute walk with your dog. Your body will thank you in many ways.\n\n(A) means (B) soreness (C) point to (D) argue (E) demanding (F) abide by (G) fanatic (H) current (I) make time (J) modest"}, "110-P5": {"id": "P5", "year": 110, "genre": "閱讀測驗", "topic": "仙人掌生質能源", "text": "The prickly pear cactus is such a powerful symbol in Mexico that it occupies a prime spot on Mexico's national flag. The plant was considered sacred by the ancient Aztecs, and modern-day Mexicans eat it, drink it, and even use it in medicines and shampoos. Now scientists have come up with a new use for the bright green plant: producing renewable energy.\n\nKnown locally as nopal, the prickly pear is farmed on a massive scale in Mexico. Over the years, only the edible soft inner flesh has been used. The cactus's thick outer layer (i.e., husk), with all those spines, had always been viewed as a waste product until researchers developed a biogas generator to turn the husks into electricity.\n\nThe pilot project dedicated to developing the cactus biogas generator began in the south of Mexico City. The area produces 200,000 tons a year of prickly pear cactus—up to 10 tons of which ends up as waste on the floor of the cactus market each day. Then, a local green energy startup company got the idea to turn that waste into energy. The generator is now in place at the cactus market, where the vendors are enthusiastic about this new way to utilize the tons of cactus husks that once went directly into the trash.\n\nThe prickly pear has a number of advantages over other biofuel crops, such as wheat, sugarcane, and soybeans. For one thing, only the husk of the cactus is used for generating biofuel, while its inner flesh is still preserved for food. Therefore, using the plant as a fuel source will not put pressure on food prices. Moreover, the cactus requires minimum water, and thus is not grown on traditional agricultural pasture. This means that no increased competition arises for the water or land presently used for food production.\n\nThe project in Mexico City has brought new hope to reducing the use of fossil fuels. If it can be expanded, the prickly pear could be the key to Mexico's energy future."}, "110-P6": {"id": "P6", "year": 110, "genre": "閱讀測驗", "topic": "護照的歷史", "text": "The concept of a travel document, which shows a person is under a ruler's protection while in a foreign land, has probably existed since rulers and states were first invented. But the earliest mention of an object which we might recognize as a passport appeared in about 450 B.C. The Hebrew Bible states that Nehemiah, an official serving King Artaxerxes of ancient Persia, asked permission to travel to Judah. The King agreed and gave Nehemiah a letter \"to the governors of the province beyond the river,\" requesting safe passage for him as he travelled through their lands.\n\nLater, in the medieval Islamic Caliphate, a form of passport was the bara'a, a receipt for taxes paid. Only people who paid their taxes were permitted to travel to different regions of the Caliphate. In medieval Europe, on the other hand, travel documents were issued by local authorities, and generally contained a list of towns and cities which the document holder was permitted to enter or pass through. On the whole, documents were not required for travel to seaports, which were considered open trading points, but documents were required to travel inland from seaports.\n\nKing Henry V of England is credited with having invented the first true passport, as a way of helping his subjects prove who they were in foreign lands. The earliest reference to these documents is found in a 15th-century Act of Parliament, while the term \"passport\" came into use about a century later. Nevertheless, passports were not generally required for international travel until the First World War. It was at this time that passports as we would recognize them today began to be used."}, "110-P7": {"id": "P7", "year": 110, "genre": "閱讀測驗", "topic": "富蘭克林的玻璃琴", "text": "Benjamin Franklin, one of the Founding Fathers of the United States, was not only a great politician but also a highly accomplished scientist and inventor. Of his many achievements, probably the least well-known are his accomplishments in music. He invented an instrument for which both Mozart and Beethoven composed music—the glass armonica.\n\nIn 1761, while living in England, Franklin heard a performer playing musical glasses. Franklin was charmed by the music, but felt that there was a better way to create the same sound. He had a glassmaker create thirty-seven hemispheres made of glass, with each being a different size and thickness to produce different pitches. The glass hemispheres were color coded with paint to identify the notes. Franklin ran an iron rod through a hole in the top of each hemisphere so that they could nest together from largest to smallest. He linked all of this to a device shaped like a spinning wheel, with a foot control that turned the rod, making the glass hemispheres rotate. Franklin moistened his fingers and held them against the rims of the glass hemispheres as they turned, producing a unique sound. He mastered the instrument and took it to parties and gatherings to play for his friends and acquaintances. The instrument became so popular that thousands were built and sold.\n\nBut musical fashions changed. Music was moving out of the relatively small halls of Mozart's day into the large concert halls of the 19th century, and without amplification, the glass armonica simply couldn't be heard. Concert reviews from the period mourned the fact that the armonica sounded wonderful—only when it could be heard. So, alas, Franklin's marvelous invention was ultimately abandoned. The popularity of the instrument faded early in the 19th century, but it is still played occasionally today."}, "110-P8": {"id": "P8", "year": 110, "genre": "閱讀測驗", "topic": "摩根奇境無障礙樂園", "text": "Morgan's Wonderland, located in San Antonio, Texas, is a theme park geared mainly toward mentally or physically disabled children. The park was built by Gordon Hartman, a former real estate developer. The creation of the park was inspired by his daughter, Morgan, who suffers from severe cognitive delay and physical challenges.\n\nThe world's first ultra-accessible family fun park, Morgan's Wonderland opened in the spring of 2010. Admission for guests with special needs is free, and fees for the general public are set at a much discounted price so that people of all ages and abilities can come together and play in a fun and safe environment.\n\nCompletely wheelchair-accessible, the park features 25 acres of attractions including rides, playgrounds, a catch-and-release fishing lake, and picnic areas throughout the park. The rides are custom-designed to accommodate wheelchair riders so that every family member can enjoy the fun. The adapted rides include the Off-Road Adventure, where guests can test their driving skills in sporty vehicles. Moreover, each visitor is offered the option to wear a GPS Adventure Band, which allows them to keep track of each other while in the park. The band also enables them to take part in electronic activities. For example, when the riders scan the band at the Off-Road Adventure, a photo will be taken and sent to their email.\n\nIn June 2017, Morgan's Wonderland celebrated the opening of Morgan's Inspiration Island. The new expansion is composed of five themed splash pads and a River Boat Adventure Ride. The wheelchair guests can transfer out of their chairs into unique, waterproof chairs and enjoy the splash park without risking damage to their personal wheelchairs.\n\n\"Morgan taught me that there's more to life in many ways than what I saw before,\" said Hartman. \"The blessing that Morgan has brought is beyond anything that I ever could have imagined and could explain.\""}, "111-P1": {"id": "P1", "year": 111, "genre": "綜合測驗", "topic": "書鎮 (Book Town)", "text": "A book town is a rural town in which second-hand and antiquarian bookshops are concentrated. The concept was 11 by Richard Booth, who opened the first second-hand bookshop in Hay-on-Wye, UK in 1961. Following him, many local people opened their own bookshops, and the small town soon became a model of sustainable rural development and tourism. Since the 1970s, book towns like Hay-on-Wye 12 up all over the world.\n\nAlthough all book towns have a great number of bookshops, that's where the similarities 13 . Each of these towns shows unique features of its own. Some have many small private shops, while others have organizations steered by volunteers. Some even run regular activities to attract visitors. For example, an annual book festival is held in Hay-on-Wye. Clunes, in Australia, holds a monthly book talk that hosts authors to discuss their latest 14 .\n\nAs digital reading is changing our traditional way of reading, book towns like Hay-on-Wye are particularly important to 15 . The feel of a book, the smell, the weight, and the knowledge that a particular book might be more than a hundred years old—all these highlight the importance of preserving the physical book as a complement to technology."}, "111-P2": {"id": "P2", "year": 111, "genre": "綜合測驗", "topic": "飛機圓形窗戶", "text": "Airline passengers may have noticed that all plane windows have rounded edges, instead of the hard corners commonly found in our house. The round windows are indeed pleasant to the eye, but they actually were designed for reasons 16 aesthetics.\n\nIn the early days of aviation, plane windows 17 square in shape. Then as commercial air travel became popular in the 1950s and airplanes began flying higher and faster, three planes mysteriously broke apart in midair. The cause? Square windows. Scientists found that sharp corners are natural weak spots where stress concentrates. The problem is 18 when airplanes fly at higher altitudes, where the difference between the inside and outside pressure increases, causing added stress. When subjected to repeated pressurization high in the sky, the four corners on a square window may 19 .\n\nCurved windows, on the other hand, distribute stress around more evenly, reducing the likelihood of cracks or breaks. Circular shapes are also stronger and resist deformation, and therefore can 20 extreme differences in pressure inside and outside of an aircraft.\n\nThus, round windows are a major safety innovation that keeps planes from disintegrating mid-flight. They are also used on ships and spacecraft for their greater structural integrity."}, "111-P3": {"id": "P3", "year": 111, "genre": "文意選填", "topic": "特技替身演員", "text": "A stunt person is a man or a woman who performs dangerous acts, usually in the television or movie industry. In this line of work, the person is paid to do daring actions that are deemed too 21 for the regular actor to perform, including jumping from heights, crashing cars, or fighting with weapons.\n\nStunt work emerged out of 22 over time. In the early days of the film industry, actors themselves shot acrobatic acts and dangerous scenes, until they began to get injured. There were, however, no 23 crew members to perform impressive stunts at that time. If something dangerous needed to be done for a scene, the producers would hire anyone crazy or desperate enough to do it. These people were not trained to perform stunts, so they often 24 things for the first time during the actual shooting. They had to learn from their own mistakes, which 25 some their lives, and almost all suffered light or severe injuries.\n\nBeginning around 1910, audiences developed a taste for serial action movies, which 26 the use of dedicated stunt people to perform in dangerous scenes. Such demand increased with the rise of western movies, and many cowboys with masterful skills on horseback found a new 27 as a stunt person. Tom Mix and Yakima Canutt were among the most famous. The 1960s and '70s 28 the development of most modern stunt technology, like air rams and bullet squibs. That technology has continued to evolve into the present.\n\nToday, CGI (computer generated imagery) is widely used in filmmaking, and it is now 29 to create very lifelike scenes without using real stunt people. However, CGI has difficulties of its own, and there will always be a demand for the realism and thrilling 30 of an actual stunt. So the stunt industry is probably in no immediate danger of dying off."}, "111-P4": {"id": "P4", "year": 111, "genre": "篇章結構", "topic": "日本盂蘭盆節 (Obon)", "text": "Obon, or the Bon Festival, is a Japanese holiday that honors the spirits of the dead. 31 The festival usually lasts for four to five days in August. During this period, many people travel back to their hometowns and spend time with loved ones, both past and present.\n\nThough not a national holiday, Obon is surely one of the most traditional events of the year. Celebration often begins with mukaebi (welcoming fire), during which people make a small bonfire in front of their house to guide spirits upon their return back home. 32 Food offerings are presented at house altars and temples. Some regions prepare horses made of cucumbers and cows made of eggplants, hoping that the spirits will come back to Earth quickly, on a horse, and leave slowly, riding the cow.\n\n 33 Paper lanterns and offerings are sent floating down rivers to accompany the ancestors back to their resting place. Many areas will also organize bon-odori dances. The style of the dances varies from region to region but is normally based on the rhythms of taiko drums. Performers usually play on a tall stage with lanterns and banners strung all around. Participants, often dressed in light cotton kimonos, are encouraged to dance to the music around the stage. 34 Originally dedicated to the deceased, the dances have now become a symbol of the summer festival themselves."}, "111-P5": {"id": "P5", "year": 111, "genre": "閱讀測驗", "topic": "馬賽族 (Maasai)", "text": "Standing proud in the savannah with their red blankets and painted shields, the Maasai people are one of the widely known symbols of East Africa. Their unique style, as remarked by Karen Blixen, author of Out of Africa, \"has grown from the inside, and is an expression of the race and its history.\"\n\nThe Maasai are a semi-nomadic group in Kenya and northern Tanzania, wandering in bands and living almost entirely on the meat, blood, and milk of their herds. Over the years, the fearless tribesmen have stood strong against slavery, and resisted the urging of the Kenyan and Tanzanian governments to adopt a more modern lifestyle. In fact, they are one of the few tribes that have retained most of their traditions. Up until recently, the only way for a Maasai boy to achieve warrior status was to single-handedly kill a lion with his spear.\n\nMaasai clothing varies with age, gender, and place. The most recognizable piece of clothing is the shúkà, a sheet of fabric worn wrapped around the body. Red is a popular color, and women generally opt for checked, striped, or patterned pieces of cloth. Young men wear black for several months after their circumcision, a ritual signifying their coming of age. A Maasai warrior is rarely seen without his spear and shield. In Blixen's words, \"their weapons and finery are as much a part of their being as are a stag's antlers\" (a male deer's horns).\n\nBeadwork is an important part of Maasai culture. Beaded jewelry is made by women, and is famous for its complexity. Natural materials such as clay, shells, and ivory were used before trading with the Europeans in the 19th century. They were then replaced by colorful glass beads, allowing for more detailed beadwork and color patterns. Multicolored beadwork is popular among both men and women. Each color holds a special meaning: White stands for peace, green for land and production, while red—the most favored color among the Maasai—is the symbol of unity and bravery."}, "111-P6": {"id": "P6", "year": 111, "genre": "閱讀測驗", "topic": "安全帽 (Hard Hat)", "text": "A hard hat is a helmet used mostly at worksites to protect the head from injuries due to falling objects. Since its introduction in the early 20th century, the headgear has saved countless lives and is considered the number one safety tool for construction workers.\n\nThe hard hat was invented in 1919 by Edward W. Bullard, who had just returned from World War I. Before the war, workers used to smear their hats with coal tar for protection of their head. Bullard, having witnessed the life-saving power of the metal helmet in the War, decided to produce a head protection device that was affordable for every worker and lightweight enough to be worn all day long. The Hard Boiled Hat was thus born, using steamed canvas and leather, covered with black paint, and featuring a suspension system to reduce impact. Soon, hard hats became widely used. The headgear was later made mandatory at construction sites in major construction projects, such as the Hoover Dam in 1931 and the Golden Gate Bridge in 1933.\n\nOver the past century, hard hats have advanced considerably, evolving from canvas and leather to aluminum, fiberglass, and, eventually, to thermoplastic. Recently, new models have been introduced and accessories added to meet the needs of laborers working on various job sites. For instance, a ventilated hard hat was developed to keep wearers cooler, and see-through face shields were attached to better see the hazards lurking above. Today, attachments include radios, sensors, cameras, and a lot more. A common color code has also been developed for recognizing people and their roles on site. Yellow is used for general laborers and contractors, white (or sometimes black) for supervisors and managers, and green for inspectors and new workers.\n\nNew products continue to expand the market. Global sales of hard hats totaled USD 2.1 billion in 2016, and are expected to reach USD 3.19 billion in 2025."}, "111-P7": {"id": "P7", "year": 111, "genre": "閱讀測驗", "topic": "斑馬魚再生能力", "text": "Zebrafish, named for their characteristic stripes, have been a popular test subject for researchers. Only a few centimeters in length, the fish breed easily in captivity, grow quickly, and their transparent body makes it easy to study their organs. Above all, they possess some amazing \"self-healing\" power. When part of their heart is removed, they can grow it back in a matter of weeks. When blinded, they can quickly regain the ability to see.\n\nRecent studies show that humans and zebrafish have the same major organs and share 70 percent of the genes. Moreover, 84 percent of human genes associated with disease find a counterpart in zebrafish. Scientists thus hope that understanding the self-healing mystery of the fish may one day allow humans to regenerate such organs as eyes, hearts, and spines.\n\nResearchers at Vanderbilt University are particularly interested in zebrafish retina regeneration. They have learned that damage of retina can cause blindness in zebrafish, yet it only takes about three to four weeks before vision is restored. The structure and cell types of zebrafish retinas are almost identical to those of humans. If the process can be replicated in humans, it may give rise to new treatments for blindness caused by retinal damage.\n\nIn order to know exactly how zebrafish retina is regenerated, the team looked at the neurotransmitter gamma-aminobutyric acid (GABA), a chemical messenger in the brain that reduces the activity of neurons. They found that lowering GABA levels in zebrafish can trigger retina regeneration, while a high level of GABA concentration will suppress the regeneration process. This suggested that GABA plays an important role in the fish's ability to regain their sight.\n\nThe team is beginning to test the GABA theory on mice. If that works, human trials will be next on the agenda. If the research proves successful in humans, some of the nearly 40 million blind people worldwide may one day have a tiny, striped fish to thank."}, "112-P1": {"id": "P1", "year": 112, "genre": "綜合測驗", "topic": "樹冠羞避現象", "text": "In certain forests, when you look up you will see a network of cracks formed by gaps between the outermost edges of tree branches. It looks like a precisely engineered jigsaw puzzle, each branch growing just perfectly so it almost, __11__, touches the neighboring tree. This beautiful phenomenon is called crown shyness.\n\nScientists have been discussing crown shyness since the 1920s, proposing __12__ explanations for the phenomenon. Some researchers point out that as trees often grow close together, treetops can easily collide and break when swayed by the wind. In order to protect their branches from breakage, trees maintain \"shyness gaps\"—spaces large enough to prevent them from touching their neighbors.\n\nOther scientists suggest that plants, like animals, __13__ resources—nutrients, water, space, and light. In forested areas with thick tree crowns, there is intense struggle for these resources. Gaps in the treetops resulting from crown shyness may allow trees to increase their __14__ light and enhance photosynthesis. Additionally, by having branches that do not touch those of their neighbors, trees may be able to limit the spread of leaf-eating insects, and potentially also the transmission of diseases from tree to tree. __15__ decades of investigation, there is no consensus on exactly what causes the beautiful and mysterious phenomenon of crown shyness."}, "112-P2": {"id": "P2", "year": 112, "genre": "綜合測驗", "topic": "太空重力與太空人健康", "text": "Gravity has been at the top of the science agenda since the start of Mars missions. In the earlier days of space travel, scientists tried to overcome the force of gravity so that a rocket could shoot __16__ Earth's pull in order to land humans on the moon. Today, they are more interested in how reduced gravity affects the astronauts' __17__ condition.\n\nOur bodies have evolved to exist within Earth's gravity (1 g), not in the weightlessness of space (0 g) or the microgravity of Mars (0.3 g). When on Earth, we have more fluids in our lower body because they are pulled down by Earth's gravity. However, with the absence of gravity in the outer space, our body fluids __18__, shifting toward the upper body and the head. As a result, the astronauts have swollen, puffy faces, very much resembling that of the round-headed Charlie Brown in the famous comic strip. This \"Charlie Brown effect\" will be more __19__ when the astronauts go on their Mars missions, which will take about three years to complete, much longer than missions to the moon. Moreover, the effect is often __20__ space motion sickness, headaches, and nausea. Such a syndrome is considered the top health risk for the astronauts, and scientists are still trying to figure out how it may be prevented."}, "112-P3": {"id": "P3", "year": 112, "genre": "文意選填", "topic": "水分補充與最佳飲品", "text": "Water makes up more than half of our body weight. To sustain this amount of fluid in our bodies, plain water is considered our best choice, for it contains no sugar and no calories. Yet, is water always the healthiest drink we can __21__? Well, it depends on who and where we are, and what we're doing.\n\nObviously, a physically __22__ person with an outdoor job under the sun will need to drink more fluid than a desk-bound person who lives and works in an air-conditioned place. But there's more to it than that. When a person sweats, he loses water and salt, so he needs to replace both. Replacing lost fluid with just plain water means the body has too much water and not enough salt. To __23__ things out, the body will get rid of water by producing urine. For this reason, milk can actually be more __24__ than drinking water. Milk naturally contains salt and lactose, a sugar which the human body needs in small amounts to help stimulate water __25__. Coconut water, which contains salt and carbohydrates, is also more functional than water at restoring and maintaining a normal fluid __26__ after exercise.\n\nFor the average person, however, water remains a very good __27__ for keeping hydrated—if you know how to drink it. The secret is: Never wait until the body is telling you you're thirsty, since there must already have been significant changes in your body for it to eventually __28__ your consciousness. At that point, it might be well past the best moment to take in fluid. Also, drinking a lot of liquid in one go can cause more water to __29__ the body quickly and come out as urine. To __30__ this, you need to drink water throughout the day to maintain your hydration levels.\n\n(A) absorption (B) active (C) alert (D) combat (E) option (F) effective (G) even (H) status (I) pass through (J) reach for"}, "112-P4": {"id": "P4", "year": 112, "genre": "篇章結構", "topic": "聯覺", "text": "Have you ever thought of \"coloring\" the names of the days of the week? When you listen to someone speaking, do you see a rainbow of colors? Or perhaps Mozart's music tastes like an apple pie to you? If so, it is very likely that you have synesthesia.\n\nSynesthesia is a condition in which people's senses intermix. In some cases, people with synesthesia may experience colors when they hear, read, or even think of letters and numbers. In others, words can trigger a real sensation of taste on their tongue.\n\n__31__ In the early 1990s, however, scientists noticed that synesthetic colors do not change over time. When asked what color is evoked by a letter or number, synesthetic people would persistently give the same answer even if tested months or years apart. __32__ The most compelling support, however, comes from brain scans, which show that color processing areas in the brain light up when these people listen to certain words.\n\nIs synesthesia genetically inherited or acquired after birth? Scientists agree that synesthesia has a genetic basis, because it frequently runs in families. But an actual synesthesia gene (or genes) has not been identified yet. __33__ For example, the flavors people with taste-word synesthesia experience are usually childhood flavors, such as chocolate or strawberries. Also, people with color-music synesthesia more often than not have had early musical training.\n\nOnce thought to be extremely rare, synesthesia is now found to affect about one to four percent of the population. __34__ As is often observed, most of us tend to associate lower notes with darker colors and higher notes with brighter colors. Researchers further point out that in most people synesthesia is active only during the first months of their infancy, while this ability remains forever in certain individuals.\n\n(A) This consistency serves as a proof that synesthesia is real. (B) Meanwhile, environmental influences seem to shape a person's synesthesia. (C) People with synesthesia used to be accused of making their experiences up. (D) Some studies even show that people may all be synesthetic to some degree."}, "112-P5": {"id": "P5", "year": 112, "genre": "閱讀測驗", "topic": "呼拉圈的歷史", "text": "When did people first experience the joy of the hula hoop? Although the term did not emerge until the 18th century, toy hoops twirled around the waist, limbs, or neck can be traced back to ancient times. As early as 1000 BC, Egyptian children played with hoop toys of dried grapevine. They threw, jumped, and slung them around their bodies as we do today. They also struck them with sticks to roll them down the road. Hoop rolling was also popular in ancient Greece. Their hoops, often made of metal, were not merely toys for Greek children but served as exercise devices as well.\n\nIn the 14th century, hoops were popular as a form of recreation in Great Britain. The craze for hoops even resulted in dislocated backs and heart attacks, according to medical records. The term \"hula,\" however, did not enter the English language until the 1700s, when British sailors first witnessed hula dancing in the Hawaiian Islands. Though no hoops were used, the movements of the ritual dances looked very similar to those in hooping. Thus \"hula\" and \"hoop\" came together, resulting in the term \"hula hooping.\"\n\nHoops spun their way through the cultures of pre-colonial America as well. Often considered as representing the circle of life, hoops featured prominently in the ritual dances of Native Americans. Dancers used small reed hoops as symbolic representations of animals such as eagles or snakes. With very rapid movements, they used the hoops to construct the symbolic forms around their bodies.\n\nThe hula hoop gained international popularity in the late 1950s, when a plastic version was successfully marketed by California's Wham-O toy company. Twenty-five million plastic hoops were sold in less than four months. The hula hoop \"fad\" is still going strong today."}, "112-P6": {"id": "P6", "year": 112, "genre": "閱讀測驗", "topic": "印度茶園與亞洲象", "text": "When you enjoy your morning cup of tea, you are probably not aware that those tea leaves can mean injury, or even death, for Asian elephants roaming Indian tea gardens.\n\nIn the Indian state of Assam, growing numbers of tea farms are destroying the Asian elephant's habitats and endangering their population. Much of the forest land where tea is grown in Assam is flat and thus farmers must dig drainage trenches to prevent water from accumulating and hurting the shrubs. The trenches, however, can be death traps for the elephants. Since the elephants need to use tea plantations as landmarks when navigating forests, they almost inevitably have to move through the farms. Moreover, because there are fewer humans around, pregnant females often use tea-growing areas as safe shelters to give birth. But baby elephants, not used to negotiating rough ground, may easily fall into the trenches and get hurt; and once injured, they might not be able to climb out. When mothers try to dig their babies out, both may be trapped and smothered by thick mud. Furthermore, elephants are known to resist leaving their sick or dying behind, and a herd may linger at a trench with a trapped baby for hours, reluctant to move on until all hope is lost.\n\nIs it possible for elephants to coexist with the prosperous tea business? Elephant Friendly Tea is an organization that takes the initiative to make it possible. The organization encourages consumers to choose brands that take precautions to protect elephants and has set up a certification program to reward tea growers who are doing it right. Until now, only smaller tea brands have been certified, but awareness is growing. The organization believes that people may be motivated to buy elephant-friendly brands when they know more about the risk tea can pose to these endangered animals."}, "112-P7": {"id": "P7", "year": 112, "genre": "閱讀測驗", "topic": "尚吉巴的貿易史", "text": "Situated off the coast of Tanzania and washed by the warm, clean waters of the Indian Ocean, Zanzibar is a tropical archipelago comprised of several scattered islands. This popular beach destination is now famous for its white sand beaches, slender palms, and turquoise seas. But few people know that in the past, control of Zanzibar meant access to unimaginable wealth.\n\nFrom ancient times, Zanzibar has been a trading hotspot, thanks to its location on the trade route between Arabia and Africa. Traders from Asia had already visited the islands 900 years before the arrival of its first permanent settlers from the African mainland (around 1000 AD). In the 8th century, Persian merchants built settlements here, which grew over the next four centuries into their trading posts. Between the 12th and 15th centuries, trade increased between Arabia, Persia, and Zanzibar, bringing the archipelago both wealth and power.\n\nDuring the Age of Exploration, commerce in Zanzibar quickly boomed, largely due to the rise of the spice trade. At the close of the 15th century, Europeans' craze for spices gave rise to the Spice Route, a network of sea lanes joining Europe with the Far East, where most spices came from. In 1498, Portuguese explorer Vasco da Gama made the first sea voyage to India, via the southernmost tip of Africa. In 1499, he arrived at Zanzibar, an archipelago sitting at the crossroads of the Spice Route. The islands soon attracted traders from different lands. Hundreds of ships sailing the Spice Route docked here, bringing spices and goods for transaction, and Zanzibar became one of the biggest trading centers in the world.\n\nSince the 16th century, Zanzibar has come under the rule of the Portuguese, the Arabians, and then the British, each leaving a mark on the place. The paths of various religions also crossed here: Muslims have lived peacefully with Christians and Buddhists on the islands for centuries. The unique cultural intersections, scented with the aroma of cloves, vanilla, and cinnamon floating in the air, give these jewels on the Indian Ocean an amazing charm that goes far beyond tropical beach fun."}, "113-P1": {"id": "P1", "year": 113, "genre": "綜合測驗", "topic": "神秘客(mystery shoppers)", "text": "Mystery shoppers are paid consumers who are hired to shop in stores and collect data. They are sent to a wide variety of service-based businesses, including stores, restaurants, and banks—potentially anywhere customers are served. Sometimes referred to as secret shoppers, mystery shoppers 11 regular customers to purchase items, eat in restaurants, make inquiries, or return items. They grade and report on the quality of products, customer service, and environment of the stores 12 they are assigned.\n\nWhen evaluating a business, mystery shoppers have to follow certain standard procedures to avoid 13 . They are often given a checklist that provides directions on what to observe or look out for to ensure consistency. Sometimes these shoppers collect data about their \"normal\" observations, such as cleanliness of the store or timeliness of the service. They may also pretend to be 14 customers, arguing with a salesperson without a good reason. With the data they collect, mystery shoppers can identify areas for 15 and thereby help enhance the quality of products and services. In this way, these secret shoppers may help a business gain a competitive edge."}, "113-P2": {"id": "P2", "year": 113, "genre": "綜合測驗", "topic": "人肉鬧鐘 knocker-up", "text": "The modern worker rolls out of bed, groans, and turns off an alarm clock before reluctantly getting up for the day's work. But how did people get to work on time before alarm clocks were widely used?\n\nDuring the second Industrial Age, people toiled at unusual hours in mines or factories and often had to get up for work early in the morning. They 16 alarm clocks because adjustable alarms had been invented by the mid-19th century. But the new device was still relatively expensive and unreliable. British workers thus relied on a human alarm clock known as a \"knocker-up.\" 17 sticks or pea shooters, the human alarms would tour the streets, tap on windows, or blast them with dried peas, trying to wake paying customers in time for work.\n\nWhether they wielded rods or pea shooters, knockers-up became 18 throughout the United Kingdom. Every morning, these people, often older in age, were seen in big streets and small alleys, waking up their customers professionally. They usually would not leave people's houses until they were sure their customers were awake.\n\nWhile the practice continued in some parts of the country until the 1970s, it 19 as alarm clocks became more widespread and affordable. Today, beeping alarm clocks and smartphones that play morning music are surely simpler and more convenient. However, they cannot 20 the personal attention coming from the distinctive tap of a pea shooter."}, "113-P3": {"id": "P3", "year": 113, "genre": "文意選填", "topic": "風之電話 wind phone", "text": "On a hilltop overlooking the 2011-tsunami hit Otsuchi Town in northeastern Japan, there is a white phone booth standing all alone in the wind. The lonely \"wind phone\" serves to connect family members to their 21 loved ones who died in the tsunami that claimed 18,000 lives. People come to speak to those they have lost, to say the words they never got to say on that 22 day.\n\nThe idea for the wind phone was first 23 by a Japanese garden designer named Itaru Sasaki, who was grieving over the death of his cousin in 2010, before the tsunami. Feeling that he needed a private space to help him navigate through the 24 , Sasaki positioned a booth where he could \"speak\" to the dead relative. The booth he built 25 only an old dial phone with a disconnected phone line. When he stepped into the booth, he could pick up the phone to call his cousin, telling him how he was, and how he missed him. Sasaki stated in an interview: \"Because my thoughts couldn't be 26 through a regular phone line, I wanted them to be carried on the wind.\" Hence, the wind phone allows Sasaki to create a one-way conversation with deep, soulful personal meaning, and renders the grieving process more 27 for him.\n\nSasaki opened his wind phone to the public in 2011, after the devastating tsunami. News about the phone gradually spread, and the booth has become a 28 between the living and the dead. Phones resembling the wind phone have since been built around the world. Some were even set up to allow people to call their loved ones lost in the COVID-19 pandemic.\n\nGrieving is a natural 29 for coping with loss of a loved one, and people grieve in various ways. For those who speak into the wind phone, 30 is always there: They believe that their messages will—through some unknown way—reach the deceased."}, "113-P4": {"id": "P4", "year": 113, "genre": "篇章結構", "topic": "運動傷害後仍持續運動", "text": "While Dr. Weinstein, a surgeon at Dartmouth College, was trying to lift a heavy box, he twisted his back. The pain was agonizing. The surgeon could not sit, and when he lay down he could barely get up. So he decided to go out for a run. He took an aspirin, iced the injured area, and off he went. When he returned, he felt \"pretty good.\"\n\n 31 When people have sprained a muscle or tendon, they are usually advised not to go right back to exercising until the pain goes away. But Dr. Weinstein says that approach is outdated and counterproductive. In fact, when active people consult him, he usually tells them to just keep exercising.\n\nDr. Weinstein is not alone in his treatment of sports injury, but the specific advice can differ from specialist to specialist. 32 They nevertheless caution that a cutback may be necessary, such as running shorter distances or going more slowly. Others say the patients may need to engage in sports outside of their usual, main sport (that is, to cross-train), at least some of the time. Still others say the safest thing to do is cross-train all the time until the pain is gone. 33 Their consensus, however, is that unless the injury involves something as serious as a broken bone or a ripped muscle, moderate exercise can actually speed healing.\n\n 34 Thus, more and more patients are now advised to keep moving despite the pain. The rule of thumb, however, is to see a doctor first and get an accurate diagnosis. If a serious injury is ruled out and the pain is not getting worse after exercising, then the exercise \"makes a lot of sense.\""}, "113-P5": {"id": "P5", "year": 113, "genre": "閱讀測驗", "topic": "魔鬼氈 Velcro 的發明", "text": "One fine morning in 1941, Swiss engineer George de Mestral went for a walk in the woods with his dog. Upon their return home, he found a lot of burrs (from plants) stuck to the dog's fur and his pants. He immediately rushed to his microscope and examined the burrs attached on his pants—feeling a lightbulb moment coming on.\n\nUpon closer examination, de Mestral observed that the burrs, which appeared straight to the naked eye, actually contained many small hooks that clung firmly to the loops in the fabric of his pants. He determined that if he could recreate the same thing, making hooks-and-loops that bind to each other firmly, he could produce a strong fastener with many uses.\n\nDe Mestral's first challenge was finding a fabric for a strong bonding system. He first tried cotton, but it proved too soft and could not withstand repeated openings and closures. After years of research and testing, he learned that synthetics worked best and eventually settled on heat-treated nylon, a strong and durable substance. By 1955, he had completed an improved version of the product, with each square inch of material containing 300 hooks, which made it stay fastened and yet easy enough to pull apart when needed. Named \"Velcro,\" from the French words velours (velvet) and crochet (hook), the new product received a patent from the Swiss government in 1955. De Mestral thus began mass-producing Velcro, opening plants in Europe and eventually into Canada and the United States.\n\nInitially Velcro did not fare well. As most fashion critics considered it ugly and cheap-looking, the use of Velcro was limited to athletic equipment. In the early 1960s, the product received a huge boost in popularity when NASA began using it in a lot of equipment that went into space along with astronauts. Today, de Mestral's design is found almost everywhere: clothing and footwear, toys, airline seat cushions, blood pressure cuffs and surgeons' gowns. Most impressively, the magical fastener was used in the first human artificial heart transplantation to hold together parts of the device."}, "113-P6": {"id": "P6", "year": 113, "genre": "閱讀測驗", "topic": "畫家 Thomas Moran 與國家公園", "text": "Thomas Moran, a famous painter in the 19th century, played an important role in the establishment of American national parks. His vivid paintings brought the splendor of the extraordinary landscapes before the eyes of American people, thus setting the stage for the regions to be widely recognized and officially established as national parks.\n\nMoran came to the United States at age 7 with his family and settled in Philadelphia. They came from northwest England, the blackened heart of the Industrial Revolution: Its main street was \"a dark, unattractive hole\" and the river running through it was a string of dirty water. That was all the nature that Moran knew. Moran began painting by age 15, inspired by the landscape paintings of the British master J.M.W. Turner. There was plenty of landscape for him to paint in America, much different from his hometown. Showing great talent in painting, Moran was soon hired as an illustrator at Scribner's Monthly, and later appointed chief illustrator by age 34. In 1871, he was appointed to illustrate The Wonders of Yellowstone, a story by Nathaniel P. Langford, who had participated in an expedition to Yellowstone. Captivated by the utterly fantastic sights Langford described, Moran became eager to see this odd territory for himself.\n\nIn 1871 Moran joined the first US government survey of the Yellowstone region with photographer William Henry Jackson. For two weeks he filled his sketchbook with the landscape's most stunning sights. Moran's watercolors—the first color renderings of the area—as well as Jackson's photos and the survey results were presented to the Congress. His powerful images of Yellowstone fired the imagination of Congress members. In March 1872, lawmakers officially made Yellowstone a national park, the world's first.\n\nBefore Moran arrived, Yellowstone in the popular imagination was a harsh, wild place with hot water and steam coming out of hellish holes in the ground. Since the painter's work appeared, Yellowstone National Park has come to be known as a picturesque wonderland. By the time Moran died, he had painted a dozen other areas that would become national parks or monuments."}, "113-P7": {"id": "P7", "year": 113, "genre": "閱讀測驗", "topic": "冰島 100% Fish 計畫", "text": "In 2020, Petur Oddsson, a power station worker in Iceland, was struck by a 60,000-volt current. The electrical shock burned almost half of his body and melted layers of his skin off. Such deep and extensive burns can be fatal. But Oddsson's life was saved by a creative invention: transplanting codfish skins onto human bodies.\n\nA triumph for medical technology, Oddsson's fish skin transplantation was actually part of the astonishing achievement of \"100% Fish,\" an ambitious task in promoting environmental efficiency. The Icelandic project, from which this pioneering procedure emerged, strives for making a fundamental change in the marine industry. It aims to encourage full utilization of each fish caught, and to strengthen innovation in seafood products.\n\nReducing waste of fish catch has become a serious issue today, when many countries are faced with food crises. According to a 2003 study, about 60% of a codfish caught in Iceland was lost or wasted during the production process for human consumption. Under the guidance of 100% Fish, however, Icelanders are now using almost 95% of a cod. Cod skin, for example, is made into calcium supplement and energy drinks, and even as material for skin transplantation as in Oddsson's case. Dried fish heads and spines are exported to West Africa, where they are used as the base of a protein-rich soup. Other groundbreaking products, including Omega-3 capsules, cold virus pretreatment sprays, and dog snacks are made from what was once cod catch detritus.\n\nThe Icelandic success is accomplished largely through cooperative efforts across various industries. 100% Fish takes the initiative to show seafood companies the importance of collaboration, and facilitate valuable connections between fishing companies and other participants of the project, including academia, start-ups, and research and development teams. By sharing knowledge and information, the different sectors are able to come up with improved processing and handling, through which creation of various innovative products was made possible. The project not only helps Icelanders to get 30% more value from each cod than most developed countries, but also provides an effective model to promote resource efficiency worldwide."}, "114-P1": {"id": "P1", "year": 114, "genre": "綜合測驗", "topic": "世界咖啡館討論法的起源", "text": "In 1995, a group of business and academic leaders met at the home of Juanita Brown and David Isaacs in Mill Valley, California. None of them had any idea they were about to create a social innovation that 11 rapidly around the world.\n\nThe group was supposed to have a large-circle discussion in their beautiful garden. Unfortunately, it started pouring. With their plan 12 by the rain, the two dozen participants squeezed into the living room. They broke into small, intimate table conversations, recording their insights on paper tablecloths. They periodically stopped their conversations to switch tables so the insights and ideas might 13 and deepen. As they moved from one table to another, they noticed new ideas emerging from the discussions. This in turn enriched subsequent rounds of conversation. Over the course of the morning, the innovative discussion process 14 a new form of collective effort that transformed the depth, scope, and quality of their discussion.\n\nThe World Café was 15 created. Since that rainy morning in Mill Valley, the World Café approach has been applied to multi-group discussions and cooperative actions by businesses, industries, and educational institutions around the world."}, "114-P2": {"id": "P2", "year": 114, "genre": "綜合測驗", "topic": "暈車暈船（動暈症）", "text": "If you have ever been sick to your stomach on a rocking boat or a bumpy car ride, you know the discomfort of motion sickness. It can 16 suddenly, progressing from a feeling of uneasiness to a cold sweat. Soon, it can lead to dizziness, nausea, and vomiting.\n\nMotion sickness occurs when the signals your brain receives from your eyes, ears, and body 17 . Your brain doesn't know whether you are stationary or moving when these parts send conflicting information: One part of your balance-sensing system detects that your body is moving, but the other parts 18 . Your brain's confused reaction makes you feel sick. You may experience the discomfort from the motion of cars, boats, or amusement park rides. You may also get sick from playing video games, or looking through a microscope.\n\nYou can take some 19 to help avoid the discomfort. If you are traveling, reserve seats where motion is felt the least, such as the front row of a car or forward cars of a train. Looking out into the distance from the vehicle can help 20 . You can also take medicine before your ride to avoid or reduce nausea and vomiting."}, "114-P3": {"id": "P3", "year": 114, "genre": "文意選填", "topic": "巴黎聖母院的鐘", "text": "The Notre-Dame de Paris is one of the most famous cathedrals in Europe. Located at the heart of Paris, this medieval cathedral is 21 for its intricate architecture, stunning stained glass windows, and, above all, its bells.\n\nMounted in the two tall towers of the cathedral, Notre-Dame's bells have been ringing for over 800 years. In fact, there is documented 22 to the ringing of bells even before the cathedral's construction was completed, dating as far back as the 12th century. The 10 bells vary in size, each 23 a name. The largest one, named \"Emmanuel,\" weighs over 13 tons. It is the only one of the whole group that 24 the French Revolution, while the rest were melted down for weapons. The melted bells were recast in the late 19th century. But due to their poor acoustic quality, all of the bells were replaced in 2013—except for Emmanuel, which 25 its renowned, excellent sound. This particular bell, ringing in F sharp, is considered one of the most harmonically beautiful in Europe.\n\nOver centuries, the bells have become a 26 part of life in Paris, where they are known as \"the cathedral's voice.\" They have been used to mark the hours of the day, to call the 27 to prayer, and to signal emergency situations such as fires and invasions. They have also rung in times of 28 and of mourning, announcing such events as royal weddings and coronations of kings, as well as funerals of heads of state.\n\nHowever, after the devastating fire that damaged the cathedral in 2019, the bells fell 29 . The building went through a complex and time-consuming process of 30 , and the famous monument was finally reopened on December 8, 2024. The sounds of Notre-Dame bells once again filled the air in Paris, and will be heard for generations to come."}, "114-P4": {"id": "P4", "year": 114, "genre": "篇章結構", "topic": "膠囊旅館", "text": "A capsule hotel, also known as a pod hotel, is a unique type of basic, affordable accommodation. Originated in Japan, these hotels were initially meant for business professionals to stay close to populated business districts without spending a lot. 31 \n\nA typical room of a capsule hotel is roughly the length and width of a single bed, with sufficient height for a guest to crawl in and sit up on the bed. The walls of each capsule may be made of wood, metal or any rigid material, but are often fiberglass or plastic. 32 Each capsule is equipped with a comfortable mattress, a small light, and sometimes a television or other entertainment options. Such minimalist design is what makes these hotels both inexpensive and efficient, providing only the essential elements for a good night sleep.\n\nThe first capsule hotel, the Capsule Inn Osaka, opened in 1979. Since then, capsule hotels have quickly spread to other cities and countries. Chains have emerged in Taiwan, Singapore, and even on resort islands like Bali. Pod hotels are also seen in Europe and North America, especially in big cities like New York, London, and Paris. 33 Instead of the traditional bare pod-sized style, new chains now feature interior design that appeals to digitally connected travelers from around the world. Guests may enjoy facilities such as free Wi-Fi, mobile charging, and even a soundless alarm system that raises the sleeping guests into a seated position while gradually brightening the lights.\n\nWhile offering budget-conscious travelers a unique option, capsule hotels may not be suitable for everyone. Some hotels may not provide air conditioning in the capsules, leading to poor air flow. 34 Also, you may have to share common facilities (such as bathrooms) with other guests. And, if you're worried about feeling claustrophobic in small spaces, you'd better think twice before making a reservation."}, "114-P5": {"id": "P5", "year": 114, "genre": "閱讀測驗", "topic": "交通號誌燈的發明與演進", "text": "While waiting to cross the street at busy intersections, have you ever wondered who invented the traffic light? Most people credit the first traffic light to Nottingham engineer John Peake Knight. A railway manager, Knight specialized in designing the signaling system for Britain's growing railway network in the 1860s. He saw no reason why this could not be adapted for use on the busy London intersections. Thus, he proposed a signaling system based on the railway movable-arm signal: Arms extending horizontally commanded drivers to stop, whereas arms lowered to a 45-degree angle told drivers to move on, resembling a traffic director's gestures. Red and green gas lamps were added to the signal for use at night. A police officer was stationed by the side to operate the system.\n\nKnight's traffic signal was installed near London's Westminster Bridge in December 1868, but the system was short-lived. A gas leak one month later caused an explosion in the lights, injuring the policeman operating it. Deemed a public hazard, the project was immediately dropped, and traffic lights were banned until their return in 1929 back to the British streets.\n\nIn the early 1900s, versions of the British traffic lights appeared in big cities in America, where traffic was on a sharp rise. Systems using movable arms were popular in Chicago, while those using the red and green lights were adopted in San Francisco. Patents with innovations on Knight's ideas were filed nationwide. A major breakthrough was the yellow light invented by a Detroit police officer William Potts. Installed in Detroit in 1920, Potts' three-color system allowed for the added signal \"proceed with caution\" to be displayed.\n\nNow, with the emergence of self-driving cars, researchers have begun to suggest that traffic signals are no longer necessary. Intersections will operate in a way that cars automatically adjust their speed to cross through, while maintaining safe distances from other vehicles. In the near future, we may experience a brand new form of traffic management!"}, "114-P6": {"id": "P6", "year": 114, "genre": "閱讀測驗", "topic": "恐怖電影的益處與風險", "text": "Typically featuring zombies and serial killers, horror movies are too frightening to be fun for some people. But many others enjoy a good fear spectacle, and line up to see the latest scary movie. Given the variations in preferences, new studies have started to untangle the benefits and risks of horror movies.\n\nOne benefit of horror movies revolves around the concept of so-called \"safe fear.\" When watching a frightening film, people are in the comfort of their own home or theater seats rather than under the threat of any real danger. In a controlled environment, these films may actually reduce the negative impact on viewers and help them become tougher. Secondly, as people are drawn into the story, they tend to take the perspective of the characters and rehearse the plot unconsciously. Researchers believe that viewers are learning vicariously this way, picking up tips on how to handle threats in the real world. In addition, studies show that the thrill and excitement linked with scary films can be therapeutic: It allows viewers to release bottled-up emotions and experience a sense of relief after the movie is over. This probably explains why during the COVID-19 pandemic, horror and pandemic thrillers were the most-watched movies on digital movie apps.\n\nHowever, researchers also find that horror movies can have negative effects on some people. People who are more sensitive to anxiety can panic after viewing a thriller. For those with unpleasant experiences, trauma may be triggered by the themes and images in the movies, which could make their symptoms worse. Furthermore, watching horror movies can disturb sleep patterns, as the residual fear and anxiety they evoke may keep people awake all night, thus leading to fatigue and irritability the following day. Finally, specialists warn that frightening films can have a negative impact on children. Children under 14 who watch horror movies have a greater chance of developing anxiety later in adulthood. Worse yet, exposure to graphic violence and bloodshed can make them less sensitive to real-life violence and more accepting of aggression."}, "114-P7": {"id": "P7", "year": 114, "genre": "閱讀測驗", "topic": "俄羅斯與酒精消費的歷史", "text": "Russia is widely portrayed as the most alcohol-dependent country in the world. Critics of the country say that drinking is almost an inherent trait of the Russian people. However, there is more to the story.\n\nThe consumption of alcoholic beverages was unusual in ancient Russia. Before the adoption of Christianity in Russia (10th century), there were no vineyards and therefore no wine. People only drank beverages with low alcohol content. Vodka, Russia's national drink, was not a Russian invention. The liquid was originally a grape alcohol introduced from France in the late 14th century. The first Russian-made vodka appeared in the 15th century, and the drink remained relatively low in alcohol content until the mid-18th century.\n\nThere is contradictory information about Russians' inclination toward alcohol in the 15th and 16th centuries. Some documents noted that Russians \"indulge in excessive drinking whenever the occasion arises,\" while others claimed that Russians \"rarely drink wine.\" The heaviest drinkers in medieval Europe were actually Germans. There were many sayings about their desire for alcohol, such as \"drunk as a German.\"\n\nThe Russian state played a significant role in the spread of alcohol consumption in the country. In the 19th century, the emperors began to establish a state monopoly, largely due to the rise of illegal production of low-quality vodka. Thus, only the government was permitted to produce the alcohol. This soon filled the state treasury with huge revenues, but it also encouraged vodka consumption. The situation worsened when the industrial production of vodka began in the country, causing its prices to drop sharply and making it available to even low-income citizens.\n\nMeanwhile, a powerful anti-alcohol movement started in the 19th century. Government policies were made and public organizations established to prevent the spread of alcoholism in the country. The movement continued over the years; however, the problem remains. Although Russia does not occupy first place when it comes to alcohol consumption per capita, it is still close to the top."}, "115-P1": {"id": "P1", "year": 115, "genre": "綜合測驗", "topic": "白犀牛用糞便溝通", "text": "From the campfire to the café, people have always gathered together to share the latest news. White rhinoceroses, __11__, do the same thing—only their choice of meeting place is a giant pile of poop. A new study indicates that rhinos have a smelly way to __12__. Scientists studying white rhinos in South Africa have found that these animals leave messages in their poop. In particular, they leave their poop in the same place for all the other members in the group to smell — just like humans leaving messages on social media. Furthermore, different rhinos leave different chemicals in their poop, which provide important __13__ about the age, sex, general health, and reproductive conditions of each specific rhino. This is of great significance for the peace and harmony in the group. When all members in a group know what's going on with each other, it is __14__ that they will fight. The researchers have even made \"fake poop\" to see how different rhinos would react. They find that dominant males are particularly __15__ the \"fake poop\" that carries chemicals from females ready to mate. The males sniff it for longer duration and come back to the same spot more frequently, a clear sign that they are gathering information about mating opportunities from the poop."}, "115-P2": {"id": "P2", "year": 115, "genre": "綜合測驗", "topic": "港式飲茶的歷史", "text": "The history of dim sum stretches back to the early days of the Silk Road, an ancient network of trade routes connecting the East and the West. Those who traveled along the routes through China needed places to rest. Teahouses thus sprang up to __16__ the weary travelers, offering them a cup of tea to help them regain energy. But the culinary art of dim sum __17__, for it was considered inappropriate to pair tea with food. Centuries later, the ability of tea to aid in digestion finally became known. Teahouse owners therefore began providing bite-sized snacks as an accompaniment, and the tradition of these Cantonese delicacies was born. Dim sum is more than just an example of Chinese cuisine. It is __18__ an enjoyable dining experience that can span hours. The small portions were designed to merely \"touch the heart,\" as the name literally means, and __19__ were first enjoyed as snacks. The small size allows the customer to order a great variety of dishes, creating a banquet of different tastes and flavors. It is customary for big groups to enjoy simple dishes together as __20__. Ultimately, dim sum— the food— is only a small part of the dim sum experience."}, "115-P3": {"id": "P3", "year": 115, "genre": "文意選填", "topic": "午睡的好處", "text": "Are you feeling a little guilty about your daily mid-afternoon snooze? Well, you don't need to. Taking a nap in the middle of the day is by no means __21__. In fact, you are giving your brain and your body some time to recharge and turn up refreshed. Research has shown that napping is linked with brain size and __22__; specifically, it can boost our cognition and memory. In our early 20s, our brain starts shrinking, which gradually slows cognition and increases dementia __23__ in later life. The brain size of habitual nappers, however, is found to be better preserved. This suggests that napping may significantly __24__ age-related brain shrinkage, and thus lower the possibility of developing dementia. Neurologists also confirm that naps can enhance memory and learning. For students cramming for college exams, napping will help __25__ acquired knowledge and learned skills. Understanding how to perfect your nap is vital for reaping its benefits. To begin with, you need to find out the ideal length of a nap. Some studies recommend napping for 20 to 40 minutes, while others __26__ shorter naps, such as 15 to 20 minutes. The best nap length, however, may __27__ a person's physical condition and fatigue level. For some people, even a five-minute nap can bring about surprisingly __28__ benefits. Furthermore, the environment where naps are taken also plays an important role. A dark space with little distraction is ideal for napping. So, find yourself a quiet place with __29__ light or with blackout curtains. If you can't find a dark room, consider wearing a sleep mask. You can also add some soothing nature sounds to create a relaxing __30__, which can make your naps more effective."}, "115-P4": {"id": "P4", "year": 115, "genre": "篇章結構", "topic": "微笑的跨文化意涵", "text": "Smiling is a gesture that many people engage in dozens of times a day without thought. Most people believe that smiling is an expression of good feelings, a simple way to show happiness and friendliness. But does this hold true across time and cultures? __31__ In the West, for example, portraits of men and women before the 1700s typically depicted them with a serious, unsmiling expression. The absence of smiles stemmed partly from the attempt to hide their decayed teeth caused by poor dental hygiene. More importantly, smiling and laughter had long been perceived in the society as manifestations of a lack of self-control and good manners. Paintings with white-toothed smiles emerged after the 1700s, with the gradual rise of a culture that valued perception and responsiveness. Recent studies also show that interpretations of smiling may vary from culture to culture. While in most cultures smiling is associated with positive emotions, in certain cultures the same person can be judged as less intelligent when smiling. __32__ The amount people smile is culturally influenced as well. People smile more when they are from countries that are high in individualism and low in population. These are often places where the needs and rights of the individual take precedence over those of the group. __33__ Newcomers from different parts of the world are found to smile more. Without a shared language, they often resort to smiling to get along with others. For them, smiling is a straightforward way to indicate that one is reliable and trustworthy. __34__ As many psychologists now point out, this simple gesture is in fact far more complicated than it may appear."}, "115-P5": {"id": "P5", "year": 115, "genre": "閱讀測驗", "topic": "沙克爾頓的南極探險與堅忍號", "text": "In March 2022, the Endurance— the lost vessel of the famed polar explorer Ernest Shackleton —was found in Antarctica, 107 years after it sank. The news made headlines around the world, not only for the incredible achievement of the search team, but because the discovery marked the final chapter in a legendary story of extraordinary courage and perseverance. On August 4, 1914, Sir Ernest Shackleton, along with a skilled crew of 27, set sail on the Endurance toward the South Pole, hoping to make the first land crossing over Antarctica. From Plymouth, UK, the team arrived in Buenos Aires, Argentina, and on November 5 reached South Georgia Island, the last settlement of civilization en route to Antarctica. There, the real challenge began. Two days after leaving South Georgia in December, the Endurance encountered floating ice, and was soon completely trapped in pack ice. The worthy vessel held up for nine months, drifting down south slowly and then pushed northward by the ice. Gradually, the pressure from the ice buckled the planks. Freezing water rushed in and exacerbated the situation. On October 27, 1915, Shackleton ordered his crew to abandon the ship, pitching tents on the ice a mile and a half away. Weeks later, they watched the Endurance sink beneath the Weddell Sea. The next five months, the crew camped out on the pack ice as it drifted north, surviving on penguins, seals, and seaweed. Finally, the ice broke up enough for them to escape in lifeboats. For seven days, they sailed more than a hundred miles to the uninhabited Elephant Island. But the crew couldn't survive long there. So, Shackleton made a dangerous attempt to get help: With five crew members, he sailed 800 miles over 16 days across freezing, stormy seas to South Georgia Island. Then the group hiked for 36 hours across the island to reach a whaling station. Help was almost at hand, but ice and bad weather hindered their return. On August 30, 1916, Shackleton finally got back to Elephant Island with a ship big enough to rescue the rest of his men. All the members of the expedition team survived, but the Endurance remained lost under the sea until its discovery in 2022."}, "115-P6": {"id": "P6", "year": 115, "genre": "閱讀測驗", "topic": "螺旋樓梯的歷史", "text": "In many old castles in Europe, visitors often find a fantastic spiral staircase, which provides a captivating focal point as it winds up the building. This prominent structure actually has a long and rich heritage. In the Old Testament, reference is made to spiral staircases in the Temple of Solomon, suggesting that they were already in use by around 1,000 BC. The oldest spiral staircase still standing today is at Trajan's Column in Rome. The staircase was built in 113 AD, with a total of 185 steps carved in stone and marble. Around this time, spiral staircases began to find much wider use in Roman architecture and across Europe. Throughout the Middle Ages, winding staircases became a well-established feature of European castles, mainly for their advantages in helping to defend against attackers. To begin with, these staircases were quite narrow, so attackers would have to ascend one at a time, making it impossible to launch a mass attack. Also, the stairs were designed to turn clockwise upwards. This means that ascenders would have their right hand tight against the narrowest part of the staircases, close to the central pole, and as a result were unable to use their sword effectively. The attackers' challenge was further complicated by the uneven steps of the staircase, often strategically designed by the castle owners. The defenders, living in the castles, were familiar with the stair pattern and could retreat up them very swiftly; while the attackers were much more likely to stumble and fall, particularly in the dimly lit confines of the staircase. Being associated with medieval castles and kings, spiral staircases gradually won popularity in European architecture, with new materials emerging to cope with customers' needs. In Victorian times, cast iron spiral staircases were popular for public buildings and homes for the rich. In the latter half of the 20th century, steel frames became cost-effective, and thus affordable for a much wider staircase market. Then, steel spiral staircases as fire escape stairs appeared in many buildings. Today, spiral staircases come in a wide variety of materials: steel, wood, concrete, and recently even glass. The timeless appeal of their classical design makes spiral staircases a much-desired feature in luxury homes, offices, and public buildings nowadays."}, "115-P7": {"id": "P7", "year": 115, "genre": "閱讀測驗", "topic": "地圖方位的演變", "text": "Have you ever wondered why north comes at the top of a map? Well, north may seem a natural choice for the top spot today, but that wasn't always the case. Documents from ancient times indicate that many maps in early ages were pointing to the east, where the sun rose. In ancient India, for example, maps were most likely oriented to the east. Though there is no physical evidence to support this, the word dakshina \"south\" in Indian languages also means \"right,\" suggesting that ancient Indians were oriented toward the east, and therefore south was on their right-hand side. Ample evidences from the Old Testament also suggest that east was at the top of maps in pre-Biblical and Biblical eras, a reason why east is still referred to as the \"Orient\" today. In the oldest surviving maps, south is at the top, and north points down. Early Egyptian maps showed south on top, most likely because the Nile, vital to Egyptian livelihood, originated in the south. As rivers were believed to flow downward, \"up\" was therefore south. Map makers in Arabia also drew maps with south on top since the earliest Muslims lived north of Mecca, and a south-oriented map would show the followers looking up toward their holy city. The preference for north arose during the European age of exploration. At the time, sailors relied on the North Star to find their way across the Mediterranean and later the Atlantic. By the 16th century, when Europe's search for trading routes was at its peak, maps became Eurocentric, with north on top. The expansion of European imperialism in the following centuries further established the \"north up\" practice as the standard. Today, map orientation is taking on a new perspective. In perhaps our most common interaction with maps — the use of GPS systems on our phones and in our cars, directions have ceased to be as important. The layouts are dynamic, oriented toward our travel path. So, perhaps the north-on-top practice is less a rule and more a blip. After centuries of technological advancements, it seems we've ended up right where we began in ancient times: with ourselves in the middle, and our destinations at the top."}}, "reading": [{"id": "G110-1", "year": 110, "no": 1, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Tom is really a naughty boy. He likes to _____ and play jokes on his younger sister when their parents are not around.", "options": {"A": "alert", "B": "spare", "C": "tease", "D": "oppose"}, "answer": "C", "img": false}, {"id": "G110-2", "year": 110, "no": 2, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Elderly shoppe

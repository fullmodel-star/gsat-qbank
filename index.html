rs in this store are advised to take the elevator rather than the _____, which may move too fast for them to keep their balance.", "options": {"A": "airway", "B": "operator", "C": "escalator", "D": "instrument"}, "answer": "C", "img": false}, {"id": "G110-3", "year": 110, "no": 3, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Upon hearing its master's call, the dog wagged its tail, and followed her out of the room _____.", "options": {"A": "obediently", "B": "apparently", "C": "logically", "D": "thoroughly"}, "answer": "A", "img": false}, {"id": "G110-4", "year": 110, "no": 4, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "Since many of our house plants are from humid jungle environments, they need _____ air to keep them green and healthy.", "options": {"A": "moist", "B": "stale", "C": "crisp", "D": "fertile"}, "answer": "A", "img": false}, {"id": "G110-5", "year": 110, "no": 5, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The skydiver managed to land safely after jumping out of the aircraft, even though her _____ failed to open in midair.", "options": {"A": "glimpse", "B": "latitude", "C": "segment", "D": "parachute"}, "answer": "D", "img": false}, {"id": "G110-6", "year": 110, "no": 6, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The invention of the steam engine, which was used to power heavy machines, brought about a _____ change in society.", "options": {"A": "persuasive", "B": "harmonious", "C": "conventional", "D": "revolutionary"}, "answer": "D", "img": false}, {"id": "G110-7", "year": 110, "no": 7, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "To encourage classroom _____, the teacher divided the class into groups and asked them to solve a problem together with their partners.", "options": {"A": "operation", "B": "interaction", "C": "adjustment", "D": "explanation"}, "answer": "B", "img": false}, {"id": "G110-8", "year": 110, "no": 8, "section ype": "詞彙", "skill": "詞彙", "pkey": null, "stem": "The non-profit organization has _____ $1 million over five years to finance the construction of the medical center.", "options": {"A": "equipped", "B": "resolved", "C": "committed", "D": "associated"}, "answer": "C", "img": false}, {"id": "G110-15", "year": 110, "no": 15, "section": "單題", "type": "詞彙", "skill": "詞彙", "pkey": null, "stem": "One week after the typhoon, some bridges were finally opened and bus service _____ in the country's most severely damaged areas.", "options": {"A": "departed", "B": "resumed", "C": "transported", "D": "corresponded"}, "answer": "B", "img": false}, {"id": "G110-16", "year": 110, "no": 16, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P1", "stem": "...a visit to a major European city just would not be the same 16 encountering them: bathing in fountains...", "options": {"A": "as", "B": "for", "C": "though", "D": "without"}, "answer": "D", "img": false}, {"id": "G110-17", "year": 110, "no": 17, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P1", "stem": "...the birds are now threatening to 17 the city's historic center, pooping on monuments...", "options": {"A": "set up", "B": "hang on", "C": "take over", "D": "break down"}, "answer": "C", "img": false}, {"id": "G110-18", "year": 110, "no": 18, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P1", "stem": "The city council originally proposed 18 the pigeon population by gathering the birds and shooting them.", "options": {"A": "counting", "B": "reducing", "C": "displaying", "D": "maintaining"}, "answer": "B", "img": false}, {"id": "G110-19", "year": 110, "no": 19, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P1", "stem": "...the government was finally persuaded to consider another 19 effective method: giving the pigeons birth control.", "options": {"A": "nearly", "B": "shortly", "C": "precisely", "D": "similarly"}, "answer": "D", "img": false}, {"id": "G110-20", "year": 1 ": "綜合測驗", "pkey": "110-P3", "stem": "But some mountain ranges of South America, Africa, and Indonesia are also 26 glaciers and ice sheets.", "options": {"A": "home to", "B": "covers of", "C": "roofs over", "D": "room for"}, "answer": "A", "img": false}, {"id": "G110-27", "year": 110, "no": 27, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P3", "stem": "...rising temperatures are posing an 27 threat to the last tropical glaciers in Indonesia's Papua region.", "options": {"A": "occasional", "B": "elaborate", "C": "immediate", "D": "offensive"}, "answer": "C", "img": false}, {"id": "G110-28", "year": 110, "no": 28, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P3", "stem": "28 already shrunk by 85% to a mere 0.5 square kilometers, Papua's glaciers will completely disappear within a decade...", "options": {"A": "Have", "B": "Had", "C": "Having", "D": "Having been"}, "answer": "C", "img": false}, {"id": "G110-29", "year": 110, "no": 29, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P3", "stem": "The disappearance of the glaciers will also leave a significant 29 impact. For many indigenous Papuans, the ice sheets represent a sacred symbol.", "options": {"A": "cultural", "B": "moral", "C": "political", "D": "environmental"}, "answer": "A", "img": false}, {"id": "G110-30", "year": 110, "no": 30, "section": "題組", "type": "綜合測驗", "skill": "綜合測驗", "pkey": "110-P3", "stem": "...Papua's glaciers are only the \"first to go\" if greenhouse gases are 30 and temperatures continue rising.", "options": {"A": "kept balanced", "B": "made released", "C": "seen dismissed", "D": "left unchecked"}, "answer": "D", "img": false}, {"id": "G110-31", "year": 110, "no": 31, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "Research shows that 31 amounts of exercise—even just 15 minutes a day—helps ease depression...", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "J", "img": false}, {"id": "G110-32", "year": 110, "no": 32, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "...you don't have to be a fitness 32 to do it.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "G", "img": false}, {"id": "G110-33", "year": 110, "no": 33, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "What you need to do is to make \"start slow and have fun\" a motto to 33 .", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "F", "img": false}, {"id": "G110-34", "year": 110, "no": 34, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "In fact, 34 health studies prove that exercise doesn't have to hurt to be effective.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "H", "img": false}, {"id": "G110-35", "year": 110, "no": 35, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "You might 35 that if working out doesn't give you pain, it isn't working.", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue", "E": "demanding", "F": "abide by", "G": "fanatic", "H": "current", "I": "make time", "J": "modest"}, "answer": "D", "img": false}, {"id": "G110-36", "year": 110, "no": 36, "section": "題組", "type": "文意選填", "skill": "文意選填", "pkey": "110-P4", "stem": "According to fitness trainers, physically 36 exercises may make you breathe heavily and your muscles may ache temporarily...", "options": {"A": "means", "B": "soreness", "C": "point to", "D": "argue   ['home','run','result','diagnose','wrong','fav','settings'].forEach(x=>$('#v-'+x).classList.toggle('hidden',x!==v));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  $('#nav').classList.toggle('hidden', v==='run'||v==='result');
  if(v==='home')renderHome();
  if(v==='diagnose')renderDiagnose();
  if(v==='wrong')renderWrong();
  if(v==='fav')renderFav();
  if(v==='settings')renderSettings();
  window.scrollTo(0,0);
}

/* ---------- home ---------- */
function renderHome(){
  const done=Object.keys(S.rec).length;
  const corr=Object.values(S.rec).filter(x=>x.correct).length;
  const cd=examCountdown(); const st=streak(); const todayDone=!!S.daily[todayStr()];
  const cdBanner = cd!=null ? `<div class="cd ${cd<0?'past':''}" onclick="go('settings')">
     <div class="cdi">${cd<0?'🎓':'📅'}</div>
     <div><b>${cd>0?`距離考試還有 ${cd} 天`:cd===0?'今天就是考試日，加油！':`考試已過 ${-cd} 天`}</b>
     <small>${esc(S.settings.examDate)}${cd>0?'　每天練一點，穩紮穩打':''}</small></div></div>` : '';
  $('#v-home').innerHTML=`
   ${cdBanner}
   <div class="stats">
     <div class="stat"><b>${done}</b><span>已作答</span></div>
     <div class="stat"><b>${pct(corr,done)}%</b><span>答對率</span></div>
     <div class="stat"><b>${S.fav.length}</b><span>收藏題</span></div>
   </div>
   <button class="mode wide daily ${todayDone?'ok':''}" onclick="startDaily()">
     <div class="mi">${todayDone?'✅':'☀️'}</div>
     <div><div class="mt">每日一練　${st>0?`🔥 ${st} 天`:''}</div>
       <div class="md">${todayDone?'今天已完成，明天再來保持連勝！':'15 題精選（優先錯題與新題），養成每天練習'}</div></div></button>
   <div class="sect">📝 整卷模擬考（計時）</div>
   <div class="picker">
     ${YEARS.map(y=>`<button class="pbtn" onclick="startExam(${y})">${y} 年<small>閱讀 ${usableR.filter(q=>q.year===y).length} 題</small></button>`).join('')}
   </div>
   <div class="sect">🎯 題型專練</div>
   <div class="modes">
     ${TYPES.map(t=>`<button class="mode" onclick="startType('${t}')"><div class="mi">${TI(t)}</div><div class="mt">${t}</div><div class="md">${usableR.filter(q=>q.type===t).length} 題 · 即時對答</div></button>`).join('')}
     ${usableL.length?`<button class="mode" onclick="startListen()"><div class="mi">🎧</div><div class="mt">聽力</div><div class="md">${usableL.length} 題 · 官方音檔（${AUDIOYEARS.join('・')}）</div></button>`:''}
     <button class="mode" onclick="startWrongPractice()"><div class="mi">🔁</div><div class="mt">錯題複習</div><div class="md">${S.wrong.length} 題待清</div></button>
     <button class="mode" onclick="go('fav')"><div class="mi">⭐</div><div class="mt">我的收藏</div><div class="md">${S.fav.length} 題 · 重點再練</div></button>
   </div>
   <div class="sect">📊 診斷</div>
   <button class="mode wide" onclick="go('diagnose')"><div class="mi">📈</div><div><div class="mt">弱點診斷</div><div class="md">看各題型／各年答對率，一鍵補強最弱項</div></div></button>
   <p style="text-align:center;color:var(--sub);font-size:.7rem;margin-top:18px">${esc(QB.meta.source)} · 離線可用 · 進度存本機</p>`;
}

/* ---------- session engine ---------- */
let sess=null;  // {list, i, mode, picks:{}, timed, t0, timerId, title}
function startExam(y){
  const list=usableR.filter(q=>q.year===y).sort((a,b)=>a.no-b.no);
  sess={list,i:0,mode:'exam',picks:{},timed:true,t0:Date.now(),title:`${y} 年 · 整卷閱讀模擬`};
  startTimer(); go('run'); drawRun();
}
function startType(t){
  const list=shuffle(usableR.filter(q=>q.type===t));
  sess={list,i:0,mode:'practice',picks:{},timed:false,title:`題型專練 · ${t}`};
  go('run'); drawRun();
}
function startListen(){
  const list=shuffle(usableL);
  sess={list,i:0,mode:'listen',picks:{},timed:false,title:'聽力練習'};
  go('run'); drawRun();
}
function startWrongPractice(){
  if(!S.wrong.length){alert('目前沒有錯題，先去練習吧！');return;}
  const set=new Set(S.wrong);
  const list=shuffle([...usableR,...usableL].filter(q=>set.has(q.id)));
  sess={list,i:0,mode:'practice',picks:{},timed:false,title:'錯題複習'};
  go('run'); drawRun();
}
function startFav(){
  if(!S.fav.length){alert('還沒有收藏題目。作答時點右上角 ⭐ 就會收藏。');return;}
  const set=new Set(S.fav);
  const list=shuffle(ALLQ.filter(q=>set.has(q.id)));
  sess={list,i:0,mode:'practice',picks:{},timed:false,title:'我的收藏'};
  go('run'); drawRun();
}
const DAILY_N=15;
function startDaily(){
  const wrongSet=new Set(S.wrong);
  const wrong=usableR.filter(q=>wrongSet.has(q.id));
  const unseen=usableR.filter(q=>!S.rec[q.id]&&!wrongSet.has(q.id));
  const seen=usableR.filter(q=>S.rec[q.id]&&!wrongSet.has(q.id));
  const list=[...shuffle(wrong).slice(0,6),...shuffle(unseen),...shuffle(seen)].slice(0,DAILY_N);
  if(!list.length){alert('題目都練完了，太厲害了！');return;}
  sess={list:shuffle(list),i:0,mode:'practice',picks:{},timed:false,title:'每日一練',daily:true};
  go('run'); drawRun();
}
let timerId=null;
function startTimer(){ stopTimer(); timerId=setInterval(()=>{const el=$('#timer');if(el)el.textContent=fmtT(Date.now()-sess.t0)},1000); }
function stopTimer(){ if(timerId)clearInterval(timerId); timerId=null; }
function fmtT(ms){const s=Math.floor(ms/1000);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function drawRun(){
  const q=sess.list[sess.i]; if(!q){finish();return;}
  const isL=sess.mode==='listen'||q.id[0]==='L';
  const p=passageOf(q);
  const picked=sess.picks[q.id];
  const answered=picked!=null;
  const immediate=sess.mode!=='exam';
  const audio = isL ? `<div class="audio"><button onclick="playAudio('${q.year}',${q.no})">▶</button><div class="lab">播放官方音檔<small>${q.year} 年 · 第 ${q.no} 題（${esc(q.part||'')}）</small></div></div>` : '';
  const passage = (p && !isL) ? `<div class="passage"><div class="pg">📄 ${esc(p.genre)}｜${esc(p.topic)}</div>${esc(p.text)}</div>` : '';
  const tag = isL ? `<span class="tag">🎧 聽力</span>` : `<span class="tag">${TYPEICON[q.type]||''} ${esc(q.type)}</span>`;
  const stem = q.stem ? `<div class="stem">${esc(q.stem)}</div>` : (isL?'<div class="stem" style="color:var(--sub)">請聽音檔作答</div>':'');
  const opts=Object.entries(q.options||{}).filter(([k,v])=>v!=null).map(([k,v])=>{
    let cls='opt';
    if(answered){
      if(k===q.answer)cls+=' correct';
      else if(k===picked)cls+=' wrong';
    } else if(k===picked) cls+=' sel';
    return `<button class="${cls}" ${answered?'disabled':''} onclick="pick('${k}')"><span class="k">${k}</span><span class="v">${esc(v)}</span></button>`;
  }).join('');
  let fb='';
  if(answered && immediate){
    const ok=picked===q.answer;
    fb=`<div class="fb ${ok?'ok':'no'}">${ok?'✅ 答對了！':'❌ 正解是 '+q.answer+'．'+esc(q.options[q.answer]||'')}</div>`;
  }
  $('#v-run').innerHTML=`
    <div style="display:flex;align-items:center">
      <button class="back" onclick="quitRun()" style="flex:1;text-align:left">‹ 結束</button>
      <button class="iconbtn${isFav(q.id)?' faved':''}" id="favBtn" onclick="toggleFav('${q.id}')" title="收藏">★</button>
    </div>
    <div class="qhead">
      <div class="prog"><i style="width:${(sess.i+1)/sess.list.length*100}%"></i></div>
      <div class="cnt">${sess.i+1}/${sess.list.length}</div>
      ${sess.timed?`<div class="timer" id="timer">${fmtT(Date.now()-sess.t0)}</div>`:''}
    </div>
    <div style="font-weight:800;font-size:.8rem;color:var(--sub);margin-bottom:8px">${esc(sess.title)}</div>
    ${audio}${passage}
    <div>${tag}</div>${stem}
    <div class="opts">${opts}</div>
    ${fb}
    <div class="foot"><div class="in">
      ${sess.i>0?'<button class="btn ghost" onclick="prevQ()">‹ 上一題</button>':''}
      <button class="btn" id="nextBtn" ${(!answered&&sess.mode!=='exam')?'disabled':''} onclick="nextQ()">${sess.i+1<sess.list.length?(sess.mode==='exam'?'下一題 ›':'下一題 ›'):'交卷／看結果'}</button>
    </div></div>`;
}
function pick(k){
  const q=sess.list[sess.i];
  if(sess.picks[q.id]!=null && sess.mode!=='exam') return;
  sess.picks[q.id]=k;
  if(sess.mode!=='exam'){ markAns(q,k); }
  drawRun();
}
function nextQ(){ if(sess.i+1<sess.list.length){sess.i++;drawRun();}else finish(); }
function prevQ(){ if(sess.i>0){sess.i--;drawRun();} }
function quitRun(){ if(sess.mode==='exam'&&Object.keys(sess.picks).length&&!confirm('離開會結束這次模擬考，確定？'))return; stopTimer(); go('home'); }

function finish(){
  stopTimer();
  // exam mode: grade all now
  if(sess.mode==='exam'){ sess.list.forEach(q=>{ if(sess.picks[q.id]!=null) markAns(q,sess.picks[q.id]); }); }
  if(sess.daily && Object.keys(sess.picks).length){ S.daily[todayStr()]=true; save(); }
  const list=sess.list, picks=sess.picks;
  const done=list.filter(q=>picks[q.id]!=null);
  const corr=done.filter(q=>picks[q.id]===q.answer);
  // by type
  const byType={};
  list.forEach(q=>{const t=q.id[0]==='L'?'聽力':q.type;byType[t]=byType[t]||[0,0];if(picks[q.id]!=null){byType[t][1]++;if(picks[q.id]===q.answer)byType[t][0]++;}});
  const wrongList=list.filter(q=>picks[q.id]!=null&&picks[q.id]!==q.answer);
  const timeStr = sess.timed?`<div class="chip">⏱ ${fmtT(Date.now()-sess.t0)}</div>`:'';
  $('#v-result').innerHTML=`
    <div class="result">
     <div class="big card">
       <div style="font-size:.85rem;color:var(--sub);font-weight:700">${esc(sess.title)}</div>
       <div class="score">${pct(corr.length,done.length)}<span style="font-size:1.2rem">分</span></div>
       <div style="font-weight:700">答對 ${corr.length} / ${done.length} 題 ${timeStr}</div>
     </div>
     <div class="card">
       <div class="sect" style="margin-top:0">各題型表現</div>
       ${Object.entries(byType).map(([t,[c,n]])=>bar(t+' '+TI(t),c,n)).join('')||'<div class="empty">—</div>'}
     </div>
     ${wrongList.length?`<div class="card"><div class="sect" style="margin-top:0">錯題檢討（${wrongList.length}）</div>${wrongList.map(revItem).join('')}</div>`:'<div class="card" style="text-align:center;color:var(--good);font-weight:800">🎉 全部答對！</div>'}
    </div>
    <div class="foot"><div class="in">
      <button class="btn ghost" onclick="go('home')">回首頁</button>
      ${wrongList.length?'<button class="btn" onclick="startWrongPractice()">複習錯題</button>':''}
    </div></div>`;
  go('result');
}
function bar(label,c,n){
  const p=pct(c,n); const col=p>=80?'var(--good)':p>=60?'var(--gold)':'var(--bad)';
  return `<div class="bar"><div class="lb"><span>${esc(label)}</span><span>${c}/${n}（${p}%）</span></div><div class="track"><i style="width:${p}%;background:${col}"></i></div></div>`;
}
function revItem(q){
  const p=passageOf(q);
  return `<div class="rev-item"><div class="q"><span class="tag">${q.id[0]==='L'?'🎧聽力':esc(q.type)}</span>${esc(q.stem||('聽力 '+q.year+' 第'+q.no+'題'))}</div>
    <div class="a">你選 <s>${esc(sess.picks[q.id])}</s>　正解 <b>${esc(q.answer)}．${esc((q.options||{})[q.answer]||'')}</b></div></div>`;
}

/* ---------- audio ---------- */
let curAudio=null;
function playAudio(year,no){
  if(curAudio){curAudio.pause();curAudio=null;}
  const file=`audio/${year}/${String(no)}.mp3`;
  curAudio=new Audio(file);
  curAudio.play().catch(()=>alert('此音檔尚未內建（聽力音檔部署中）'));
}

/* ---------- diagnose ---------- */
function renderDiagnose(){
  const byType={}, byYear={};
  R.concat(L).forEach(q=>{const r=S.rec[q.id];if(!r)return;
    const t=q.id[0]==='L'?'聽力':q.type; byType[t]=byType[t]||[0,0]; byType[t][1]++; if(r.correct)byType[t][0]++;
    byYear[q.year]=byYear[q.year]||[0,0]; byYear[q.year][1]++; if(r.correct)byYear[q.year][0]++;});
  const has=Object.keys(byType).length;
  let weak=null,wp=101;
  Object.entries(byType).forEach(([t,[c,n]])=>{if(n>=3){const p=pct(c,n);if(p<wp){wp=p;weak=t}}});
  $('#v-diagnose').innerHTML=`
    <div class="sect" style="margin-top:6px">📊 弱點診斷</div>
    ${!has?'<div class="empty">還沒有作答紀錄。先去練幾題，這裡就會顯示你各題型／各年的答對率。</div>':`
    <div class="card"><div class="sect" style="margin-top:0">依題型</div>
      ${TYPES.concat('聽力').filter(t=>byType[t]).map(t=>bar(TI(t)+' '+t,byType[t][0],byType[t][1])).join('')}</div>
    <div class="card"><div class="sect" style="margin-top:0">依年度</div>
      ${YEARS.filter(y=>byYear[y]).map(y=>bar(y+' 年',byYear[y][0],byYear[y][1])).join('')}</div>
    ${weak?`<button class="mode wide" onclick="startType('${weak}')"><div class="mi">💪</div><div><div class="mt">補強最弱：${weak}（${wp}%）</div><div class="md">點我專練這個題型</div></div></button>`:''}`}`;
}

/* ---------- wrong ---------- */
function renderWrong(){
  const set=new Set(S.wrong);
  const list=R.concat(L).filter(q=>set.has(q.id));
  $('#v-wrong').innerHTML=`
    <div class="sect" style="margin-top:6px">🔁 錯題本（${list.length}）</div>
    ${!list.length?'<div class="empty">目前沒有錯題 👍 答錯的題目會自動收進這裡，答對即移除。</div>':
      `<button class="btn" style="margin:4px 0 14px" onclick="startWrongPractice()">開始複習全部錯題</button>`+
      list.map(q=>`<div class="rev-item"><div class="q"><span class="tag">${q.id[0]==='L'?'🎧聽力':esc(q.type)} · ${q.year}</span>${esc(q.stem||('聽力第'+q.no+'題'))}</div>
        <div class="a">正解 <b>${esc(q.answer)}．${esc((q.options||{})[q.answer]||'')}</b></div></div>`).join('')}`;
}

/* ---------- fav ---------- */
function renderFav(){
  const set=new Set(S.fav);
  const list=ALLQ.filter(q=>set.has(q.id));
  $('#v-fav').innerHTML=`
    <div class="sect" style="margin-top:6px">⭐ 我的收藏（${list.length}）</div>
    ${!list.length?'<div class="empty">還沒有收藏題目。作答時點右上角的 ⭐ 就能把重點題收進來。</div>':
      `<button class="btn" style="margin:4px 0 14px" onclick="startFav()">開始練習收藏題</button>`+
      list.map(q=>`<div class="rev-item" style="border-color:var(--gold)"><div class="q"><span class="tag">${q.id[0]==='L'?'🎧聽力':esc(q.type)} · ${q.year}</span>${esc(q.stem||('聽力第'+q.no+'題'))}</div>
        <div class="a">正解 <b>${esc(q.answer)}．${esc((q.options||{})[q.answer]||'')}</b>　<span onclick="toggleFav('${q.id}');renderFav()" style="color:var(--bad);cursor:pointer;font-weight:700">✕ 移除</span></div></div>`).join('')}`;
}

/* ---------- settings ---------- */
function renderSettings(){
  const done=Object.keys(S.rec).length;
  $('#v-settings').innerHTML=`
    <div class="sect" style="margin-top:6px">⚙️ 設定</div>
    <div class="card">
      <div class="setrow"><div class="l"><b>考試倒數</b><small>設定考試日期，首頁顯示倒數</small></div>
        <input type="date" value="${esc(S.settings.examDate||'')}" onchange="S.settings.examDate=this.value;save();renderSettings()"
          style="flex:0 0 auto;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;background:var(--card);color:var(--ink);font:inherit"></div>
      <div class="setrow"><div class="l"><b>深色模式</b><small>跟隨系統／手動</small></div>
        <div class="switch ${isDark()?'on':''}" onclick="toggleDark()"><i></i></div></div>
      <div class="setrow"><div class="l"><b>題型專練即時對答</b><small>選完立刻顯示正解</small></div>
        <div class="switch ${S.settings.immediate?'on':''}" onclick="S.settings.immediate=!S.settings.immediate;save();renderSettings()"><i></i></div></div>
    </div>
    <div class="card">
      <div class="setrow" style="border:0"><div class="l"><b>學習進度</b><small>已作答 ${done} 題 · 錯題 ${S.wrong.length}</small></div>
        <button class="btn ghost" style="flex:0 0 auto;padding:10px 16px" onclick="resetAll()">清除</button></div>
    </div>
    <div class="card" style="font-size:.78rem;color:var(--sub);line-height:1.8">
      <b>關於</b><br>題目為 <b>大學入學考試中心 學科能力測驗 英文考科 官方公開試題（110–115）</b>。
      閱讀 ${QB.meta.readingUsable} 題${usableL.length?`、聽力 ${usableL.length} 題`:''}可練；少數需對照原卷插圖的圖表／看圖題已隱藏。僅供教學與自學練習。
    </div>`;
}
function resetAll(){ if(confirm('確定清除所有作答與錯題紀錄？（收藏會保留）')){S.rec={};S.wrong=[];S.daily={};save();renderSettings();alert('已清除');} }

/* ---------- theme ---------- */
function isDark(){ if(S.settings.dark==='dark')return true; if(S.settings.dark==='light')return false;
  return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches; }
function applyTheme(){ const d=S.settings.dark; if(d==='auto')document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',d); }
function toggleDark(){ S.settings.dark=isDark()?'light':'dark'; save(); applyTheme(); renderSettings(); }

/* ---------- boot ---------- */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
renderHome();
</script>
